<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>My Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) 60px max(20px, env(safe-area-inset-left));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

/* ===== Component 1: page title ===== */
.dash-title {
  margin: 0 0 14px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Component 2: Goal Ticker ===== */
.ticker-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 4px;
  margin-bottom: 18px;
}
.goal-ticker {
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 10px;
  padding: 7px 12px;
  border-radius: 12px;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.goal-ticker::after {
  content: '';
  position: absolute; top: 0; bottom: 0;
  width: 30%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
  animation: ticker-sweep 8s linear infinite;
}
@keyframes ticker-sweep {
  0%   { left: -40%; }
  100% { left: 110%; }
}
.goal-ticker-led { display: inline-flex; align-items: center; }
.goal-ticker-led-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #6BE3A4;
  box-shadow: 0 0 8px rgba(107,227,164,0.7);
  animation: led-pulse 1.6s ease-in-out infinite;
}
@keyframes led-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.45; transform: scale(0.85); }
}
.goal-ticker-label {
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 800;
  letter-spacing: 0.18em;
  color: var(--text-tertiary);
}
.goal-ticker-stage {
  position: relative; overflow: hidden;
  flex: 1; height: 22px;
}
.goal-ticker-row {
  position: absolute; inset: 0;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 12.5px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
  white-space: nowrap;
  opacity: 1;
  transition: opacity 0.22s ease;
}
.goal-ticker-row.is-fading { opacity: 0; }
.goal-ticker-status {
  display: inline-flex; justify-content: center;
  width: 18px;
  color: var(--text-tertiary);
}
.goal-ticker-status[data-status="done"]    { color: var(--success); }
.goal-ticker-status[data-status="pending"] { color: var(--text-tertiary); }
.goal-ticker-text {
  flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.goal-ticker-meta {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
  color: var(--text-secondary);
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
}
@media (max-width: 480px) {
  .goal-ticker { padding: 9px 12px; }
  .goal-ticker-label { font-size: 9px; letter-spacing: 0.14em; }
  .goal-ticker-row { font-size: 12px; }
  .goal-ticker-meta { font-size: 10px; padding: 2px 7px; }
}

/* ===== Component 3: Day Ring ===== */
.day-ring-wrap {
  display: flex; flex-wrap: wrap;
  align-items: center; justify-content: center;
  gap: 26px;
  padding: 22px;
  margin-bottom: 22px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}
.day-ring {
  position: relative;
  width: 168px; height: 168px;
  flex-shrink: 0;
}
.day-ring svg { width: 100%; height: 100%; display: block; }
.day-ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
.day-ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: 60px 60px;
  transition: stroke 0.7s cubic-bezier(0.22, 1, 0.36, 1),
              stroke-dashoffset 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}
.day-ring-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}
.day-ring-percent {
  font-size: 40px; font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.04em;
  color: var(--text-primary);
  line-height: 1;
}
.day-ring-phase {
  margin-top: 5px;
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 800;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.day-ring-clock {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-tertiary);
  margin-top: 2px;
}
.day-ring-text {
  display: flex; flex-direction: column;
  gap: 6px;
  max-width: 280px;
}
.day-ring-status { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.day-ring-remaining { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
.day-ring-hours { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
@media (max-width: 480px) {
  .day-ring { width: 144px; height: 144px; }
  .day-ring-percent { font-size: 32px; }
  .day-ring-status { font-size: 13px; }
}

/* ===== Component 4: section + To Do List ===== */
.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.section-title::before {
  content: ''; width: 18px; height: 1px;
  background: var(--text-tertiary); opacity: 0.6;
}
.section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
}

.gm-card {
  position: relative;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  transition: background 0.4s;
  overflow: hidden;
}
.gm-card.gm-all-done::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(107,227,164,0.10), transparent 60%);
  pointer-events: none;
}
.gm-card.gm-all-done .gm-progress-num,
.gm-card.gm-all-done .gm-progress-label { color: var(--success); }

.gm-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  margin-bottom: 14px;
  position: relative;
}
.gm-header-left { display: flex; flex-direction: column; }
.gm-eyebrow {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}
.gm-progress-row { display: flex; align-items: baseline; gap: 6px; }
.gm-progress-num {
  font-size: 42px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.045em;
  color: var(--text-primary);
  line-height: 1;
}
.gm-progress-total {
  font-family: var(--font-mono);
  font-size: 18px;
  color: var(--text-tertiary);
}
.gm-progress-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-left: 4px;
}
.gm-tomorrow-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }
.gm-tomorrow-count {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.gm-card-tomorrow .gm-progress-row { display: none; }

.gm-streak {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-tertiary);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
  transition: background 0.25s, color 0.25s, border-color 0.25s;
}
.gm-streak-icon { font-size: 13px; }
.gm-streak-num {
  font-family: var(--font-mono);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.gm-streak.gm-streak-active {
  background: rgba(242,192,99,0.10);
  color: #F2C063;
  border-color: rgba(242,192,99,0.32);
}
.gm-streak.gm-streak-active .gm-streak-icon {
  filter: drop-shadow(0 0 6px rgba(242,192,99,0.6));
}

.gm-bar {
  display: flex; gap: 4px;
  height: 6px;
  margin-bottom: 16px;
}
.gm-bar:empty { display: none; }
.gm-bar-seg {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  transition: background 0.3s, box-shadow 0.3s;
}
.gm-bar-seg-done {
  background: #6BE3A4;
  box-shadow: 0 0 6px rgba(107,227,164,0.40);
}

.goal-list { list-style: none; margin: 0; padding: 0; }
.empty-state {
  text-align: center;
  font-size: 12px; font-style: italic;
  color: var(--text-tertiary);
  padding: 14px 0;
}

.gm-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  margin-bottom: 6px;
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  transition: background 0.2s, opacity 0.3s;
  position: relative;
}
.gm-row:hover { background: rgba(255,255,255,0.06); }
.gm-row.gm-row-done {
  opacity: 0.45;
  background: rgba(107,227,164,0.04);
}
.gm-row.gm-row-done .gm-text {
  text-decoration: line-through;
  text-decoration-color: rgba(255,255,255,0.4);
}
.gm-row.gm-row-queued {
  background: rgba(242,192,99,0.10);
  box-shadow: inset 3px 0 0 0 #F2C063;
}
.gm-row.gm-row-queued .gm-text { color: #FFE2A8; }
.gm-row.is-drag-over { border-top: 2px solid #6BE3A4; }
.gm-row.is-queue-flashing { animation: gm-queue-flash 0.48s ease-out; }
@keyframes gm-queue-flash {
  0%   { background: rgba(255,255,255,0.035); transform: scale(1); }
  40%  { background: rgba(242,192,99,0.32); transform: scale(1.015); }
  100% { background: rgba(255,255,255,0.035); transform: scale(1); }
}

.gm-handle {
  width: 14px; flex-shrink: 0;
  color: var(--text-tertiary);
  font-weight: 700; font-size: 14px;
  letter-spacing: -2px;
  cursor: grab;
  opacity: 0;
  transition: opacity 0.2s;
  user-select: none;
}
.gm-row:hover .gm-handle { opacity: 1; }
.gm-handle:active { cursor: grabbing; }

.gm-check {
  appearance: none; -webkit-appearance: none;
  width: 22px; height: 22px; flex-shrink: 0;
  margin: 0;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: rgba(0,0,0,0.28);
  border-radius: 7px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.25s;
}
.gm-check:checked {
  background: #6BE3A4;
  border-color: #6BE3A4;
  box-shadow: 0 0 12px rgba(107,227,164,0.40);
}
.gm-check:checked::after {
  content: '';
  position: absolute; left: 6px; top: 2px;
  width: 6px; height: 11px;
  border: solid #0A0A0B;
  border-width: 0 2.5px 2.5px 0;
  transform: rotate(45deg);
  animation: gm-check-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes gm-check-pop {
  from { transform: rotate(45deg) scale(0); }
  to   { transform: rotate(45deg) scale(1); }
}
.gm-check:disabled { cursor: not-allowed; opacity: 0.55; }

.gm-text {
  flex: 1;
  font-size: 14px;
  color: var(--text-primary);
  cursor: text;
  outline: none;
  border-radius: 4px;
  padding: 2px 4px;
  margin: -2px -4px;
}
.gm-text[contenteditable="true"] {
  outline: 1px solid rgba(255,255,255,0.18);
  background: rgba(0,0,0,0.28);
}

.gm-queue-btn {
  border: 0; background: transparent;
  color: var(--text-tertiary);
  font-size: 14px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  opacity: 0.55;
  transition: opacity 0.2s, color 0.2s, transform 0.1s;
}
.gm-queue-btn:hover { opacity: 1; }
.gm-queue-btn.gm-queue-active {
  color: #F2C063;
  opacity: 1;
  filter: drop-shadow(0 0 4px rgba(242,192,99,0.65));
}
.gm-queue-btn:disabled { cursor: not-allowed; opacity: 0.3; }

.goal-delete {
  border: 0; background: transparent;
  color: var(--text-tertiary);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  opacity: 0.5;
  transition: opacity 0.2s, color 0.2s;
}
.gm-row:hover .goal-delete { opacity: 1; }
.goal-delete:hover { color: var(--danger); }

.gm-show-toggle {
  width: 100%;
  margin: 6px 0 0;
  padding: 9px;
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: 10px;
  background: transparent;
  color: var(--text-tertiary);
  font-family: inherit;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.gm-show-toggle:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.22); }

.gm-push-btn {
  width: 100%;
  margin-top: 14px;
  padding: 11px;
  border: 1px dashed rgba(255,255,255,0.16);
  border-radius: 12px;
  background: transparent;
  color: var(--text-tertiary);
  font-family: inherit;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.gm-push-btn:hover {
  color: var(--text-primary);
  border-color: rgba(255,255,255,0.30);
  border-style: solid;
  background: rgba(255,255,255,0.04);
}

.goal-input-wrap.gm-input-wrap {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.gm-input {
  flex: 1; min-width: 0;
  padding: 11px 14px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  background: rgba(0,0,0,0.28);
  color: var(--text-primary);
  font-family: inherit; font-size: 14px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-input:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }

.gm-add {
  padding: 11px 20px;
  border: 0; border-radius: 12px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.9),
    0 2px 8px rgba(0,0,0,0.35),
    0 8px 22px rgba(0,0,0,0.25);
  transition: transform 0.1s, filter 0.15s;
}
.gm-add:hover { filter: brightness(1.06); transform: translateY(-1px); }
.gm-add:active { transform: translateY(0); }

.gm-polish {
  padding: 11px 18px;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  color: var(--text-primary);
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.gm-polish:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.18);
}

.gm-status {
  flex-basis: 100%;
  font-size: 11px;
  color: var(--text-tertiary);
  min-height: 14px;
  margin-top: 4px;
}
.gm-status.gm-status-error { color: var(--danger); }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) 50px max(14px, env(safe-area-inset-left)); }
  .gm-card { padding: 16px; }
  .gm-progress-num { font-size: 36px; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">My Dashboard</h1>

  <div class="ticker-row">
    <div class="goal-ticker" id="goalTicker" aria-live="polite" aria-atomic="true">
      <div class="goal-ticker-led"><span class="goal-ticker-led-dot"></span></div>
      <div class="goal-ticker-label">GOALS</div>
      <div class="goal-ticker-stage" id="goalTickerStage">
        <div class="goal-ticker-row">
          <span class="goal-ticker-status" data-status="">—</span>
          <span class="goal-ticker-text">Loading…</span>
        </div>
      </div>
      <div class="goal-ticker-meta" id="goalTickerMeta">0/0</div>
    </div>
  </div>

  <div class="day-ring-wrap">
    <div class="day-ring">
      <svg viewBox="0 0 120 120">
        <defs>
          <filter id="dayRingGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.4" result="b" />
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <circle class="day-ring-track" cx="60" cy="60" r="52" />
        <circle class="day-ring-fill"  cx="60" cy="60" r="52" id="dayRingFill" filter="url(#dayRingGlow)" />
      </svg>
      <div class="day-ring-overlay">
        <div class="day-ring-percent" id="dayRingPercent">—</div>
        <div class="day-ring-phase"   id="dayRingPhase">—</div>
        <div class="day-ring-clock"   id="dayRingClock">—</div>
      </div>
    </div>
    <div class="day-ring-text">
      <div class="day-ring-status"    id="dayRingStatus">Loading…</div>
      <div class="day-ring-remaining" id="dayRingRemaining">—</div>
      <div class="day-ring-hours">8:00 AM – 12:00 AM</div>
    </div>
  </div>

  <!-- ══════════════ PREMIUM CALENDAR ══════════════ -->
  <style>
  .pc-wrap{margin:18px 0 4px;color:#fff}
  .pc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}

  <script>
  (function(){

  const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const ICON={
    swim:svg('<circle cx="17" cy="7" r="2"/><path d="M2 16c1.5 0 1.5 1 3 1s1.5-1 3-1 1.5 1 3 1 1.5-1 3-1 1.5 1 3 1 1.5-1 3-1M5.5 13l4-3 3 2 3.5-2.5"/>'),

    run:svg('<circle cx="14" cy="5" r="2"/><path d="M11 21l1.5-5-3-2 2-5 3 2 2 1M7 12l2-4M13 16l3 1 1 4M9 21l1-4"/>'),
    strength:svg('<path d="M14.4 14.4 9.6 9.6M3 7l3-3 3 3-3 3zM15 15l3-3 3 3-3 3zM6.5 9.5 4 12M17.5 14.5 20 12"/>'),
    hyrox:svg('<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.4-.5-2-1-3-1.1-2.1-.2-4 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.2.4-2.3 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>'),
    race:svg('<path d="M4 21V4M4 4h13l-2 4 2 4H4"/>'),
    rest:svg('<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>'),
    birthday:svg('<path d="M4 21v-8h16v8zM4 13a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2M12 11V8M12 21v-8"/>'),
    appointment:svg('<path d="M3 21V8l9-5 9 5v13M3 21h18M12 9v6M9 12h6"/>'),
    travel:svg('<path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>'),
    school:svg('<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>'),
    general:svg('<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>')
  };
  const TYPES={
    swim:{l:'Swim',c:'#38bdf8',train:1},bike:{l:'Bike',c:'#f59e0b',train:1},run:{l:'Run',c:'#6ee7b7',train:1},
    strength:{l:'Strength',c:'#a78bfa',train:1},hyrox:{l:'Hyrox',c:'#fb923c',train:1},
    race:{l:'Race',c:'#f43f5e'},rest:{l:'Rest',c:'#6b7280'},birthday:{l:'Birthday',c:'#ec4899',yearly:1},
    appointment:{l:'Appt',c:'#2dd4bf'},travel:{l:'Travel',c:'#818cf8',span:1},school:{l:'School',c:'#fbbf24'},general:{l:'General',c:'#9ca3af'}
  };
  const PRIO={high:{l:'High',c:'#f43f5e'},medium:{l:'Med',c:'#f59e0b'},low:{l:'Low',c:'#34d399'}};
  function T(id){return TYPES[id]||TYPES.general;}

  function occursOn(e,dateStr){
    if(e.endDate&&e.date){return dateStr>=e.date&&dateStr<=e.endDate;}
    if(e.recurring==='yearly'||T(e.type).yearly){return e.date.slice(5)===dateStr.slice(5);}
    if(e.recurring==='monthly'){return e.date.slice(8)===dateStr.slice(8)&&dateStr>=e.date;}
    if(e.recurring==='weekly'){return parseD(e.date).getDay()===parseD(dateStr).getDay()&&dateStr>=e.date;}
    if(e.recurring==='daily'){return dateStr>=e.date;}
    return e.date===dateStr;
  }
  function stravaOn(dateStr){
    return (strava().activities||[]).filter(a=>(a.date||'').slice(0,10)===dateStr).map(a=>({
      id:'sv_'+a.id,type:a.disc,title:a.name||T(a.disc).l,date:dateStr,
      time:(a.date||'').slice(11,16)||'',duration:a.durationMin||0,strava:true,done:true,
      meta:(a.distanceKm?a.distanceKm+'km ':'')+(a.durationMin?a.durationMin+'min ':'')+(a.pace||''),priority:'low'
    }));
  }
  function eventsOn(dateStr){
    const s=load();
    return (s.events||[]).filter(e=>occursOn(e,dateStr)).concat(stravaOn(dateStr));
  }
  function recovery(dateStr){const h=whoop().history||{};return h[dateStr]?h[dateStr].recovery:null;}
  function recColor(r){return r==null?'rgba(255,255,255,.15)':r>=67?'#6ee7b7':r>=34?'#f59e0b':'#f43f5e';}
  function trainLoad(dateStr){return eventsOn(dateStr).filter(e=>T(e.type).train).reduce((a,e)=>a+(e.duration||0),0);}
  function nextRaces(n){const s=load();const td=todayK();return (s.events||[]).filter(e=>e.type==='race'&&e.date>=td).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,n||2);}
  function daysUntil(d){return Math.round((parseD(d)-parseD(todayK()))/864e5);}
  function taperDay(dateStr){const r=nextRaces(1)[0];if(!r)return false;const du=Math.round((parseD(r.date)-parseD(dateStr))/864e5);return du>0&&du<=14;}

  let view='week', cur=new Date(), sel=todayK();
  function weekStartOf(d){const x=new Date(d);const o=(x.getDay()+6)%7;x.setDate(x.getDate()-o);x.setHours(12,0,0,0);return x;}

  function render(dir){
    const root=document.getElementById('cal-root');if(!root)return;
    let title='',sub='';
    if(view==='month'){title=MONTHS[cur.getMonth()];sub=String(cur.getFullYear());}
    else if(view==='week'){const ws=weekStartOf(cur);const we=new Date(ws);we.setDate(ws.getDate()+6);title=MONTHS[ws.getMonth()].slice(0,3)+' '+ws.getDate()+'–'+we.getDate();sub=String(ws.getFullYear());}
    else{const d=parseD(sel);title=d.toLocaleDateString('en',{weekday:'long'});sub=d.toLocaleDateString('en',{month:'long',day:'numeric'});}
    let races='';const rs=nextRaces(2).filter(r=>daysUntil(r.date)<=120);
    if(rs.length)races='<div class="pc-race-strip">'+rs.map(r=>{const du=daysUntil(r.date);return '<div class="pc-race-chip"><span class="d">'+(du===0?'•':du)+'</span><div><div class="n">'+esc(r.title||'Race')+'</div><div class="l">'+(du===0?'Race day':du+' days · '+r.date)+'</div></div></div>';}).join('')+'</div>';
    let body=view==='month'?renderMonth():view==='week'?renderWeek():renderDay();
    const anim=dir==='l'?'pc-slideL':dir==='r'?'pc-slideR':'';
    root.innerHTML='<div class="pc-wrap">'
      +'<div class="pc-head"><div><div class="pc-title">'+title+'</div><div class="pc-sub">'+sub+'</div></div>'
        +'<div class="pc-nav"><button class="pc-today-btn" onclick="pcToday()">Today</button>'
        +'<button class="pc-nav-btn" onclick="pcPrev()">‹</button><button class="pc-nav-btn" onclick="pcNext()">›</button></div></div>'
      +'<div class="pc-views">'+['month','week','day'].map(v=>'<button class="pc-view-btn '+(view===v?'on':'')+'" onclick="pcView(\''+v+'\')">'+v.charAt(0).toUpperCase()+v.slice(1)+'</button>').join('')+'</div>'
      +races+'<div class="pc-card '+anim+'" id="pcCard">'+body+'</div></div>';
    bindSwipe();
    if(view!=='month')setTimeout(scrollToNow,30);
    if(view==='day')genReco();
  }

  function renderMonth(){
    const y=cur.getFullYear(),m=cur.getMonth();
    const first=new Date(y,m,1),fd=(first.getDay()+6)%7;
    const dim=new Date(y,m+1,0).getDate(),pdim=new Date(y,m,0).getDate();
    let cells=[];
    for(let i=fd-1;i>=0;i--)cells.push({d:new Date(y,m-1,pdim-i),other:1});

    const td=todayK();
    function cell(c){
      const ds=dk(c.d),evs=eventsOn(ds),rec=recovery(ds);
      const isToday=ds===td,isRace=evs.some(e=>e.type==='race'),isPast=ds<td&&!isToday;
      let cls='pc-cell';if(c.other)cls+=' other';if(isPast)cls+=' past';if(isToday)cls+=' today';if(isRace)cls+=' race';else if(taperDay(ds))cls+=' taper';
      const dots=evs.slice(0,3).map(e=>'<span class="pc-cell-dot" style="background:'+T(e.type).c+'"></span>').join('');
      return '<div class="'+cls+'" onclick="pcOpenDay(\''+ds+'\')">'
        +(rec!=null?'<span class="pc-cell-rec" style="background:'+recColor(rec)+'"></span>':'')
        +'<div class="pc-cell-num">'+c.d.getDate()+'</div>'
        +'<div class="pc-cell-dots">'+dots+(evs.length>3?'<span class="pc-cell-more">+'+(evs.length-3)+'</span>':'')+'</div></div>';
    }
    let h='<div class="pc-dow">'+['M','T','W','T','F','S','S'].map(x=>'<span>'+x+'</span>').join('')+'</div>';
    // weeks with a per-week training-load bar underneath
    for(let w=0;w<cells.length;w+=7){
      const week=cells.slice(w,w+7);
      let loads=week.map(c=>trainLoad(dk(c.d)));
      const maxL=Math.max(60,...loads);
      h+='<div class="pc-grid">'+week.map(cell).join('')+'</div>';
      h+='<div class="pc-wload">'+loads.map(l=>'<div class="pc-wload-c"><div class="pc-wload-bar" style="height:'+Math.round(l/maxL*100)+'%;background:'+(l?'#a78bfa':'transparent')+'"></div></div>').join('')+'</div>';
    }
    return h;
  }

  function renderWeek(){
    const ws=weekStartOf(cur),td=todayK();
    let strip='<div class="pc-strip">';
    for(let i=0;i<7;i++){
      const d=new Date(ws);d.setDate(ws.getDate()+i);const ds=dk(d);
      const evs=eventsOn(ds),rec=recovery(ds),ld=trainLoad(ds);
      let cls='pc-sd';if(ds===sel)cls+=' sel';if(ds===td)cls+=' today';
      const dots=evs.slice(0,4).map(e=>'<span class="pc-sd-dot" style="background:'+T(e.type).c+'"></span>').join('');
      strip+='<div class="'+cls+'" onclick="pcSelDay(\''+ds+'\')">'
        +'<span class="pc-sd-dow">'+DOW[i].slice(0,2)+'</span><div class="pc-sd-num">'+d.getDate()+'</div>'
        +'<span class="pc-sd-rec" style="background:'+recColor(rec)+'"></span>'
        +'<div class="pc-sd-dots">'+dots+'</div><span class="pc-sd-load">'+(ld?(ld/60).toFixed(1)+'h':'')+'</span></div>';
    }
    strip+='</div>';
    return strip+'<div style="height:1px;background:rgba(255,255,255,.06);margin:6px 0 4px"></div>'+timeline(sel);
  }

  function renderDay(){
    const evs=eventsOn(sel);
    let reco='<div class="pc-reco" onclick="genReco(1)">'+ICON.hyrox+'<span id="pcRecoText">'+(recoCached()||'Tap for today\'s AI recommendation…')+'</span></div>';
    const hard=evs.some(e=>T(e.type).train&&e.intensity==='hard');
    const hiPrio=evs.some(e=>e.priority==='high'&&!T(e.type).train);
    let warn=(hard&&hiPrio)?'<div class="pc-warn"><span>⚠</span><div>Hard training clashes with a high-priority event today — consider easing the session.</div></div>':'';
    return reco+warn+timeline(sel);
  }

  const HH=58; // px per hour
  function timeline(ds){
    const evs0=eventsOn(ds);
    const timed=evs0.filter(e=>e.time).map(e=>{const[h,m]=e.time.split(':').map(Number);const s=h*60+m;return Object.assign({},e,{_s:s,_e:s+Math.max(20,e.duration||45)});}).sort((a,b)=>a._s-b._s||a._e-b._e);
    const allday=evs0.filter(e=>!e.time);
    // dynamic visible window
    let startH=7,endH=21;
    if(timed.length){let mn=24*60,mx=0;timed.forEach(e=>{mn=Math.min(mn,e._s);mx=Math.max(mx,e._e);});startH=Math.max(0,Math.min(Math.floor(mn/60),7));endH=Math.min(24,Math.max(Math.ceil(mx/60),startH+9));}
    if(ds===todayK()){const nh=new Date().getHours();startH=Math.min(startH,Math.max(0,nh-1));endH=Math.max(endH,Math.min(24,nh+2));}
    // hour grid
    let rows='';
    for(let hr=startH;hr<endH;hr++){rows+='<div class="pc-hour" style="height:'+HH+'px"><div class="pc-hour-lbl">'+fmtHr(hr)+'</div><div class="pc-hour-line" style="min-height:'+HH+'px" onclick="pcAddAt(\''+ds+'\','+hr+')"></div></div>';}
    // overlap layout → columns
    layoutEvents(timed);
    let blocks='';
    timed.forEach(e=>{
      if(e._e<=startH*60||e._s>=endH*60)return;
      const top=(e._s-startH*60)/60*HH;
      const height=Math.max(24,(e._e-e._s)/60*HH-3);
      const c=T(e.type).c;
      const lf=(e.col/e.cols).toFixed(4);
      blocks+='<div class="pc-evt" style="top:'+top.toFixed(1)+'px;height:'+height.toFixed(1)+'px;left:calc(48px + (100% - 50px)*'+lf+');width:calc((100% - 50px)/'+e.cols+' - 3px);background:'+c+'22;box-shadow:0 0 16px '+c+'2e inset'+(e.strava?';outline:1.5px solid #f59e0b':'')+'" onclick="pcOpenEvt(\''+e.id+'\',\''+ds+'\')">'
        +'<div class="pc-evt-t" style="color:'+c+'"><span class="pc-evt-prio" style="background:'+(PRIO[e.priority]||PRIO.low).c+'"></span>'+(height>34?'<span style="opacity:.85;font-size:.9em">'+(ICON[e.type]||'')+'</span> ':'')+esc(e.title)+((e.strava||e.done)?' '+ok():'')+'</div>'
        +(height>40?'<div class="pc-evt-m" style="color:'+c+'">'+e.time+(e.duration?' · '+e.duration+'m':'')+(e.meta?' · '+esc(e.meta):'')+'</div>':'')+'</div>';
    });
    let now='';if(ds===todayK()){const n=new Date();const cm=n.getHours()*60+n.getMinutes();if(cm>=startH*60&&cm<endH*60)now='<div class="pc-nowline" style="top:'+((cm-startH*60)/60*HH)+'px"></div>';}
    let head=allday.length?'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">'+allday.map(e=>pill(e,ds)).join('')+'</div>':'';
    const total=(endH-startH)*HH;
    return head+'<div class="pc-tl-scroll" id="pcTLScroll"><div style="position:relative;height:'+total+'px"><div class="pc-tl" style="margin:0">'+rows+'</div><div style="position:absolute;top:0;left:0;right:0">'+blocks+now+'</div></div></div>';
  }
  function scrollToNow(){
    const sc=document.getElementById('pcTLScroll');if(!sc)return;
    const nl=sc.querySelector('.pc-nowline');
    if(nl){const top=parseFloat(nl.style.top)||0;sc.scrollTop=Math.max(0,top-sc.clientHeight*0.4);}
  }
  // assign each timed event a column index + total columns for its overlap cluster
  function layoutEvents(list){
    let cur=[],curEnd=-1;const clusters=[];
    list.forEach(ev=>{if(cur.length&&ev._s>=curEnd){clusters.push(cur);cur=[];curEnd=-1;}cur.push(ev);curEnd=Math.max(curEnd,ev._e);});
    if(cur.length)clusters.push(cur);
    clusters.forEach(cl=>{const cols=[];cl.forEach(ev=>{let i=0;for(;i<cols.length;i++){if(cols[i]<=ev._s)break;}cols[i]=ev._e;ev.col=i;});const n=cols.length;cl.forEach(ev=>ev.cols=n);});
  }
  function ok(){return '<svg viewBox="0 0 24 24" style="width:.85em;height:.85em;display:inline-block;vertical-align:-.1em" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';}
  function pill(e,ds){return '<span style="display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700;color:'+T(e.type).c+';background:'+T(e.type).c+'1e" onclick="pcOpenEvt(\''+e.id+'\',\''+ds+'\')"><span class="pc-evt-prio" style="background:'+(PRIO[e.priority]||PRIO.low).c+'"></span>'+esc(e.title)+'</span>';}
  function fmtHr(h){return h===12?'12p':h>12?(h-12)+'p':h+'a';}
  function fmtT(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return (h%12||12)+':'+pad(m)+(h<12?'am':'pm');}
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  window.pcView=function(v){view=v;render();};
  window.pcToday=function(){cur=new Date();sel=todayK();render();};
  window.pcPrev=function(){shift(-1);};window.pcNext=function(){shift(1);};
  function shift(n){
    if(view==='month')cur.setMonth(cur.getMonth()+n);
    else if(view==='week')cur.setDate(cur.getDate()+7*n);
    else{const d=parseD(sel);d.setDate(d.getDate()+n);sel=dk(d);cur=new Date(d);}
    render(n>0?'l':'r');
  }
  window.pcSelDay=function(ds){sel=ds;render();};
  function bindSwipe(){
    const c=document.getElementById('pcCard');if(!c)return;let sx=0,sy=0;
    c.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
    c.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.6){dx<0?shift(1):shift(-1);}},{passive:true});
  }

  window.pcOpenDay=function(ds){
    sel=ds;const d=parseD(ds),evs=eventsOn(ds),rec=recovery(ds);
    let h='<div class="pc-handle"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
      +'<div class="pc-sheet-title" style="margin:0">'+d.toLocaleDateString('en',{weekday:'long',month:'short',day:'numeric'})+'</div>'
      +(rec!=null?'<span style="font-size:12px;font-weight:700;color:'+recColor(rec)+'">'+rec+'% rec</span>':'')+'</div>';
    h+=evs.length?evs.slice().sort((a,b)=>(a.time||'99').localeCompare(b.time||'99')).map(e=>deRow(e,ds)).join(''):'<div class="pc-empty">No events.</div>';
    h+='<button class="pc-btn pri" style="margin-top:12px" onclick="pcCloseDaySheet();pcAddAt(\''+ds+'\',9)">+ Add Event</button>';
    document.getElementById('pcDayPanel').innerHTML=h;document.getElementById('pcDaySheet').classList.add('open');
  };
  window.pcCloseDaySheet=function(){document.getElementById('pcDaySheet').classList.remove('open');render();};
  function deRow(e,ds){
    const c=T(e.type).c;const meta=[fmtT(e.time),e.duration?e.duration+'min':null,e.meta||null].filter(Boolean).join(' · ');
    return '<div class="pc-de" onclick="pcOpenEvt(\''+e.id+'\',\''+ds+'\')"><div class="pc-de-bar" style="background:'+c+';box-shadow:0 0 10px '+c+'"></div>'
      +'<div class="pc-de-b"><div class="pc-de-t" style="color:'+c+'"><span class="pc-evt-prio" style="background:'+(PRIO[e.priority]||PRIO.low).c+'"></span>'+esc(e.title)+(e.strava?' '+ok():'')+'</div>'+(meta?'<div class="pc-de-m">'+meta+'</div>':'')+'</div>'
      +(T(e.type).train&&!e.strava?'<button class="pc-de-check '+(e.done?'done':'')+'" onclick="event.stopPropagation();pcToggleDone(\''+e.id+'\')">'+(e.done?ok():'')+'</button>':'')+'</div>';
  }
  window.pcToggleDone=function(id){const s=load();const e=s.events.find(x=>x.id===id);if(e){e.done=!e.done;save(s);document.getElementById('pcDaySheet').classList.contains('open')?pcOpenDay(sel):render();}};

  let editId=null,formType='run',formPrio='medium';
  window.pcQuickAdd=function(){openForm(null,sel,null);};
  window.pcAddAt=function(ds,hr){openForm(null,ds,hr!=null?pad(hr)+':00':null);};
  window.pcOpenEvt=function(id,ds){
    if(String(id).indexOf('sv_')===0){
      const a=(strava().activities||[]).find(x=>'sv_'+x.id===id);if(!a)return;const c=T(a.disc).c;
      document.getElementById('pcSheetPanel').innerHTML='<div class="pc-handle"></div><div class="pc-sheet-title" style="color:'+c+'">'+esc(a.name||T(a.disc).l)+'</div>'
        +'<div style="font-size:13px;color:rgba(255,255,255,.6);line-height:1.9">'+[a.distanceKm?a.distanceKm+' km':'',a.durationMin?a.durationMin+' min':'',a.pace||'',a.avgHr?Math.round(a.avgHr)+' bpm avg':'',a.elevM?a.elevM+' m elev':''].filter(Boolean).join('<br>')+'</div>'
        +'<div style="margin-top:10px;font-size:12px;color:#f59e0b;font-weight:700">Completed · Strava</div><button class="pc-btn sec" onclick="pcCloseSheet()">Close</button>';
      document.getElementById('pcSheet').classList.add('open');return;
    }
    openForm(id,ds,null);
  };
  function openForm(id,ds,time){
    const s=load();const e=id?s.events.find(x=>x.id===id):null;
    editId=id;formType=e?e.type:'run';formPrio=e?(e.priority||'medium'):'medium';
    const p=document.getElementById('pcSheetPanel');
    p.innerHTML='<div class="pc-handle"></div><div class="pc-sheet-title">'+(id?'Edit':'New')+' Event</div>'
      +'<div class="pc-type-grid" id="pcTypeGrid">'+Object.keys(TYPES).map(k=>'<div class="pc-type'+(k===formType?' sel':'')+'" style="color:'+TYPES[k].c+'" onclick="pcSelType(\''+k+'\')"><span class="pc-type-ic" style="color:'+TYPES[k].c+'">'+ICON[k]+'</span><span class="pc-type-l">'+TYPES[k].l+'</span></div>').join('')+'</div>'
      +'<div class="pc-f"><label>Title</label><input id="pcfTitle" placeholder="Name" value="'+esc(e?e.title:'')+'"></div>'
      +'<div id="pcfBody"></div>'
      +'<button class="pc-btn pri" onclick="pcSaveEvt()">Save</button>'
      +(id?'<button class="pc-btn del" onclick="pcDelEvt()">Delete</button>':'')
      +'<button class="pc-btn sec" onclick="pcCloseSheet()">Cancel</button>';
    document.getElementById('pcSheet').classList.add('open');
    renderFormBody(e,ds,time);
  }
  window.pcSelType=function(k){formType=k;document.querySelectorAll('#pcTypeGrid .pc-type').forEach((el,i)=>el.classList.toggle('sel',Object.keys(TYPES)[i]===k));renderFormBody(editId?load().events.find(x=>x.id===editId):null,null,null);};
  function renderFormBody(e,ds,time){
    const body=document.getElementById('pcfBody');if(!body)return;
    const date=e?e.date:(ds||sel),tm=time||(e?e.time:'');const t=T(formType);
    function f(label,inner){return '<div class="pc-f"><label>'+label+'</label>'+inner+'</div>';}
    let h='';
    if(formType==='birthday'){h=f('Date','<input type="date" id="pcfDate" value="'+date+'">');}
    else if(t.train){
      h='<div class="pc-f-row">'+f('Date','<input type="date" id="pcfDate" value="'+date+'">')+f('Time','<input type="time" id="pcfTime" value="'+tm+'">')+'</div>'
        +'<div class="pc-f-row">'+f('Duration (min)','<input type="number" id="pcfDur" value="'+((e&&e.duration)||60)+'">')
        +f('Intensity','<select id="pcfInt"><option value="easy">Easy</option><option value="moderate"'+(e&&e.intensity==='moderate'?' selected':'')+'>Moderate</option><option value="hard"'+(e&&e.intensity==='hard'?' selected':'')+'>Hard</option></select>')+'</div>';
    } else {
      h='<div class="pc-f-row">'+f('Date','<input type="date" id="pcfDate" value="'+date+'">')+f('Time','<input type="time" id="pcfTime" value="'+tm+'">')+'</div>';
      if(t.span)h+=f('End date (optional)','<input type="date" id="pcfEnd" value="'+((e&&e.endDate)||'')+'">');
      h+='<div class="pc-f"><label>Priority</label><div class="pc-prio">'+Object.keys(PRIO).map(k=>'<div class="pc-prio-opt'+(k===formPrio?' sel':'')+'" style="color:'+PRIO[k].c+'" onclick="pcSelPrio(\''+k+'\')"><span class="pc-prio-dot" style="background:'+PRIO[k].c+'"></span>'+PRIO[k].l+'</div>').join('')+'</div></div>';
    }
    h+='<div class="pc-f-row">'
      +f('Reminder','<select id="pcfRem"><option value="">None</option><option value="15"'+(e&&e.reminder=='15'?' selected':'')+'>15 min</option><option value="30"'+(e&&e.reminder=='30'?' selected':'')+'>30 min</option><option value="60"'+(e&&e.reminder=='60'?' selected':'')+'>1 hr</option><option value="120"'+(e&&e.reminder=='120'?' selected':'')+'>2 hr</option></select>')
      +f('Repeat','<select id="pcfRep"><option value="">Never</option><option value="daily"'+(e&&e.recurring==='daily'?' selected':'')+'>Daily</option><option value="weekly"'+(e&&e.recurring==='weekly'?' selected':'')+'>Weekly</option><option value="monthly"'+(e&&e.recurring==='monthly'?' selected':'')+'>Monthly</option><option value="yearly"'+(e&&e.recurring==='yearly'?' selected':'')+'>Yearly</option></select>')+'</div>';
    body.innerHTML=h;
  }
  window.pcSelPrio=function(k){formPrio=k;document.querySelectorAll('.pc-prio-opt').forEach((el,i)=>el.classList.toggle('sel',Object.keys(PRIO)[i]===k));};
  window.pcSaveEvt=function(){
    const s=load();const g=id=>document.getElementById(id);
    const ev={id:editId||uid(),type:formType,title:(g('pcfTitle').value||T(formType).l),
      date:g('pcfDate')?g('pcfDate').value:sel,time:g('pcfTime')?g('pcfTime').value:'',
      duration:g('pcfDur')?parseInt(g('pcfDur').value)||null:null,intensity:g('pcfInt')?g('pcfInt').value:null,
      endDate:(g('pcfEnd')&&g('pcfEnd').value)?g('pcfEnd').value:null,priority:formPrio,
      reminder:g('pcfRem')?g('pcfRem').value:'',recurring:g('pcfRep')?g('pcfRep').value:'',
      done:editId?((s.events.find(x=>x.id===editId)||{}).done||false):false};
    if(T(formType).yearly)ev.recurring='yearly';
    const i=s.events.findIndex(x=>x.id===editId);if(i>=0)s.events[i]=ev;else s.events.push(ev);
    save(s);sel=ev.date;cur=parseD(ev.date);pcCloseSheet();scheduleNotif(ev);render();
  };
  window.pcDelEvt=function(){const s=load();s.events=s.events.filter(x=>x.id!==editId);save(s);pcCloseSheet();render();};
  window.pcCloseSheet=function(){document.getElementById('pcSheet').classList.remove('open');};

  function scheduleNotif(ev){if(!ev.reminder||Notification.permission!=='granted'||!ev.time||!ev.date)return;const t=new Date(ev.date+'T'+ev.time)-ev.reminder*60000-Date.now();if(t>0&&t<864e5)setTimeout(()=>new Notification(ev.title,{body:'in '+ev.reminder+' min'}),t);}
  function morningSummary(){if(Notification.permission!=='granted')return;const k='cal_morn_'+todayK();if(localStorage.getItem(k))return;if(new Date().getHours()<7)return;const evs=eventsOn(todayK());if(!evs.length)return;new Notification('Today: '+evs.length+' events',{body:evs.map(e=>e.title).join(', ')});localStorage.setItem(k,'1');}

  function recoCached(){try{const c=JSON.parse(localStorage.getItem('cal_reco_v1'));return c&&c.date===todayK()?c.text:null;}catch{return null;}}
  window.genReco=async function(force){
    const el=document.getElementById('pcRecoText');
    if(!force&&recoCached()){if(el)el.textContent=recoCached();return;}
    if(!groqKey()){if(force&&el)el.textContent='Add a Groq key in Settings for AI recommendations.';return;}
    if(force&&el)el.textContent='Thinking…';
    const evs=eventsOn(todayK()).map(e=>e.title+'('+e.type+(e.priority?'/'+e.priority:'')+')').join(', ');
    const rec=recovery(todayK());
    const ctx='Today recovery: '+(rec!=null?rec+'%':'unknown')+'. Today events: '+(evs||'none')+'.';
    try{
      const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey()},
        body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:'You are a training & schedule coach. Give ONE concise sentence recommendation for today based on recovery and events. No preamble.'},{role:'user',content:ctx}],max_tokens:60,temperature:0.5})});
      const d=await r.json();if(!r.ok)throw 0;
      const text=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'').trim();
      if(text){localStorage.setItem('cal_reco_v1',JSON.stringify({date:todayK(),text}));if(el)el.textContent=text;}
    }catch(e){if(force&&el)el.textContent='Could not generate recommendation.';}
  };

  window.pcRender=render;
  function boot(){render();morningSummary();}
  if(document.getElementById('cal-root'))boot();else document.addEventListener('DOMContentLoaded',boot);
  window.addEventListener('storage',e=>{if(['calendar_v1','whoop_data_v1','strava_data_v1'].includes(e.key))render();});
  if(window.initCloudSync){window.initCloudSync({appKey:'calendar',syncedKeys:[CAL_KEY],onApplied:render});}
  })();
  </script>

    <!-- PLAN TOMORROW -->
    <div class="gm-card gm-card-tomorrow" id="gmCardTomorrow">
      <div class="gm-header">
        <div class="gm-header-left">
          <div class="gm-eyebrow" id="tomorrowLabel">Plan tomorrow —</div>
          <div class="gm-tomorrow-sub">Write tonight, locked until 6 AM.</div>
        </div>
        <div class="gm-tomorrow-count" id="gmTomorrowCount">0 planned</div>
      </div>
      <ul id="tomorrowList" class="goal-list gm-list"></ul>
      <div id="tomorrowEmpty" class="empty-state">Nothing planned for tomorrow yet</div>
      <div class="goal-input-wrap gm-input-wrap">
        <input id="tomorrowInput" class="gm-input" type="text" placeholder="Add a goal for tomorrow…" autocomplete="off">
        <button type="button" id="tomorrowAddBtn"    class="gm-add">+ Add</button>
        <button type="button" id="tomorrowPolishBtn" class="gm-polish"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9zM19 15l.7 1.8L21.5 17l-1.8.7L19 19.5l-.7-1.8L16.5 17l1.8-.7zM5 15l.7 1.8L7.5 17l-1.8.7L5 19.5l-.7-1.8L2.5 17l1.8-.7z"/></svg> Polish</button>
        <div class="gm-status" id="tomorrowStatus"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════ CALENDAR (moved below To Do List) ══════════════ -->
  <div id="cal-root"></div>

</div>

<script>
(function () {
  'use strict';

  function getGroqKey() { return localStorage.getItem('groq_api_key') || ''; }
  function promptGroqKey() {
    const k = window.prompt('Enter your Groq API key to enable AI Polish:\n(Free at console.groq.com → API Keys → Create API Key)');
    if (k && k.trim()) { localStorage.setItem('groq_api_key', k.trim()); return k.trim(); }
    return '';
  }

  const WAKE_HOUR  = 8;
  const SLEEP_HOUR = 24;

  // ---------- storage helpers ----------
  function storeGet(key) {
    try { return JSON.parse(localStorage.getItem(key)); } catch (e) { return null; }
  }
  function storeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
    if (typeof key === 'string' && key.indexOf('goals:') === 0) {
      window.dispatchEvent(new CustomEvent('goals-changed'));
    }
  }
  function storeDelete(key) { try { localStorage.removeItem(key); } catch (e) {} }
  function storeListKeys(prefix) {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf(prefix) === 0) out.push(k);
    }
    return out;
  }

  // ---------- date helpers ----------
  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateToKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function getActiveDateString() {
    const now = new Date();
    if (now.getHours() < 6) {
      const d = new Date(now);
      d.setDate(d.getDate() - 1);
      return dateToKey(d);
    }
    return dateToKey(now);
  }
  function getTomorrowDateString() {
    const now = new Date();
    const d = new Date(now);
    if (now.getHours() >= 6) d.setDate(d.getDate() + 1);
    return dateToKey(d);
  }
  function formatDate(yyyy_mm_dd) {
    const parts = yyyy_mm_dd.split('-').map(Number);
    const d = new Date(parts[0], parts[1] - 1, parts[2]);
    const wk = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    return wk + ', ' + mo + ' ' + d.getDate();
  }

  function todayKey()    { return 'goals:' + getActiveDateString(); }
  function tomorrowKey() { return 'goals:' + getTomorrowDateString(); }

  function getGoals(key) {
    const g = storeGet(key);
    return Array.isArray(g) ? g : [];
  }
  function setGoals(key, list) { storeSet(key, list); }

  // ---------- rollover: pull undone older goals into today ----------
  function rollover() {
    const todayDateStr = getActiveDateString();
    const todayK = 'goals:' + todayDateStr;
    let today = getGoals(todayK);
    const texts = new Set(today.map(g => g.text));

    storeListKeys('goals:').forEach(k => {
      const dateStr = k.slice('goals:'.length);
      if (dateStr >= todayDateStr) return;
      const old = getGoals(k);
      old.forEach(g => {
        if (!g.done && g.text && !texts.has(g.text)) {
          today.push({ text: g.text, done: false });
          texts.add(g.text);
        }
      });
      storeDelete(k);
    });
    setGoals(todayK, today);
  }

  // ---------- streak ----------
  function loadStreak() {
    const s = storeGet('goal_streak_v1');
    if (s && typeof s.count === 'number') return s;
    return { count: 0, lastProcessedDate: '' };
  }
  function saveStreak(s) { storeSet('goal_streak_v1', s); }

  function processStreak() {
    const s = loadStreak();
    const todayDateStr = getActiveDateString();
    const keys = storeListKeys('goals:')
      .map(k => k.slice('goals:'.length))
      .filter(d => d < todayDateStr)
      .sort();
    keys.forEach(dateStr => {
      if (s.lastProcessedDate && dateStr <= s.lastProcessedDate) return;
      const list = getGoals('goals:' + dateStr);
      if (list.length === 0) { /* don't break the streak on empty days */ }
      else if (list.every(g => g.done)) s.count += 1;
      else s.count = 0;
      s.lastProcessedDate = dateStr;
    });
    saveStreak(s);
  }

  // ---------- Goal Ticker ----------
  const tickerStage = document.getElementById('goalTickerStage');
  const tickerMeta  = document.getElementById('goalTickerMeta');
  let cycleIdx = 0;
  let tickerTimer = null;

  function buildTickerItems() {
    const goals = getGoals(todayKey());
    const total = goals.length;
    const done  = goals.filter(g => g.done).length;
    if (total === 0) return { items: [{ status: 'empty',   text: 'No goals set for today — add one to get rolling.' }], done, total };
    if (done === total) return { items: [{ status: 'done', text: '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg> All goals done — solid day.' }], done, total };
    const items = goals.filter(g => !g.done).map(g => ({ status: 'pending', text: g.text }));
    return { items, done, total };
  }

  function statusGlyph(status) {
    if (status === 'done') return '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>';
    if (status === 'pending') return '○';
    return '·';
  }

  let firstTick = true;
  function tick() {
    const { items, done, total } = buildTickerItems();
    if (cycleIdx >= items.length) cycleIdx = 0;
    const item = items[cycleIdx];
    cycleIdx = (cycleIdx + 1) % items.length;
    tickerMeta.textContent = done + '/' + total;

    let row = tickerStage.querySelector('.goal-ticker-row');
    if (!row) {
      row = document.createElement('div');
      row.className = 'goal-ticker-row';
      row.innerHTML =
        '<span class="goal-ticker-status"></span>' +
        '<span class="goal-ticker-text"></span>';
      tickerStage.appendChild(row);
    }

    const statusEl = row.querySelector('.goal-ticker-status');
    const textEl   = row.querySelector('.goal-ticker-text');

    const apply = () => {
      statusEl.setAttribute('data-status', item.status);
      statusEl.innerHTML = statusGlyph(item.status);
      textEl.textContent = item.text;
      row.classList.remove('is-fading');
    };

    if (firstTick) { apply(); firstTick = false; return; }
    row.classList.add('is-fading');
    setTimeout(apply, 220);
  }

  function startTicker() {
    tick();
    if (tickerTimer) clearInterval(tickerTimer);
    tickerTimer = setInterval(tick, 5000);
  }

  window.addEventListener('goals-changed', () => {
    cycleIdx = 0;
    tick();
  });

  // ---------- Day Ring ----------
  const PALETTE = [
    [0,    [255, 216, 158]],
    [12.5, [255, 205, 121]],
    [25,   [255, 227, 143]],
    [37.5, [255, 183, 106]],
    [50,   [255, 149,  89]],
    [62.5, [243, 111,  79]],
    [75,   [226,  93, 122]],
    [87.5, [123,  91, 176]],
    [100,  [ 47,  58, 102]]
  ];
  function lerp(a, b, t) { return a + (b - a) * t; }
  function paletteAt(p) {
    if (p <= PALETTE[0][0]) return PALETTE[0][1];
    if (p >= PALETTE[PALETTE.length - 1][0]) return PALETTE[PALETTE.length - 1][1];
    for (let i = 0; i < PALETTE.length - 1; i++) {
      const [p0, c0] = PALETTE[i];
      const [p1, c1] = PALETTE[i + 1];
      if (p >= p0 && p <= p1) {
        const t = (p - p0) / (p1 - p0);
        return [lerp(c0[0], c1[0], t), lerp(c0[1], c1[1], t), lerp(c0[2], c1[2], t)];
      }
    }
    return [255,255,255];
  }
  function rgb(c) { return 'rgb(' + Math.round(c[0]) + ',' + Math.round(c[1]) + ',' + Math.round(c[2]) + ')'; }

  function formatClock(d) {
    let h = d.getHours();
    const m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12;
    if (h === 0) h = 12;
    return h + ':' + pad2(m) + ' ' + ampm;
  }
  function formatRemaining(totalMin) {
    const h = Math.floor(totalMin / 60);
    const m = Math.floor(totalMin % 60);
    return h + 'h ' + m + 'm';
  }

  const C = 2 * Math.PI * 52;
  const fillEl = document.getElementById('dayRingFill');
  fillEl.setAttribute('stroke-dasharray', C);
  fillEl.setAttribute('stroke-dashoffset', C);

  function updateDayRing() {
    const now = new Date();
    const hours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
    const percentEl   = document.getElementById('dayRingPercent');
    const phaseEl     = document.getElementById('dayRingPhase');
    const clockEl     = document.getElementById('dayRingClock');
    const statusEl    = document.getElementById('dayRingStatus');
    const remainingEl = document.getElementById('dayRingRemaining');

    clockEl.textContent = formatClock(now);

    if (hours < WAKE_HOUR) {
      fillEl.setAttribute('stroke-dashoffset', C);
      fillEl.style.stroke = '#4D4B47';
      percentEl.textContent = '—';
      phaseEl.textContent   = 'SLEEPING';
      statusEl.innerHTML  = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg> Still sleeping';
      const minsUntil = (WAKE_HOUR - hours) * 60;
      remainingEl.textContent = formatRemaining(minsUntil) + ' until wake-up';
      return;
    }

    if (hours >= SLEEP_HOUR) {
      fillEl.setAttribute('stroke-dashoffset', 0);
      fillEl.style.stroke = '#E25D7A';
      percentEl.textContent = '100%';
      phaseEl.textContent   = 'PAST BEDTIME';
      statusEl.innerHTML  = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg> Past bedtime';
      remainingEl.textContent = 'Sleep!';
      return;
    }

    const span = SLEEP_HOUR - WAKE_HOUR;
    const percent = (hours - WAKE_HOUR) / span * 100;
    fillEl.setAttribute('stroke-dashoffset', C * (1 - percent / 100));
    fillEl.style.stroke = rgb(paletteAt(percent));
    percentEl.textContent = Math.floor(percent) + '%';

    let phase, status;
    if (percent < 25)      { phase = 'MORNING';   status = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>️ Morning — fresh start'; }
    else if (percent < 50) { phase = 'MIDDAY';    status = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M13 2 3 14h9l-1 8 10-12h-9z"/></svg> Midday — keep moving'; }
    else if (percent < 75) { phase = 'AFTERNOON'; status = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.4-.5-2-1-3-1.1-2.1-.2-4 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.2.4-2.3 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg> Afternoon — push it'; }
    else if (percent < 90) { phase = 'EVENING';   status = '⏳ Evening — wrap up'; }
    else                   { phase = 'BEDTIME';   status = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg> Bedtime soon'; }
    phaseEl.textContent  = phase;
    statusEl.innerHTML = status;

    const minsLeft = (SLEEP_HOUR - hours) * 60;
    remainingEl.textContent = formatRemaining(minsLeft) + ' awake time left';
  }

  // ---------- Row building ----------
  function makeInlineEdit(textEl, goals, idx, key, reload) {
    textEl.addEventListener('click', () => {
      if (textEl.getAttribute('contenteditable') === 'true') return;
      const original = textEl.textContent;
      textEl.setAttribute('contenteditable', 'true');
      textEl.focus();
      const range = document.createRange();
      range.selectNodeContents(textEl);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);

      function commit() {
        const next = textEl.textContent.trim();
        textEl.removeAttribute('contenteditable');
        if (next && next !== original) {
          const list = getGoals(key);
          if (list[idx]) { list[idx].text = next; setGoals(key, list); }
          reload();
        } else {
          textEl.textContent = original;
        }
      }
      function cancel() {
        textEl.removeAttribute('contenteditable');
        textEl.textContent = original;
      }
      textEl.addEventListener('blur', commit, { once: true });
      textEl.addEventListener('keydown', function onKey(e) {
        if (e.key === 'Enter') { e.preventDefault(); textEl.removeEventListener('keydown', onKey); textEl.blur(); }
        else if (e.key === 'Escape') { e.preventDefault(); textEl.removeEventListener('keydown', onKey); cancel(); }
      });
    });
  }

  function wireDragReorder(row, listEl, key, reload) {
    row.setAttribute('draggable', 'true');
    row.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', row.dataset.idx);
    });
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      row.classList.add('is-drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('is-drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      row.classList.remove('is-drag-over');
      const from = parseInt(e.dataTransfer.getData('text/plain'), 10);
      const to   = parseInt(row.dataset.idx, 10);
      if (isNaN(from) || isNaN(to) || from === to) return;
      const list = getGoals(key);
      const [moved] = list.splice(from, 1);
      list.splice(to, 0, moved);
      setGoals(key, list);
      reload();
    });
  }

  function buildGoalRow(goal, idx, key, readOnly, reload) {
    const li = document.createElement('li');
    li.className = 'gm-row';
    li.dataset.idx = String(idx);
    if (goal.done) li.classList.add('gm-row-done');
    if (goal.queued) li.classList.add('gm-row-queued');

    const handle = document.createElement('span');
    handle.className = 'gm-handle';
    handle.textContent = '⋮⋮';
    li.appendChild(handle);

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'gm-check';
    cb.checked = !!goal.done;
    if (readOnly) { cb.disabled = true; cb.title = 'Activates at 6 AM tomorrow'; }
    cb.addEventListener('change', () => {
      const list = getGoals(key);
      if (!list[idx]) return;
      list[idx].done = cb.checked;
      if (cb.checked) list[idx].doneAt = Date.now();
      else delete list[idx].doneAt;
      setGoals(key, list);
      reload();
    });
    li.appendChild(cb);

    const text = document.createElement('span');
    text.className = 'gm-text';
    text.textContent = goal.text;
    li.appendChild(text);
    makeInlineEdit(text, null, idx, key, reload);

    const queueBtn = document.createElement('button');
    queueBtn.type = 'button';
    queueBtn.className = 'gm-queue-btn' + (goal.queued ? ' gm-queue-active' : '');
    queueBtn.innerHTML = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M13 2 3 14h9l-1 8 10-12h-9z"/></svg>';
    queueBtn.title = 'Queue for productivity window';
    if (readOnly) queueBtn.disabled = true;
    queueBtn.addEventListener('click', () => {
      const list = getGoals(key);
      if (!list[idx]) return;
      list[idx].queued = !list[idx].queued;
      setGoals(key, list);
      li.classList.add('is-queue-flashing');
      setTimeout(reload, 480);
    });
    li.appendChild(queueBtn);

    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'goal-delete';
    del.setAttribute('aria-label', 'Delete goal');
    del.textContent = '×';
    del.addEventListener('click', () => {
      const list = getGoals(key);
      list.splice(idx, 1);
      setGoals(key, list);
      reload();
    });
    li.appendChild(del);

    wireDragReorder(li, null, key, reload);
    return li;
  }

  // ---------- Renderers ----------
  function renderTodayHeader() {
    const goals = getGoals(todayKey());
    const total = goals.length;
    const done  = goals.filter(g => g.done).length;
    document.getElementById('gmProgressNum').textContent   = done;
    document.getElementById('gmProgressTotal').textContent = '/ ' + total;
    const label = document.getElementById('gmProgressLabel');
    if (total === 0)        label.textContent = 'no goals yet';
    else if (done === total) label.textContent = 'all done — solid day';
    else                     label.textContent = 'complete';

    document.getElementById('todayLabel').textContent =
      'Today — ' + formatDate(getActiveDateString());

    const bar = document.getElementById('gmBar');
    bar.innerHTML = '';
    goals.forEach(g => {
      const seg = document.createElement('div');
      seg.className = 'gm-bar-seg' + (g.done ? ' gm-bar-seg-done' : '');
      bar.appendChild(seg);
    });

    const card = document.getElementById('gmCardToday');
    card.classList.toggle('gm-all-done', total > 0 && done === total);

    const pushBtn = document.getElementById('gmPushBtn');
    pushBtn.style.display = (total > 0 && done < total) ? 'block' : 'none';
  }

  function renderStreak() {
    const s = loadStreak();
    document.getElementById('gmStreakNum').textContent = s.count;
    document.getElementById('gmStreak').classList.toggle('gm-streak-active', s.count > 0);
  }

  function renderTomorrowCount() {
    const list = getGoals(tomorrowKey());
    document.getElementById('gmTomorrowCount').textContent = list.length + ' planned';
    document.getElementById('tomorrowLabel').textContent =
      'Plan tomorrow — ' + formatDate(getTomorrowDateString());
  }

  function renderListInto(goals, listEl, emptyEl, key, readOnly) {
    listEl.innerHTML = '';
    emptyEl.style.display = goals.length === 0 ? 'block' : 'none';
    const reload = () => (key === todayKey() ? loadToday() : loadTomorrow());

    const visible = goals.length > 5 ? goals.slice(0, 5) : goals;
    visible.forEach((g, i) => listEl.appendChild(buildGoalRow(g, i, key, readOnly, reload)));

    if (goals.length > 5) {
      let expanded = false;
      const toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'gm-show-toggle';
      const updateLabel = () => {
        toggle.textContent = expanded ? 'Show less ▴' : ('Show ' + (goals.length - 5) + ' more ▾');
      };
      updateLabel();
      toggle.addEventListener('click', () => {
        expanded = !expanded;
        if (expanded) {
          goals.slice(5).forEach((g, i) => {
            const row = buildGoalRow(g, i + 5, key, readOnly, reload);
            listEl.insertBefore(row, toggle);
          });
        } else {
          Array.from(listEl.querySelectorAll('.gm-row')).slice(5).forEach(r => r.remove());
        }
        updateLabel();
      });
      listEl.appendChild(toggle);
    }

    if (key === todayKey()) renderTodayHeader();
    else                    renderTomorrowCount();
  }

  function loadToday() {
    const goals = getGoals(todayKey());
    renderListInto(goals, document.getElementById('goalList'), document.getElementById('emptyState'), todayKey(), false);
  }
  function loadTomorrow() {
    const goals = getGoals(tomorrowKey());
    renderListInto(goals, document.getElementById('tomorrowList'), document.getElementById('tomorrowEmpty'), tomorrowKey(), true);
  }

  // ---------- Push remaining ----------
  document.getElementById('gmPushBtn').addEventListener('click', () => {
    const today    = getGoals(todayKey());
    const remaining = today.filter(g => !g.done);
    if (remaining.length === 0) return;
    if (!confirm('Move ' + remaining.length + ' unchecked goal' + (remaining.length === 1 ? '' : 's') + ' to tomorrow?')) return;
    const tomorrow = getGoals(tomorrowKey());
    const seen = new Set(tomorrow.map(g => g.text));
    remaining.forEach(g => {
      if (!seen.has(g.text)) { tomorrow.push({ text: g.text, done: false }); seen.add(g.text); }
    });
    setGoals(tomorrowKey(), tomorrow);
    setGoals(todayKey(), today.filter(g => g.done));
    loadToday(); loadTomorrow();
  });

  // ---------- Add + Polish handlers ----------
  function showStatus(el, message, isError) {
    el.textContent = message;
    el.classList.toggle('gm-status-error', !!isError);
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.textContent = ''; el.classList.remove('gm-status-error'); }, 3500);
  }

  function localPolish(text) {
    // Ensure starts with capital, ends with period, trimmed to 60 chars
    let t = text.trim();
    // Capitalize first letter
    t = t.charAt(0).toUpperCase() + t.slice(1);
    // Strip trailing punctuation then add period
    t = t.replace(/[.!?,;]+$/, '') + '.';
    // Trim to 60 chars at word boundary
    if (t.length > 60) t = t.slice(0, 57).replace(/\s\S*$/, '…');
    return t;
  }

  async function polishOne(text, key) {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content:
          'Rewrite this goal to be concrete and action-oriented, max 60 characters. Reply with only the rewritten goal — no quotes, no explanation.\n\nGoal: ' + text
        }],
        max_tokens: 80,
        temperature: 0.4
      })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error?.message || 'API error ' + res.status);
    const content = (data?.choices?.[0]?.message?.content || '').trim();
    if (!content) throw new Error('empty response');
    return content.replace(/^["'`]|["'`]$/g, '').trim();
  }

  function makeAddHandlers(input, addBtn, polishBtn, key, statusEl, reload) {
    function plainAdd(text) {
      const list = getGoals(key);
      list.push({ text, done: false });
      setGoals(key, list);
      input.value = '';
      reload();
    }
    addBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;
      plainAdd(text);
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); }
    });
    polishBtn.addEventListener('click', async () => {
      const text = input.value.trim();
      if (!text) return;
      polishBtn.disabled = true;
      polishBtn.textContent = '…';
      const apiKey = getGroqKey();
      if (apiKey) {
        try {
          const polished = await polishOne(text, apiKey);
          plainAdd(polished);
          showStatus(statusEl, '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg> AI polished', false);
          return;
        } catch (e) {
          const msg = e.message || '';
          if (msg.includes('quota') || msg.includes('429') || msg.includes('rate_limit') || msg.includes('limit')) {
            showStatus(statusEl, 'Groq rate limit — using local polish. Try again shortly.', true);
          }
          // fall through to local polish
        } finally {
          polishBtn.disabled = false;
          polishBtn.innerHTML = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9zM19 15l.7 1.8L21.5 17l-1.8.7L19 19.5l-.7-1.8L16.5 17l1.8-.7zM5 15l.7 1.8L7.5 17l-1.8.7L5 19.5l-.7-1.8L2.5 17l1.8-.7z"/></svg> Polish';
        }
      }
      // Local polish fallback — always works
      plainAdd(localPolish(text));
      if (!apiKey) showStatus(statusEl, 'Locally polished. Add Groq key in Settings (<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82L4.2 7.12a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>) for AI.', false);
      polishBtn.disabled = false;
      polishBtn.innerHTML = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9zM19 15l.7 1.8L21.5 17l-1.8.7L19 19.5l-.7-1.8L16.5 17l1.8-.7zM5 15l.7 1.8L7.5 17l-1.8.7L5 19.5l-.7-1.8L2.5 17l1.8-.7z"/></svg> Polish';
    });
  }

  makeAddHandlers(
    document.getElementById('goalInput'),
    document.getElementById('goalAddBtn'),
    document.getElementById('goalPolishBtn'),
    todayKey(),
    document.getElementById('polishStatus'),
    loadToday
  );
  makeAddHandlers(
    document.getElementById('tomorrowInput'),
    document.getElementById('tomorrowAddBtn'),
    document.getElementById('tomorrowPolishBtn'),
    tomorrowKey(),
    document.getElementById('tomorrowStatus'),
    loadTomorrow
  );

  // ---------- Boot ----------
  rollover();
  processStreak();
  loadToday();
  loadTomorrow();
  renderStreak();
  updateDayRing();
  setInterval(updateDayRing, 60 * 1000);
  startTicker();

  // Re-render when storage changes from another tab (or our bridged parent).
  window.addEventListener('storage', () => {
    loadToday(); loadTomorrow(); renderStreak();
  });
})();
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'goals',
    syncedPrefixes: ['goals:'],
    onApplied: function () {
      window.dispatchEvent(new CustomEvent('goals-changed'));
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>
