<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#000000">
<title>Nutrition Log</title>
<script src="topbar.js" defer></script>
<style>
/* ── DESIGN TOKENS (all dark) ── */
:root {
  --bg:#000; --bg2:#1c1c1e; --bg3:#2c2c2e; --bg4:#3a3a3c;
  --t1:#fff; --t2:rgba(255,255,255,.85); --t3:#8e8e93;
  --sep:rgba(255,255,255,.08); --sep2:rgba(255,255,255,.18);
  --r:14px;
  --kcal:#3b82f6; --pro:#f87171; --fat:#fbbf24; --carb:#34d399;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;color:#fff;font-family:var(--font);min-height:100vh;overflow-x:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
input,select,textarea{font-size:16px;font-family:var(--font);color:#fff}
button{font-family:var(--font);cursor:pointer}

/* ── ONBOARDING (dark) ── */
#ob{position:fixed;inset:0;background:#000;z-index:200;display:flex;flex-direction:column;overflow:hidden}
#ob.gone{display:none}
.ob-nav{display:flex;align-items:center;justify-content:center;padding:12px 16px;padding-top:max(14px,env(safe-area-inset-top));position:relative;flex-shrink:0;background:#000}
.ob-back{position:absolute;left:12px;background:none;border:none;font-size:28px;line-height:1;color:#fff;padding:4px 8px}
.ob-title{font-size:17px;font-weight:600;color:#fff}
.ob-prog{height:2px;background:rgba(255,255,255,.12);margin:0 20px;flex-shrink:0;border-radius:2px}
.ob-prog-fill{height:100%;background:#fff;border-radius:2px;transition:width .35s}
.ob-body{flex:1;overflow-y:auto;padding:28px 20px 0;-webkit-overflow-scrolling:touch;background:#000}
.ob-foot{padding:12px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));background:#000;flex-shrink:0}
.ob-btn{width:100%;padding:17px;background:#fff;color:#000;border:none;border-radius:14px;font-size:17px;font-weight:700;letter-spacing:-.1px}
.ob-btn:disabled{background:#2c2c2e;color:#8e8e93}
.ob-q{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px;color:#fff}
.ob-sub{font-size:15px;color:#8e8e93;margin-bottom:28px;line-height:1.55}

/* choice cards */
.ob-choices{display:flex;flex-direction:column;gap:10px}
.ob-choice{display:flex;align-items:center;justify-content:space-between;padding:16px;border:1.5px solid rgba(255,255,255,.12);border-radius:var(--r);background:#1c1c1e;transition:border-color .15s,background .15s}
.ob-choice.sel{border-color:#fff;background:#2c2c2e}
.ob-choice-left{flex:1}
.ob-choice-title{font-size:17px;font-weight:600;color:#fff}
.ob-choice-sub{font-size:14px;color:#8e8e93;margin-top:4px;line-height:1.45}
.ob-choice-icon{width:36px;height:36px;border-radius:50%;background:#2c2c2e;display:flex;align-items:center;justify-content:center;font-size:16px;margin-left:12px;flex-shrink:0;transition:background .15s}
.ob-choice.sel .ob-choice-icon{background:#fff;color:#000}

/* wheel picker */
.wheel-wrap{display:flex;align-items:center;justify-content:center;height:220px;position:relative;margin:12px 0}
.wheel-grad{position:absolute;left:0;right:0;height:88px;pointer-events:none;z-index:2}
.wheel-grad.top{top:0;background:linear-gradient(to bottom,#000 0%,transparent 100%)}
.wheel-grad.bot{bottom:0;background:linear-gradient(to top,#000 0%,transparent 100%)}
.wheel-line{position:absolute;left:16px;right:16px;height:1px;background:rgba(255,255,255,.2);z-index:1}
.wheel-line.top{top:calc(50% - 22px)}
.wheel-line.bot{bottom:calc(50% - 22px)}
.wc{height:220px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.wc::-webkit-scrollbar{display:none}
.wc-pad{height:88px}
.wi{height:44px;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.wi.dim{color:#8e8e93}
.wc-label{font-size:14px;color:#8e8e93;text-align:center;margin-top:6px}

/* ruler */
.ruler-wrap{margin:16px 0}
.ruler-val{font-size:34px;font-weight:800;text-align:center;margin-bottom:16px;color:#fff;letter-spacing:-.5px}
.ruler-outer{overflow-x:scroll;scrollbar-width:none;position:relative;padding:0 0 4px;cursor:grab;user-select:none}
.ruler-outer::-webkit-scrollbar{display:none}
.ruler-cursor-line{position:absolute;left:50%;top:0;bottom:0;width:2px;background:#34d399;transform:translateX(-50%);pointer-events:none;z-index:3}
.ruler-track{display:flex;align-items:flex-end;gap:0;height:56px;padding:0 50vw}
.rtick{flex-shrink:0;border-radius:2px 2px 0 0;background:rgba(255,255,255,.2)}
.rtick.major{background:rgba(255,255,255,.8)}

/* segment */
.seg{display:flex;background:#1c1c1e;border-radius:10px;padding:2px;margin-bottom:20px}
.seg-btn{flex:1;padding:8px 10px;border:none;background:none;border-radius:8px;font-size:14px;font-weight:600;color:#8e8e93}
.seg-btn.on{background:#3a3a3c;color:#fff;box-shadow:none}

/* welcome */
.ob-welcome-title{font-size:40px;font-weight:800;margin-bottom:6px;color:#fff;letter-spacing:-.5px}
.ob-steps{display:flex;flex-direction:column;gap:20px;margin-top:12px}
.ob-step{display:flex;gap:14px;align-items:flex-start}
.ob-step-dot{width:32px;height:32px;border-radius:50%;background:#fff;color:#000;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ob-step-dot.pending{background:#2c2c2e;color:#8e8e93}
.ob-step-name{font-size:17px;font-weight:700;color:#fff}
.ob-step-desc{font-size:14px;color:#8e8e93;margin-top:3px;line-height:1.5}

/* TDEE */
.ob-tdee-big{font-size:56px;font-weight:800;letter-spacing:-2px;margin:20px 0 4px;color:#fff}
.ob-infobox{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:12px;padding:14px 16px;display:flex;gap:10px;align-items:flex-start;margin-top:20px;font-size:14px;line-height:1.55;color:#93c5fd}

/* timeline */
.ob-tl{display:flex;flex-direction:column;gap:0;margin-top:16px}
.ob-tl-item{display:flex;gap:14px;padding-bottom:20px;position:relative}
.ob-tl-item:not(:last-child)::before{content:'';position:absolute;left:15px;top:32px;bottom:0;width:2px;background:rgba(255,255,255,.1)}
.ob-tl-dot{width:32px;height:32px;border-radius:50%;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:700}
.ob-tl-title{font-size:16px;font-weight:700;margin-bottom:3px;color:#fff}
.ob-tl-desc{font-size:14px;color:#8e8e93;line-height:1.5}

/* summary cards */
.ob-sum-cards{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.ob-sum-card{background:#1c1c1e;border-radius:var(--r);padding:14px 16px}
.ob-sum-card.hl{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2)}
.ob-sum-card.hl2{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)}
.ob-sum-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ob-sum-title{font-size:16px;font-weight:700;color:#fff}
.ob-sum-val{font-size:16px;font-weight:600;color:#fff}
.ob-sum-desc{font-size:13px;color:#8e8e93;line-height:1.5}

/* macro chart bars */
.macro-chart{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:16px}
.mc-col{display:flex;flex-direction:column;align-items:center;gap:2px}
.mc-bar-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100px}
.mc-seg{border-radius:3px;width:24px;margin-bottom:1px}
.mc-day{font-size:10px;color:#8e8e93;margin-top:4px;font-weight:600}

/* ── MAIN APP ── */
#app{display:none;flex-direction:column;position:fixed;inset:0;background:#000;color:#fff}
#app.vis{display:flex}
.app-header{background:#000;border-bottom:.5px solid rgba(255,255,255,.08);flex-shrink:0;padding-top:max(0px,env(safe-area-inset-top))}
.app-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.app-nav-btn{background:none;border:none;font-size:22px;color:#fff;padding:4px 8px}
.app-nav-title{font-size:17px;font-weight:700;color:#fff}
.app-back{background:none;border:none;color:#fff;font-size:22px;padding:4px 10px 4px 2px;opacity:.7;display:flex;align-items:center;gap:4px;font-family:inherit}
.app-back span{font-size:15px;font-weight:500;opacity:.9}
.week-strip{display:flex;padding:4px 8px 10px;overflow-x:auto;scrollbar-width:none;gap:0}
.week-strip::-webkit-scrollbar{display:none}
.wday{flex:1;min-width:40px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;border-radius:10px;cursor:pointer}
.wday-name{font-size:11px;color:#8e8e93;font-weight:600;text-transform:uppercase}
.wday-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:#fff}
.wday.cur .wday-num{background:#fff;color:#000}
.wday.cur .wday-name{color:#fff;font-weight:700}
.wday-dot{width:5px;height:5px;border-radius:50%;background:#8e8e93;opacity:0}
.wday.logged .wday-dot{opacity:1}
/* 4 stacked full-width macro bars */
.macro-bars{padding:8px 16px 10px;border-bottom:.5px solid rgba(255,255,255,.08);flex-shrink:0;display:flex;flex-direction:column;gap:5px}
.mbar{display:flex;align-items:center;gap:8px;font-size:12px;font-variant-numeric:tabular-nums}
.mbar-icon{width:14px;text-align:center;font-size:11px;flex-shrink:0}
.mbar-label{width:10px;font-weight:700;font-size:11px;flex-shrink:0}
.mbar-track{flex:1;height:5px;background:rgba(255,255,255,.10);border-radius:3px;overflow:hidden}
.mbar-fill{height:100%;border-radius:3px;transition:width .5s;max-width:100%}
.mbar-val{width:80px;text-align:right;color:#8e8e93;font-size:11px;font-variant-numeric:tabular-nums}
.app-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(88px + env(safe-area-inset-bottom))}

/* food log */
.meal-grp{}
.meal-grp-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 6px;font-size:12px;color:#8e8e93;font-weight:600;letter-spacing:.04em}
.meal-grp-time{display:flex;align-items:center;gap:8px}
.meal-grp-macros{display:flex;gap:8px;font-variant-numeric:tabular-nums}
.meal-grp-add{width:28px;height:28px;border-radius:50%;border:none;background:#1c1c1e;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.food-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:.5px solid rgba(255,255,255,.06);background:#000;cursor:pointer}
.food-row-img{width:40px;height:40px;border-radius:10px;background:#1c1c1e;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.food-row-body{flex:1;min-width:0}
.food-row-name{font-size:15px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.food-row-meta{font-size:12px;color:#8e8e93;margin-top:3px;font-variant-numeric:tabular-nums}
.food-row-meta span{margin-right:6px}
.food-row-edit{color:#8e8e93;font-size:16px;flex-shrink:0;background:none;border:none;padding:4px}
.empty-log{text-align:center;padding:60px 20px;color:#8e8e93}
.empty-log h3{font-size:20px;color:#fff;margin-bottom:8px}

/* bottom action bar */
.app-sbar{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 16px;padding-bottom:max(14px,env(safe-area-inset-bottom));
  background:#000;border-top:.5px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:10px;z-index:5;
}
.app-sbar-wrap{
  flex:1;display:flex;align-items:center;gap:8px;
  background:#1c1c1e;border-radius:12px;padding:10px 14px;
}
.app-sbar-wrap input{flex:1;border:none;background:none;font-size:16px;color:#fff;outline:none}
.app-sbar-wrap input::placeholder{color:#8e8e93}
.app-add-btn{
  height:48px;padding:0 20px;
  background:#fff;color:#000;border:none;border-radius:14px;
  font-size:15px;font-weight:700;white-space:nowrap;
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(255,255,255,.15);
  transition:transform .12s,opacity .12s;
}
.app-add-btn:active{transform:scale(.95);opacity:.9}

/* ── ADD SHEET ── */
#add-sheet{position:fixed;inset:0;z-index:100;display:none}
#add-sheet.open{display:block}
.as-scrim{position:fixed;inset:0;background:rgba(0,0,0,.6)}
.as-panel{position:fixed;bottom:0;left:0;right:0;background:#1c1c1e;border-radius:20px 20px 0 0;height:88vh;display:flex;flex-direction:column;color:#fff}
.as-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 0}
.as-macro-bar{display:flex;justify-content:space-between;padding:10px 20px 8px;border-bottom:.5px solid rgba(255,255,255,.08)}
.as-macro-item{text-align:center;flex:1}
.as-macro-val{font-size:16px;font-weight:700;color:#fff}
.as-macro-unit{font-size:11px;color:#8e8e93;margin-top:1px}
.add-tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 4px;border-bottom:.5px solid rgba(255,255,255,.08);flex-shrink:0;background:#1c1c1e}
.add-tabs::-webkit-scrollbar{display:none}
.add-tab{flex-shrink:0;padding:10px 12px;border:none;background:none;font-size:13px;font-weight:500;color:#8e8e93;border-bottom:2.5px solid transparent;white-space:nowrap}
.add-tab.on{color:#fff;font-weight:700;border-bottom-color:#fff}
.add-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background:#000}
.add-panel{display:none;padding:16px;padding-bottom:max(24px,env(safe-area-inset-bottom))}
.add-panel.on{display:block}

/* scan */
.scan-toggle{display:flex;gap:8px;margin-bottom:12px}
.scan-mode{padding:8px 18px;border:1.5px solid rgba(255,255,255,.2);border-radius:20px;background:none;font-size:14px;font-weight:600;color:rgba(255,255,255,.6)}
.scan-mode.on{background:#fff;color:#000;border-color:#fff}
.viewfinder{width:100%;aspect-ratio:4/3;background:#111;border-radius:14px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.1)}
.viewfinder video,.viewfinder canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vf-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.scan-box{width:68%;aspect-ratio:16/9;border:2px solid rgba(255,255,255,.8);border-radius:8px;box-shadow:0 0 0 2000px rgba(0,0,0,.5)}
.vf-placeholder{display:flex;flex-direction:column;align-items:center;gap:10px;color:rgba(255,255,255,.4);font-size:14px}
.vf-placeholder-icon{font-size:44px;opacity:.4}
.scan-capture-btn{width:100%;padding:14px;background:#fff;color:#000;border:none;border-radius:12px;font-size:16px;font-weight:700;margin-top:12px}
.scan-result-card{margin-top:12px;padding:16px;background:#1c1c1e;border-radius:12px}
.scan-result-name{font-size:17px;font-weight:700;color:#fff;margin-bottom:10px}
.scan-result-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.srm{text-align:center;padding:10px 4px;background:#2c2c2e;border-radius:8px}
.srm-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;color:#fff}
.srm-label{font-size:11px;color:#8e8e93;margin-top:2px}
.scan-add-btn{width:100%;padding:13px;background:#fff;color:#000;border:none;border-radius:12px;font-size:16px;font-weight:700}

/* search */
.srch-field{display:flex;align-items:center;gap:8px;background:#1c1c1e;border-radius:10px;padding:10px 12px;margin-bottom:12px}
.srch-field input{flex:1;border:none;background:none;font-size:16px;color:#fff;outline:none}
.srch-field input::placeholder{color:#8e8e93}
.srch-sec-title{font-size:12px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.srch-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid rgba(255,255,255,.06)}
.srch-item-img{width:40px;height:40px;border-radius:8px;background:#2c2c2e;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.srch-item-body{flex:1;min-width:0}
.srch-item-name{font-size:15px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srch-item-meta{font-size:12px;color:#8e8e93;margin-top:2px}
.srch-item-add{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);background:none;font-size:18px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);flex-shrink:0}
.srch-empty{text-align:center;padding:40px 0;color:#8e8e93}
.srch-loading{text-align:center;padding:24px;color:#8e8e93}

/* quick add — MacroFactor style rows */
.qa-est{font-size:14px;color:#8e8e93;margin-bottom:12px;padding:10px 12px;background:#1c1c1e;border-radius:10px;font-variant-numeric:tabular-nums}
.qa-rows{display:flex;flex-direction:column;gap:0;border-radius:12px;overflow:hidden;border:.5px solid rgba(255,255,255,.08);margin-bottom:16px}
.qa-row2{display:flex;align-items:center;padding:13px 16px;background:#1c1c1e;border-bottom:.5px solid rgba(255,255,255,.06)}
.qa-row2:last-child{border-bottom:none}
.qa-row2-label{font-size:15px;color:rgba(255,255,255,.85);flex:1}
.qa-row2-right{display:flex;align-items:center;gap:8px}
.qa-row2-input{background:none;border:none;font-size:17px;font-weight:600;color:#fff;text-align:right;outline:none;width:80px;font-variant-numeric:tabular-nums}
.qa-row2-input::placeholder{color:rgba(255,255,255,.2)}
.qa-row2-unit{font-size:14px;color:#8e8e93;width:28px;text-align:left}
.qa-btns{display:flex;gap:10px;margin-top:4px}
.qa-btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600}
.qa-btn.sec{background:#2c2c2e;color:rgba(255,255,255,.7)}
.qa-btn.pri{background:#fff;color:#000}

/* library */
.lib-toggle{display:flex;background:#2c2c2e;border-radius:10px;padding:2px;margin-bottom:12px}
.lib-tab-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:15px;font-weight:600;color:#8e8e93;background:none}
.lib-tab-btn.on{background:#48484a;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.lib-panel{display:none}
.lib-panel.on{display:block}

/* ai describe */
.ai-desc-area{width:100%;min-height:120px;border:.5px solid rgba(255,255,255,.15);border-radius:12px;padding:14px;font-size:16px;resize:none;outline:none;color:#fff;line-height:1.6;background:#1c1c1e}
.ai-desc-area:focus{border-color:rgba(255,255,255,.35)}
.ai-desc-area::placeholder{color:#8e8e93}
.ai-find-btn{width:100%;padding:14px;background:#2c2c2e;color:rgba(255,255,255,.6);border:none;border-radius:12px;font-size:16px;font-weight:600;margin-top:10px}
.ai-find-btn.active-key{background:#fff;color:#000}
.ai-find-btn.loading{opacity:.6}

/* food detail modal */
#food-detail{position:fixed;inset:0;z-index:150;display:none}
#food-detail.open{display:block}
.fd-scrim{position:fixed;inset:0;background:rgba(0,0,0,.7)}
.fd-panel{position:fixed;bottom:0;left:0;right:0;background:#1c1c1e;border-radius:20px 20px 0 0;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));color:#fff}
.fd-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px}
.fd-name{font-size:20px;font-weight:700;text-align:center;margin-bottom:16px;color:#fff}
.fd-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.fdm{text-align:center;padding:12px 4px;background:#2c2c2e;border-radius:10px}
.fdm-val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;color:#fff}
.fdm-label{font-size:11px;color:#8e8e93;margin-top:2px}
.fd-qty-row{display:flex;align-items:center;gap:8px;background:#2c2c2e;border-radius:10px;padding:12px;margin-bottom:14px}
.fd-qty-row input{flex:1;border:none;background:none;font-size:22px;font-weight:700;color:#fff;outline:none;font-variant-numeric:tabular-nums}
.fd-qty-unit{font-size:15px;color:#8e8e93}
.fd-btns{display:flex;gap:10px}
.fd-del{width:52px;height:52px;border:none;background:rgba(239,68,68,.15);color:#f87171;border-radius:12px;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fd-save{flex:1;padding:14px;background:#fff;color:#000;border:none;border-radius:12px;font-size:16px;font-weight:700}

/* spinner */
.spinner-inline{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     ONBOARDING
══════════════════════════════════════════════════════ -->
<div id="ob">
  <div class="ob-nav">
    <button class="ob-back" id="obBack" onclick="obPrev()">‹</button>
    <span class="ob-title" id="obNavTitle">Basics</span>
  </div>
  <div class="ob-prog"><div class="ob-prog-fill" id="obProgFill"></div></div>

  <div class="ob-body" id="obBody">
    <!-- screens injected by JS -->
  </div>
  <div class="ob-foot">
    <button class="ob-btn" id="obNext" onclick="obNext()">Next</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════════════════ -->
<div id="app">
  <div class="app-header">
    <div class="app-nav">
      <button class="app-back" onclick="goBack()">
        <svg width="10" height="17" viewBox="0 0 10 17" fill="none"><path d="M9 1L1.5 8.5L9 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Health</span>
      </button>
      <div style="display:flex;align-items:center;gap:0">
        <button class="app-nav-btn" onclick="shiftDay(-1)" style="font-size:20px;opacity:.5">‹</button>
        <span class="app-nav-title" id="appDateTitle">Today</span>
        <button class="app-nav-btn" onclick="shiftDay(1)" style="font-size:20px;opacity:.5">›</button>
      </div>
      <button class="app-nav-btn" onclick="openSettings()" style="font-size:18px;opacity:.5" title="Settings">⚙</button>
    </div>
    <div class="week-strip" id="weekStrip"></div>
    <div class="macro-bars" id="macroBars"></div>
  </div>

  <div class="app-scroll" id="appScroll">
    <div id="foodLog"></div>
  </div>

  <div class="app-sbar">
    <div class="app-sbar-wrap" onclick="openAddSheet('search','')">

      <input type="text" placeholder="Search food…" id="appSbarInput" readonly onclick="openAddSheet('search','')">
    </div>
    <button class="app-add-btn" onclick="openAddSheet('scan','')">

      Add Food
    </button>
  </div>
</div>

     ADD FOOD SHEET
══════════════════════════════════════════════════════ -->

  <div class="as-scrim" onclick="closeAddSheet()"></div>
  <div class="as-panel">
    <div class="as-handle"></div>
    <div class="as-macro-bar">

      </button>
      <button class="add-tab" onclick="switchAddTab('search')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search

      <button class="add-tab" onclick="switchAddTab('aidesc')">

      <!-- SEARCH -->

              <input class="qa-row2-input" type="number" id="qaCarb" placeholder="optional" oninput="updateQaEst()" inputmode="decimal">
              <span class="qa-row2-unit">g</span>

              <input class="qa-row2-input" type="text" id="qaName" placeholder="optional" style="width:140px;text-align:right;font-weight:500">
            </div>

        <div class="qa-btns">
          <button class="qa-btn sec" onclick="clearQa()">Quick Add</button>
          <button class="qa-btn pri" onclick="logQuickAdd()">Log Foods</button>
        </div>
      </div>

      <!-- LIBRARY -->

        </div>
        <div class="lib-panel on" id="libRecipes"></div>

      <!-- AI DESCRIBE -->

     FOOD DETAIL MODAL

  <div class="fd-panel">

    <div class="fd-macros" id="fdMacros"></div>
    <div class="fd-qty-row">
      <input type="number" id="fdQty" min="0.1" step="any" oninput="updateFdMacros()">
      <span class="fd-qty-unit" id="fdQtyUnit">g</span>
    </div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════
const FL = {
  profile: () => { try{return JSON.parse(localStorage.getItem('fl_profile'))||null}catch{return null} },
  saveProfile: p => localStorage.setItem('fl_profile', JSON.stringify(p)),
  log: d => { try{return JSON.parse(localStorage.getItem('fl_log_'+d))||[]}catch{return[]} },
  saveLog: (d,l) => localStorage.setItem('fl_log_'+d, JSON.stringify(l)),
  lib: () => { try{return JSON.parse(localStorage.getItem('fl_lib'))||{recent:[],foods:[],recipes:[]}}catch{return{recent:[],foods:[],recipes:[]}} },
  saveLib: l => localStorage.setItem('fl_lib', JSON.stringify(l)),
  groq: () => localStorage.getItem('groq_api_key')||'',
};

function dateKey(d){ const y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate(); return `${y}-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`}
function todayKey(){ return dateKey(new Date()) }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2) }

// ═══════════════════════════════════════════════════════
// TDEE + TARGETS
// ═══════════════════════════════════════════════════════
function calcTDEE(p){
  const dob=new Date(p.dob), age=Math.floor((Date.now()-dob)/(365.25*24*3600*1000));
  const bmr = p.sex==='m'
    ? 10*p.weight_kg + 6.25*p.height_cm - 5*age + 5
    : 10*p.weight_kg + 6.25*p.height_cm - 5*age - 161;
  const mult = {sedentary:1.2,moderate:1.55,active:1.725}[p.activity]||1.55;
  return Math.round(bmr*mult);
}
function calcTargets(p){
  const tdee = p.tdee||calcTDEE(p);
  let kcal = tdee;
  if(p.goal==='lose') kcal = Math.max(1200, Math.round(tdee - p.weight_kg*(p.goal_rate||0.5)*77));
  if(p.goal==='gain') kcal = tdee+300;
  const protein = Math.round(p.weight_kg*({low:1.6,moderate:2.0,high:2.4,very_high:2.8}[p.protein_pref||'moderate']));
  const fat = Math.round(kcal*0.28/9);
  const carbs = Math.max(0, Math.round((kcal-protein*4-fat*9)/4));
  return {kcal,protein,fat,carbs};
}

// ═══════════════════════════════════════════════════════
// ONBOARDING STATE MACHINE
// ═══════════════════════════════════════════════════════
let obState = {
  step: 0,
  sex: null,
  dob: null,
  height_unit: 'cm',
  height_cm: 175,
  weight_unit: 'kg',
  weight_kg: 80,
  activity: null,
  tdee_ok: null,
  goal: null,
  target_weight_kg: null,
  goal_rate: 0.5,
  diet: null,
  calorie_floor: 'standard',
  training: null,
  distribution: 'even',
  protein_pref: 'moderate',
};

const OB_STEPS = [
  'welcome','sex','dob','height','weight','activity','tdee','tdee_confirm','great_start',
  'goal_welcome','goal_type','goal_target','goal_summary',
  'program_welcome','diet','floor','training','distribution','protein','program_summary'
];

function obStep(){ return OB_STEPS[obState.step] }

function obNext(){
  const s = obStep();
  if(!obValidate(s)) return;
  obState.step = Math.min(obState.step+1, OB_STEPS.length-1);
  if(s==='great_start') obState.step = OB_STEPS.indexOf('goal_welcome');
  if(s==='goal_summary') obState.step = OB_STEPS.indexOf('program_welcome');
  if(s==='program_summary'){ obFinish(); return; }
  obRender();
}
function obPrev(){
  if(obState.step===0) return;
  obState.step--;
  obRender();
}
function obValidate(s){
  if(s==='sex') return !!obState.sex;
  if(s==='activity') return !!obState.activity;
  if(s==='goal_type') return !!obState.goal;
  if(s==='diet') return !!obState.diet;
  if(s==='floor') return !!obState.calorie_floor;
  if(s==='training') return !!obState.training;
  if(s==='distribution') return !!obState.distribution;
  return true;
}
function obFinish(){
  const p = {
    sex:obState.sex, dob:obState.dob,
    height_cm:obState.height_cm, weight_kg:obState.weight_kg,
    activity:obState.activity, goal:obState.goal,
    target_weight_kg:obState.target_weight_kg||obState.weight_kg,
    goal_rate:obState.goal_rate,
    diet:obState.diet, calorie_floor:obState.calorie_floor,
    training:obState.training, distribution:obState.distribution,
    protein_pref:obState.protein_pref,
    setup_done:true,
  };
  p.tdee = calcTDEE(p);
  const t = calcTargets(p);
  p.daily_kcal=t.kcal; p.daily_protein=t.protein; p.daily_fat=t.fat; p.daily_carbs=t.carbs;
  FL.saveProfile(p);
  document.getElementById('ob').classList.add('gone');
  document.getElementById('app').classList.add('vis');
  initApp();
}

function obRender(){
  const s = obStep();
  const btn = document.getElementById('obNext');
  const back = document.getElementById('obBack');
  const title = document.getElementById('obNavTitle');
  const body = document.getElementById('obBody');
  const fill = document.getElementById('obProgFill');
  const pct = Math.round((obState.step/OB_STEPS.length)*100);
  fill.style.width = pct+'%';
  back.style.display = obState.step===0 ? 'none' : '';
  btn.disabled = !obValidate(s);
  title.textContent = obState.step<9 ? 'Basics' : obState.step<13 ? 'Set New Goal' : 'Set New Program';
  btn.textContent = s==='program_summary' ? 'Done' : s==='welcome'||s==='goal_welcome'||s==='program_welcome' ? 'Get Started' : 'Next';
  body.innerHTML = OB_SCREENS[s]();
  body.scrollTop = 0;
  if(typeof window['obInit_'+s] === 'function') window['obInit_'+s]();
}

// ═══════════════════════════════════════════════════════
// SCREEN RENDERERS
// ═══════════════════════════════════════════════════════
const OB_SCREENS = {
  welcome: ()=>`
    <div class="ob-welcome-title">Welcome</div>
    <div class="ob-sub">A few steps to get you started</div>
    <div class="ob-steps">
      <div class="ob-step"><div class="ob-step-dot">1</div><div class="ob-step-body"><div class="ob-step-name">Basics</div><div class="ob-step-desc">We'll learn about your body and lifestyle to personalise your experience.</div></div></div>
      <div class="ob-step"><div class="ob-step-dot pending">2</div><div class="ob-step-body"><div class="ob-step-name">Goal</div><div class="ob-step-desc">Set your weight goal. Targets will be customised to keep you on track.</div></div></div>
      <div class="ob-step"><div class="ob-step-dot pending">3</div><div class="ob-step-body"><div class="ob-step-name">Program</div><div class="ob-step-desc">Choose your diet style and how to distribute calories throughout the week.</div></div></div>
    </div>`,

  sex: ()=>`
    <div class="ob-q">What is your sex?</div>
    <div class="ob-choices">
      <div class="ob-choice${obState.sex==='f'?' sel':''}" onclick="obSelect('sex','f');obNext()">
        <div class="ob-choice-left"><div class="ob-choice-title">Female</div></div>
        <div class="ob-choice-icon">♀</div>
      </div>
      <div class="ob-choice${obState.sex==='m'?' sel':''}" onclick="obSelect('sex','m');obNext()">
        <div class="ob-choice-left"><div class="ob-choice-title">Male</div></div>
        <div class="ob-choice-icon">♂</div>
      </div>
    </div>`,

  dob: ()=>`
    <div class="ob-q">When were you born?</div>
    <div class="wheel-wrap" id="dobWrap">
      <div class="wheel-grad top"></div>
      <div class="wheel-grad bot"></div>
      <div class="wheel-line top"></div>
      <div class="wheel-line bot"></div>
      <div class="wc" id="wMonth" style="width:90px"></div>
      <div class="wc" id="wDay" style="width:60px"></div>
      <div class="wc" id="wYear" style="width:80px"></div>

function obSelect(field, val){ obState[field]=val; document.getElementById('obNext').disabled=false }

// ── WHEEL / RULER INITS ──
window.obInit_dob = function(){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  const curYear=now.getFullYear(), curMonth=now.getMonth(), curDay=now.getDate();
  let selY=obState.dob?parseInt(obState.dob.split('-')[0]):curYear-25;
  let selM=obState.dob?parseInt(obState.dob.split('-')[1])-1:curMonth;
  let selD=obState.dob?parseInt(obState.dob.split('-')[2]):curDay;
  function saveDob(){const d=`${selY}-${String(selM+1).padStart(2,'0')}-${String(selD).padStart(2,'0')}`;obState.dob=d}
  buildWheel('wMonth',months.map((m,i)=>({label:m,val:i})),v=>{selM=v.val;saveDob()},selM);
  buildWheel('wDay',Array.from({length:31},(_,i)=>({label:String(i+1),val:i+1})),v=>{selD=v.val;saveDob()},selD-1);
  const years=Array.from({length:80},(_,i)=>({label:String(curYear-15-i),val:curYear-15-i}));
  buildWheel('wYear',years,v=>{selY=v.val;saveDob()},Math.max(0,years.findIndex(y=>y.val===selY)));
};
window.obInit_height = function(){
  const wrap=document.getElementById('heightPickerWrap');
  if(obState.height_unit==='cm'){
    const items=Array.from({length:81},(_,i)=>({label:`${130+i} cm`,val:130+i}));
    wrap.innerHTML='<div class="wheel-wrap"><div class="wheel-grad top"></div><div class="wheel-grad bot"></div><div class="wheel-line top"></div><div class="wheel-line bot"></div><div class="wc" id="wHeightCm" style="width:160px"></div></div>';
    const idx=Math.max(0,items.findIndex(it=>it.val===obState.height_cm));
    buildWheel('wHeightCm',items,v=>{obState.height_cm=v.val},idx);
  } else {
    wrap.innerHTML='<div class="wheel-wrap"><div class="wheel-grad top"></div><div class="wheel-grad bot"></div><div class="wheel-line top"></div><div class="wheel-line bot"></div><div class="wc" id="wFt" style="width:70px"></div><div class="wc" id="wIn" style="width:90px"></div></div>';
    const curFt=Math.floor(obState.height_cm/30.48),curIn=Math.round((obState.height_cm-curFt*30.48)/2.54);
    buildWheel('wFt',Array.from({length:5},(_,i)=>({label:`${3+i} ft`,val:3+i})),v=>{const ft=v.val,inEl=document.getElementById('wIn');obState.height_cm=Math.round(ft*30.48+getWheelVal(inEl)*2.54)},curFt-3);
    buildWheel('wIn',Array.from({length:12},(_,i)=>({label:`${i} in`,val:i})),v=>{const ft=getWheelValById('wFt');obState.height_cm=Math.round(ft*30.48+v.val*2.54)},curIn);
  }
};
window.obInit_weight = function(){
  const lo=obState.weight_unit==='lbs'?80:40, hi=obState.weight_unit==='lbs'?400:200, step=obState.weight_unit==='lbs'?1:0.5;
  const initVal=obState.weight_unit==='lbs'?Math.round(obState.weight_kg*2.205):obState.weight_kg;
  buildRuler('rulerOuter','rulerTrack',lo,hi,step,initVal,'rulerVal',obState.weight_unit,v=>{
    obState.weight_kg=obState.weight_unit==='lbs'?Math.round(v/2.205*10)/10:v;
  });
};
window.obInit_goal_target = function(){
  if(obState.goal==='maintain') return;
  const lo=obState.weight_unit==='lbs'?80:40, hi=obState.weight_unit==='lbs'?400:200, step=1;
  const curTW=obState.target_weight_kg||Math.max(lo,obState.weight_kg-10);
  buildRuler('targetRulerOuter','targetRulerTrack',lo,hi,step,curTW,null,obState.weight_unit,v=>{
    obState.target_weight_kg=v;
    document.querySelectorAll('.ob-body [style*="text-align:center"]').forEach(el=>{if(el.textContent.includes('kg')||el.textContent.includes('lbs'))el.textContent=v+' '+(obState.weight_unit||'kg')});
  });
};

function getWheelValById(id){
  const el=document.getElementById(id);
  return el?Math.round(el.scrollTop/44):0;
}
function getWheelVal(el){return el?Math.round(el.scrollTop/44):0}

function buildWheel(id,items,onChange,initIdx){
  const el=document.getElementById(id); if(!el)return;
  el.innerHTML=`<div class="wc-pad"></div>${items.map(it=>`<div class="wi">${it.label||it}</div>`).join('')}<div class="wc-pad"></div>`;
  el.scrollTop=(initIdx||0)*44;
  let debounce;
  el.addEventListener('scroll',()=>{
    clearTimeout(debounce);
    debounce=setTimeout(()=>{
      const idx=Math.round(el.scrollTop/44);
      if(items[idx]) onChange(items[idx]);
    },80);
  });
}

function buildRuler(outerId,trackId,lo,hi,step,initVal,valId,unit,onChange){
  const outer=document.getElementById(outerId);
  const track=document.getElementById(trackId);
  if(!outer||!track)return;
  const tickW=8,tickGap=8;
  let html='';
  for(let v=lo;v<=hi;v+=step){
    const major=Number.isInteger(v/5);
    html+=`<div class="rtick${major?' major':''}" style="width:${tickW}px;height:${major?40:24}px;margin-right:${tickGap}px"></div>`;
  }
  track.innerHTML=html;
  const steps=(hi-lo)/step;
  const totalW=steps*(tickW+tickGap);
  function scrollTo(val){
    const idx=(val-lo)/step;
    outer.scrollLeft=idx*(tickW+tickGap)-outer.offsetWidth/2+(tickW/2);
  }
  function getVal(){
    const left=outer.scrollLeft+outer.offsetWidth/2-tickW/2;
    const idx=Math.round(left/(tickW+tickGap));
    return Math.min(hi,Math.max(lo,lo+idx*step));
  }
  scrollTo(initVal);
  let debounce;
  outer.addEventListener('scroll',()=>{
    clearTimeout(debounce);
    debounce=setTimeout(()=>{
      const v=getVal();
      if(valId)document.getElementById(valId).textContent=`${v} ${unit}`;
      onChange(v);
    },50);
  });
}

function shiftDay(d){

function renderWeekStrip(){
  const strip=document.getElementById('weekStrip'); if(!strip)return;
  const dt=new Date(curDate+'T12:00:00');
  const mon=new Date(dt); mon.setDate(dt.getDate()-dt.getDay()+1);
  const days=['M','T','W','T','F','S','S'];
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const k=dateKey(d), today=k===todayKey(), sel=k===curDate;
    const logged=FL.log(k).length>0;
    html+=`<div class="wday${sel?' cur':''}${logged?' logged':''}" onclick="selectDay('${k}')">
      <div class="wday-name">${days[i]}</div>
      <div class="wday-num">${d.getDate()}</div>
      <div class="wday-dot"></div>
    </div>`;
  }
  strip.innerHTML=html;
  // update header title
  const title=document.getElementById('appDateTitle');
  if(title){
    const today=todayKey(); const yesterday=dateKey(new Date(Date.now()-86400000));
    title.textContent = curDate===today?'Today':curDate===yesterday?'Yesterday':curDate;
  }
}

function selectDay(k){ curDate=k; renderWeekStrip(); renderMacroBars(); renderFoodLog(); }

function renderMacroBars(){
  const p=FL.profile(); const bars=document.getElementById('macroBars'); if(!bars)return;
  if(!p){bars.innerHTML='';return;}
  const tgt={kcal:p.daily_kcal||2000,protein:p.daily_protein||150,fat:p.daily_fat||65,carbs:p.daily_carbs||200};
  const log=FL.log(curDate);
  const tot=log.reduce((a,e)=>({kcal:a.kcal+(e.kcal||0),protein:a.protein+(e.protein||0),fat:a.fat+(e.fat||0),carbs:a.carbs+(e.carbs||0)}),{kcal:0,protein:0,fat:0,carbs:0});
  const mbar=(ico,lbl,key,color)=>{
    const pct=Math.min(100,tgt[key]>0?tot[key]/tgt[key]*100:0);
    const over=tot[key]>tgt[key];
    return`<div class="mbar">
      <span style="width:16px;font-size:12px;flex-shrink:0">${ico}</span>
      <span style="width:12px;font-size:11px;font-weight:700;color:${color};flex-shrink:0">${lbl}</span>
      <div class="mbar-track"><div class="mbar-fill" style="width:${pct}%;background:${over?'#f87171':color}"></div></div>
      <span class="mbar-val" style="color:${over?'#f87171':'#8e8e93'}">${Math.round(tot[key])} / ${tgt[key]}</span>
    </div>`;
  };
  bars.innerHTML=
    mbar('🔥','','kcal','#3b82f6')+
    mbar('','P','protein','#f87171')+
    mbar('','F','fat','#fbbf24')+
    mbar('','C','carbs','#34d399');
}

function renderFoodLog(){
  const log=document.getElementById('foodLog'); if(!log)return;
  const entries=FL.log(curDate);
  // update add sheet macro bar
  updateAddSheetMacros(entries);
  if(entries.length===0){
    log.innerHTML=`<div class="empty-log"><h3>No food logged</h3><p>Tap the search bar or + button to add food.</p></div>`;
    return;
  }
  // Group by hour
  const groups={};
  entries.forEach(e=>{
    const h=e.time?e.time.split(':')[0]:'12';
    const label=formatHour(h);
    if(!groups[label])groups[label]={hour:parseInt(h),items:[]};
    groups[label].items.push(e);
  });
  let html='';
  Object.values(groups).sort((a,b)=>a.hour-b.hour).forEach(g=>{
    const tKcal=g.items.reduce((a,e)=>a+(e.kcal||0),0);
    const tPro=g.items.reduce((a,e)=>a+(e.protein||0),0);
    const tFat=g.items.reduce((a,e)=>a+(e.fat||0),0);
    const tCarb=g.items.reduce((a,e)=>a+(e.carbs||0),0);
    html+=`<div class="meal-grp">
      <div class="meal-grp-header">
        <span style="font-size:13px;color:#fff;font-weight:600">${formatHour(g.hour)}</span>
        <div class="meal-grp-macros" style="font-size:12px">
          <span style="color:#3b82f6">${Math.round(tKcal)}</span><span style="color:#8e8e93">kcal</span>
          <span style="color:#f87171;margin-left:6px">${Math.round(tPro)}</span><span style="color:#8e8e93">P</span>
          <span style="color:#fbbf24;margin-left:6px">${Math.round(tFat)}</span><span style="color:#8e8e93">F</span>
          <span style="color:#34d399;margin-left:6px">${Math.round(tCarb)}</span><span style="color:#8e8e93">C</span>
        </div>
      </div>
      ${g.items.map(e=>`
      <div class="food-row" onclick="openFoodDetail('${e.id}')">
        <div class="food-row-img">${e.image?`<img src="${e.image}" style="width:100%;height:100%;object-fit:cover;border-radius:10px" onerror="this.parentNode.textContent='🍽'">` : '🍽'}</div>
        <div class="food-row-body">
          <div class="food-row-name">${e.name}</div>
          <div class="food-row-meta">
            <span style="color:#3b82f6;font-weight:600">${Math.round(e.kcal||0)}</span><span style="color:#8e8e93"> kcal</span>
            &nbsp;<span style="color:#f87171;font-weight:600">${Math.round(e.protein||0)}</span><span style="color:#8e8e93">P</span>
            &nbsp;<span style="color:#fbbf24;font-weight:600">${Math.round(e.fat||0)}</span><span style="color:#8e8e93">F</span>
            &nbsp;<span style="color:#34d399;font-weight:600">${Math.round(e.carbs||0)}</span><span style="color:#8e8e93">C</span>
            <span style="color:#8e8e93"> · ${e.qty||1}${e.unit||'g'}</span>
          </div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`).join('')}
    </div>`;
  });
  log.innerHTML=html;
}

function formatHour(h){
  const n=parseInt(h);
  if(n<12)return n===0?'12 AM':`${n} AM`;
  if(n===12)return'12 PM';
  return`${n-12} PM`;
}

function updateAddSheetMacros(entries){
  const t=entries.reduce((a,e)=>({kcal:a.kcal+(e.kcal||0),pro:a.pro+(e.protein||0),fat:a.fat+(e.fat||0),carb:a.carb+(e.carbs||0)}),{kcal:0,pro:0,fat:0,carb:0});
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=Math.round(v)};
  set('asMkcal',t.kcal);set('asMpro',t.pro);set('asMfat',t.fat);set('asMcarb',t.carb);
}

function addEntry(entry){
  const log=FL.log(curDate);
  log.push({...entry,id:uid(),time:new Date().toTimeString().slice(0,5),date:curDate});
  FL.saveLog(curDate,log);
  // add to library recents
  const lib=FL.lib();
  lib.recent=lib.recent.filter(r=>r.name!==entry.name);
  lib.recent.unshift({name:entry.name,kcal:entry.kcal,protein:entry.protein,fat:entry.fat,carbs:entry.carbs,qty:entry.qty,unit:entry.unit,image:entry.image});
  if(lib.recent.length>30)lib.recent=lib.recent.slice(0,30);
  FL.saveLib(lib);
  renderMacroBars();
  renderFoodLog();
  renderLibrary();
}

// ── SCAN ──
function setScanMode(mode){
  scanMode=mode;
  document.getElementById('scanModeBarcode').classList.toggle('on',mode==='barcode');
  document.getElementById('scanModeLabel').classList.toggle('on',mode==='label');
  document.getElementById('scanModeMeal').classList.toggle('on',mode==='meal');
  document.getElementById('scanResult').style.display='none';
  scanData=null;
  const btn=document.getElementById('scanCaptureBtn');
  if(scanStream){btn.textContent=mode==='barcode'?'Stop Camera':'Capture';
  }else{btn.textContent='Start Camera';}
}

async function handleScanCapture(){
  const btn=document.getElementById('scanCaptureBtn');
  if(!scanStream){
    try{
      scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});
      const video=document.getElementById('scanVideo');
      video.srcObject=scanStream; video.style.display='block';
      document.getElementById('vfPlaceholder').style.display='none';
      document.getElementById('scanOverlay').style.display=scanMode==='barcode'?'flex':'none';
      btn.style.display='block';
      btn.textContent=scanMode==='barcode'?'Stop Scan':'Capture Photo';
      if(scanMode==='barcode') startBarcodeDetect();
    }catch(e){
      document.getElementById('scanStatus').textContent='Camera access denied — please allow in browser settings.';
      btn.style.display='block'; btn.textContent='Retry';
    }
    return;
  }
  if(scanMode==='barcode'){stopCamera();return;}
  // capture photo for label or meal
  const video=document.getElementById('scanVideo');
  const canvas=document.getElementById('scanCanvas');
  canvas.width=video.videoWidth||640; canvas.height=video.videoHeight||480;
  canvas.getContext('2d').drawImage(video,0,0);
  const base64=canvas.toDataURL('image/jpeg',.8).split(',')[1];
  btn.textContent='Analysing…'; btn.disabled=true;
  const status=document.getElementById('scanStatus');
  status.textContent='AI is analysing your '+scanMode+'…';
  try{
    const result=scanMode==='label'?await geminiLabel(base64):await geminiMeal(base64);
    scanData=result;
    showScanResult(result);
    status.textContent='';
  }catch(e){
    status.textContent='Analysis failed: '+(e.message||'try again');
  }
  btn.textContent='Capture Photo'; btn.disabled=false;
}

let barcodeInterval=null;
function startBarcodeDetect(){
  if(!('BarcodeDetector' in window)){
    document.getElementById('scanStatus').textContent='Barcode detection not supported on this browser. Use Chrome on Android.';
    return;
  }
  const bd=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code']});
  const video=document.getElementById('scanVideo');
  const status=document.getElementById('scanStatus');
  barcodeInterval=setInterval(async()=>{
    if(!scanStream)return;
    try{
      const barcodes=await bd.detect(video);
      if(barcodes.length>0){
        const code=barcodes[0].rawValue;
        clearInterval(barcodeInterval);
        status.textContent='Found barcode: '+code+'. Looking up…';
        const result=await lookupBarcode(code);
        if(result){scanData=result;showScanResult(result);status.textContent='';}
        else status.textContent='Product not found in database. Try searching by name.';
      }
    }catch{}
  },300);
}

function stopCamera(){
  if(barcodeInterval){clearInterval(barcodeInterval);barcodeInterval=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  const video=document.getElementById('scanVideo');
  if(video){video.style.display='none';video.srcObject=null;}
  const ph=document.getElementById('vfPlaceholder');if(ph)ph.style.display='';
  const ov=document.getElementById('scanOverlay');if(ov)ov.style.display='none';
  const btn=document.getElementById('scanCaptureBtn');if(btn){btn.style.display='none';btn.textContent='Stop Scan';}
}

function showScanResult(data){
  scanData=data;
  document.getElementById('scanResult').style.display='block';
  document.getElementById('scanResultName').textContent=data.name||'Unknown Food';
  const m=document.getElementById('scanResultMacros');
  m.innerHTML=[['🔥','kcal','kcal'],['P','protein','g'],['F','fat','g'],['C','carbs','g']].map(([ico,k,u])=>
    `<div class="srm"><div class="srm-val">${Math.round(data[k]||0)}</div><div class="srm-label">${ico} ${u}</div></div>`
  ).join('');
  const qtyIn=document.getElementById('scanResultQty');
  if(qtyIn)qtyIn.value=data.qty||100;
  document.getElementById('scanResultUnit').textContent=data.unit||'g';
}

function addScanResult(){
  if(!scanData)return;
  const qty=parseFloat(document.getElementById('scanResultQty').value)||100;
  const base=scanData.qty||100;
  const ratio=qty/base;
  addEntry({
    name:scanData.name,
    kcal:Math.round((scanData.kcal||0)*ratio),
    protein:Math.round((scanData.protein||0)*ratio*10)/10,
    fat:Math.round((scanData.fat||0)*ratio*10)/10,
    carbs:Math.round((scanData.carbs||0)*ratio*10)/10,
    qty,unit:scanData.unit||'g',image:scanData.image||null
  });
  document.getElementById('scanResult').style.display='none';
  scanData=null;
  closeAddSheet();
}

function openFoodDetail(id){

}
function closeFoodDetail(){
  document.getElementById('food-detail').classList.remove('open');
  editingEntry=null;
}
function updateFdMacros(){
  if(!editingEntry)return;
  const base=editingEntry.base;
  const origQty=base.qty||100;
  const newQty=parseFloat(document.getElementById('fdQty').value)||origQty;
  const ratio=newQty/origQty;
  const m=document.getElementById('fdMacros'); if(!m)return;
  const colors={kcal:'#3b82f6',protein:'#f87171',fat:'#fbbf24',carbs:'#34d399'};
  m.innerHTML=[['🔥 kcal','kcal','kcal'],['P','protein','g'],['F','fat','g'],['C','carbs','g']].map(([lbl,k,u])=>
    `<div class="fdm"><div class="fdm-val" style="color:${colors[k]}">${Math.round((base[k]||0)*ratio)}</div><div class="fdm-label">${lbl} ${u}</div></div>`
  ).join('');
}
function saveFoodEntry(){
  if(!editingEntry)return;
  const log=FL.log(curDate);
  const idx=log.findIndex(e=>e.id===editingEntry.id);
  if(idx<0)return;
  const base=editingEntry.base;
  const origQty=base.qty||100;
  const newQty=parseFloat(document.getElementById('fdQty').value)||origQty;
  const ratio=newQty/origQty;
  log[idx]={...base,qty:newQty,kcal:Math.round((base.kcal||0)*ratio),protein:Math.round((base.protein||0)*ratio*10)/10,fat:Math.round((base.fat||0)*ratio*10)/10,carbs:Math.round((base.carbs||0)*ratio*10)/10};
  FL.saveLog(curDate,log);
  closeFoodDetail();
  renderMacroBars();
  renderFoodLog();
}
function deleteFoodEntry(){
  if(!editingEntry)return;
  const log=FL.log(curDate).filter(e=>e.id!==editingEntry.id);
  FL.saveLog(curDate,log);
  closeFoodDetail();
  renderMacroBars();
  renderFoodLog();
}

// APIs

async function searchOFF(q){
  const url=`https://world.openfoodfacts.org/cgi/search.pl?action=process&search_terms=${encodeURIComponent(q)}&json=1&page_size=15&fields=product_name,brands,nutriments,image_small_url`;
  const r=await fetch(url);
  const data=await r.json();
  return(data.products||[]).filter(p=>p.product_name&&p.nutriments).map(parseOFF);
}
async function lookupBarcode(code){
  const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}?fields=product_name,brands,nutriments,image_small_url`);
  const data=await r.json();
  if(data.status===1&&data.product)return parseOFF(data.product);
  return null;
}
function parseOFF(p){
  const n=p.nutriments||{};
  return{name:[p.product_name,p.brands].filter(Boolean).join(' – '),kcal:Math.round(n['energy-kcal_100g']||n['energy_100g']/4.18||0),protein:Math.round((n['proteins_100g']||0)*10)/10,fat:Math.round((n['fat_100g']||0)*10)/10,carbs:Math.round((n['carbohydrates_100g']||0)*10)/10,qty:100,unit:'g',image:p.image_small_url||null};
}

async function groqText(prompt){
  const key=FL.groq();
  if(!key)throw new Error('No Groq API key — add it in Settings ⚙');
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:300,temperature:0.3})
  });
  const data=await r.json();
  if(!r.ok)throw new Error(data?.error?.message||'Groq error '+r.status);
  const text=(data?.choices?.[0]?.message?.content||'').trim();
  if(!text)throw new Error('Empty response');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}
async function groqVision(b64,prompt){
  const key=FL.groq();
  if(!key)throw new Error('No Groq API key — add it in Settings ⚙');
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'llama-3.2-90b-vision-preview',
      messages:[{role:'user',content:[
        {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b64}},
        {type:'text',text:prompt}
      ]}],
      max_tokens:300,temperature:0.3
    })
  });
  const data=await r.json();
  if(!r.ok)throw new Error(data?.error?.message||'Groq error '+r.status);
  const text=(data?.choices?.[0]?.message?.content||'').trim();
  if(!text)throw new Error('Empty response');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}
async function geminiMeal(b64){
  return groqVision(b64,'Analyze this food photo. Estimate macros for what you see.\nReturn ONLY valid JSON (no markdown): {"name":"Food Name","kcal":0,"protein":0,"fat":0,"carbs":0,"qty":1,"unit":"serving"}');
}
async function geminiLabel(b64){
  return groqVision(b64,'Read this nutrition label photo. Extract per-serving nutrition.\nReturn ONLY valid JSON (no markdown): {"name":"Product Name","kcal":0,"protein":0,"fat":0,"carbs":0,"qty":100,"unit":"g"}');
}
async function geminiDescribe(desc){
  return groqText(`Estimate macronutrients for this meal: "${desc}"\nReturn ONLY valid JSON (no markdown): {"name":"Meal Name","kcal":0,"protein":0,"fat":0,"carbs":0,"qty":1,"unit":"serving"}`);
}

// BOOT
// ═══════════════════════════════════════════════════════
// ── SETTINGS ──
function openSettings(){
  document.getElementById('settings-modal').style.display='block';
}
function closeSettings(){
  document.getElementById('settings-modal').style.display='none';
}
function restartOnboarding(){
  closeSettings();
  obState={step:0,sex:null,dob:null,height_unit:'cm',height_cm:175,weight_unit:'kg',weight_kg:80,activity:null,tdee_ok:null,goal:null,target_weight_kg:null,goal_rate:0.5,diet:null,calorie_floor:'standard',training:null,distribution:'even',protein_pref:'moderate'};
  document.getElementById('app').classList.remove('vis');
  document.getElementById('ob').classList.remove('gone');
  obRender();
}
function clearFoodLog(){
  if(!confirm('Clear all food entries for today?')) return;
  FL.saveLog(curDate,[]);
  closeSettings();
  renderMacroBars();
  renderFoodLog();
}

(function boot(){
  // Set up cloud sync for food logger data
  if(window.initCloudSync){
    window.initCloudSync({
      appKey:'food-logger',
      syncedKeys:['fl_profile'],
      syncedPrefixes:['fl_log_','fl_lib'],
      onApplied:()=>{
        const p=FL.profile();
        if(p&&p.setup_done){
          renderMacroBars();
          renderFoodLog();
        }
      }
    });
  }

  let p=FL.profile();

  // Ensure profile has all required default fields
  if(p&&!p.daily_kcal){
    const targets=calcTargets(p);
    p.daily_kcal=targets.kcal;
    p.daily_protein=targets.protein;
    p.daily_fat=targets.fat;
    p.daily_carbs=targets.carbs;
    FL.saveProfile(p);
  }

  if(p&&p.setup_done){
    document.getElementById('ob').classList.add('gone');
    document.getElementById('app').classList.add('vis');
    initApp();
  } else {
    obRender();
  }

  // Set up add button (FAB via search bar)
  document.getElementById('srchInput')&&document.getElementById('srchInput').addEventListener('focus',()=>openAddSheet('search',''));
})();
</script>
