<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Life Calendar</title>
<script src="topbar.js" defer></script>
<style>
:root{
  --bg:#000;--s1:#1c1c1e;--s2:#2c2c2e;--s3:#3a3a3c;
  --t:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.28);
  --blue:#0A84FF;--red:#FF3B30;--div:rgba(255,255,255,.08);
  --font:-apple-system,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--t);font-family:var(--font);
  -webkit-font-smoothing:antialiased;height:100%;overflow:hidden}
::-webkit-scrollbar{width:0}

/* ── App shell ── */
.cal-app{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto}

/* ── Nav ── */
.cal-nav{display:flex;align-items:center;gap:10px;padding:12px 16px 6px;flex-shrink:0}
.cal-nav-arrows{display:flex;gap:2px}
.cal-nav-arrow{width:32px;height:32px;border:none;background:transparent;color:var(--blue);
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:background .15s}
.cal-nav-arrow:hover{background:rgba(10,132,255,.12)}
.cal-nav-title{font-size:20px;font-weight:700;letter-spacing:-.02em;flex:1;color:var(--t);cursor:pointer}
.cal-nav-title span{font-weight:400;color:var(--t2)}
.cal-today-btn{padding:5px 12px;background:rgba(255,255,255,.1);border:none;border-radius:999px;
  color:var(--t);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.cal-today-btn:hover{background:rgba(255,255,255,.16)}

/* ── View switcher ── */
.cal-view-sw{display:flex;justify-content:center;gap:0;padding:0 16px 10px;flex-shrink:0}
.cal-vsw-inner{display:flex;background:rgba(255,255,255,.07);border-radius:9px;padding:2px}
.cal-vbtn{padding:6px 18px;border:none;border-radius:7px;background:transparent;
  color:var(--t2);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,color .15s}
.cal-vbtn.on{background:rgba(255,255,255,.15);color:var(--t);font-weight:600}

/* ── Weekday headers ── */
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px;flex-shrink:0;margin-bottom:2px}
.cal-wd{text-align:center;font-size:11px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--t3);padding:3px 0}

/* ── Month view ── */
.cal-month{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 8px 80px}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px 0}
.cal-cell{min-height:60px;padding:3px 1px;cursor:pointer;border-radius:6px;transition:background .1s;overflow:hidden}
.cal-cell:hover{background:rgba(255,255,255,.04)}
.cal-cell.other{opacity:.28}
.cal-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 2px;border-radius:50%;font-size:15px;font-weight:400;color:var(--t)}
.cal-cell.today .cal-num{background:var(--red);color:#fff;font-weight:700}
.cal-cell.sel:not(.today) .cal-num{background:var(--blue);color:#fff;font-weight:600}
.cal-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;padding:0 3px;min-height:7px}
.cal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cal-dot.training{width:5px;height:5px;opacity:.65}

/* ── Slide animations ── */
@keyframes sl-left {from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes sl-right{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
.anim-left {animation:sl-left  .26s cubic-bezier(.22,1,.36,1) both}
.anim-right{animation:sl-right .26s cubic-bezier(.22,1,.36,1) both}

/* ── Week view ── */
.cal-week{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cal-week-hdr{display:grid;grid-template-columns:44px repeat(7,1fr);border-bottom:1px solid var(--div);flex-shrink:0;padding:0 4px}
.cal-wkday{text-align:center;padding:6px 2px}
.cal-wkday-name{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3)}
.cal-wkday-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  margin:2px auto 0;border-radius:50%;font-size:16px;color:var(--t)}
.cal-wkday.today .cal-wkday-num{background:var(--red);color:#fff;font-weight:700}
.cal-wkday.sel:not(.today) .cal-wkday-num{background:var(--blue);color:#fff}
.cal-week-scroll{flex:1;overflow-y:auto;position:relative}
.cal-week-body{display:grid;grid-template-columns:44px repeat(7,1fr);min-height:1440px;padding:0 4px}
.cal-tlbl{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;
  padding-right:6px;padding-top:1px;font-size:10px;font-weight:500;color:var(--t3);font-variant-numeric:tabular-nums}
.cal-wcol{position:relative;border-left:1px solid var(--div)}
.cal-hslot{height:60px;border-bottom:1px solid rgba(255,255,255,.04)}
.cal-wev{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 5px;
  cursor:pointer;z-index:2;overflow:hidden}
.cal-wev.training-ev{opacity:.75;border-left:2px solid rgba(255,255,255,.3)}
.cal-wev-title{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:10;pointer-events:none}
.cal-now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;background:var(--red);border-radius:50%}

/* ── Day view ── */
.cal-day{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cal-day-hdr{text-align:center;padding:10px 20px 8px;border-bottom:1px solid var(--div);flex-shrink:0}
.cal-day-hdr-name{font-size:13px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.cal-day-hdr-num{font-size:40px;font-weight:300;line-height:1.1;color:var(--t)}
.cal-day.today-view .cal-day-hdr-num{color:var(--red)}
.cal-day-scroll{flex:1;overflow-y:auto}
.cal-day-body{display:grid;grid-template-columns:44px 1fr;min-height:1440px;padding:0 4px}
.cal-dcol{position:relative;border-left:1px solid var(--div)}
.cal-dev{position:absolute;left:3px;right:3px;border-radius:8px;padding:5px 8px;cursor:pointer;z-index:2}
.cal-dev.training-ev{opacity:.75;border-left:3px solid rgba(255,255,255,.3)}
.cal-dev-title{font-size:13px;font-weight:700;color:#000}
.cal-dev-time{font-size:11px;color:rgba(0,0,0,.65);margin-top:1px}

/* ── FAB ── */
.cal-fab{position:fixed;bottom:max(28px,env(safe-area-inset-bottom));right:20px;
  width:52px;height:52px;background:var(--blue);border:none;border-radius:50%;
  color:#fff;font-size:28px;font-weight:300;cursor:pointer;z-index:50;
  box-shadow:0 4px 20px rgba(10,132,255,.4);display:flex;align-items:center;justify-content:center;
  transition:transform .15s}
.cal-fab:active{transform:scale(.94)}

/* ── Overlays ── */
.cal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  opacity:0;pointer-events:none;transition:opacity .3s}
.cal-overlay.open{opacity:1;pointer-events:all}

/* ── Event sheet (Apple Calendar style) ── */
.cal-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:14px 14px 0 0;
  z-index:101;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);
  max-height:96vh;display:flex;flex-direction:column}
.cal-sheet.open{transform:translateY(0)}
.cal-sheet-handle{width:36px;height:5px;background:rgba(255,255,255,.2);border-radius:3px;margin:8px auto 0;flex-shrink:0}

/* Sheet top bar */
.cal-sheet-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;flex-shrink:0}
.cal-sheet-xbtn{width:32px;height:32px;background:rgba(255,255,255,.1);border:none;border-radius:50%;
  color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.cal-sheet-xbtn:hover{background:rgba(255,255,255,.16)}
.cal-sheet-label{font-size:17px;font-weight:600;color:var(--t)}
.cal-sheet-okbtn{width:32px;height:32px;background:rgba(10,132,255,.18);border:none;border-radius:50%;
  color:var(--blue);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.cal-sheet-okbtn:hover{background:rgba(10,132,255,.28)}

/* Sheet content */
.cal-sheet-scroll{flex:1;overflow-y:auto;padding:0 0 max(24px,env(safe-area-inset-bottom))}

/* Grouped card */
.ac-g{margin:0 16px 10px;background:var(--s2);border-radius:12px;overflow:hidden}
.ac-row{display:flex;align-items:center;min-height:44px;padding:9px 14px;gap:10px}
.ac-sep{height:1px;background:var(--s3);margin-left:14px}
.ac-lbl{font-size:16px;color:var(--t);flex:1;white-space:nowrap}
.ac-val{font-size:16px;color:var(--t2)}
.ac-chev{color:var(--t3);font-size:13px}
.ac-tap{cursor:pointer;transition:background .15s}
.ac-tap:hover{background:rgba(255,255,255,.04)}
.ac-title-inp{width:100%;background:transparent;border:none;outline:none;color:var(--t);font-family:var(--font);font-size:18px;padding:0}
.ac-title-inp::placeholder{color:var(--t3)}
.ac-loc-inp{width:100%;background:transparent;border:none;outline:none;color:var(--t);font-family:var(--font);font-size:15px;padding:0}
.ac-loc-inp::placeholder{color:var(--t3)}

/* iOS toggle */
.ac-toggle{width:51px;height:31px;background:#39393D;border-radius:15.5px;position:relative;
  cursor:pointer;transition:background .3s;flex-shrink:0}
.ac-toggle.on{background:var(--blue)}
.ac-toggle::after{content:'';position:absolute;width:27px;height:27px;background:#fff;border-radius:50%;
  top:2px;left:2px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 4px rgba(0,0,0,.35)}
.ac-toggle.on::after{transform:translateX(20px)}

/* Date/time pills */
.ac-dt-pills{display:flex;gap:5px;flex-shrink:0}
.ac-dpill,.ac-tpill{padding:5px 10px;background:rgba(255,255,255,.1);border:none;border-radius:7px;
  color:var(--t);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap}
.ac-dpill:hover,.ac-tpill:hover{background:rgba(255,255,255,.16)}
.ac-dpill.on{background:rgba(10,132,255,.3);color:var(--blue)}
.ac-tpill.on{background:rgba(10,132,255,.3);color:var(--blue)}

/* Inline panels */
.ac-panel{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.22,1,.36,1)}
.ac-panel.open{max-height:360px}

/* Mini calendar */
.ac-mini-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px}
.ac-mini-title{font-size:15px;font-weight:700;color:var(--t)}
.ac-mini-arrows{display:flex;gap:4px}
.ac-mini-arr{width:28px;height:28px;border:none;background:transparent;color:var(--blue);
  font-size:18px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s}
.ac-mini-arr:hover{background:rgba(10,132,255,.12)}
.ac-mini-wdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 4px}
.ac-mini-wd{text-align:center;font-size:11px;font-weight:600;color:var(--t3);padding:2px 0}
.ac-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 4px 8px}
.ac-mini-day{width:34px;height:34px;margin:1px auto;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:14px;color:var(--t);cursor:pointer;transition:background .1s;font-family:var(--font)}
.ac-mini-day:hover:not(.today-d):not(.sel-d){background:rgba(255,255,255,.1)}
.ac-mini-day.other-m{color:var(--t3)}
.ac-mini-day.today-d{background:var(--red);color:#fff;font-weight:700}
.ac-mini-day.sel-d:not(.today-d){background:var(--blue);color:#fff;font-weight:600}

/* Drum time picker */
.ac-drum{padding:0 16px 8px;display:flex;align-items:center;justify-content:center}
.ac-drum-outer{position:relative;display:flex;align-items:center;height:176px;width:160px}
.ac-drum-sel{position:absolute;left:0;right:0;top:50%;height:44px;transform:translateY(-50%);
  background:rgba(255,255,255,.1);border-radius:8px;pointer-events:none}
.ac-drum-col{flex:1;height:176px;overflow-y:scroll;scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.ac-drum-col::-webkit-scrollbar{display:none}
.ac-drum-pad{height:66px}
.ac-drum-item{height:44px;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;
  font-size:22px;color:rgba(255,255,255,.28);cursor:pointer;font-variant-numeric:tabular-nums}
.ac-drum-item.sel{color:var(--t);font-weight:600}
.ac-drum-colon{font-size:26px;color:var(--t);padding:0 5px;flex-shrink:0}

/* Color picker */
.ac-colors{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px}
.ac-color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0;
  border:2px solid transparent;transition:transform .15s,border-color .15s;display:flex;align-items:center;justify-content:center}
.ac-color-dot.sel{border-color:#fff;transform:scale(1.18)}
.ac-color-dot.sel::after{content:'✓';font-size:11px;font-weight:700;color:#fff}

/* Notes */
.ac-notes{width:100%;background:transparent;border:none;outline:none;color:var(--t);
  font-family:var(--font);font-size:15px;resize:none;line-height:1.5;padding:0;min-height:60px}
.ac-notes::placeholder{color:var(--t3)}

/* Picker sheet */
.cal-picker{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:14px 14px 0 0;
  z-index:102;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  max-height:70vh;overflow-y:auto}
.cal-picker.open{transform:translateY(0)}
.cal-picker-title{font-size:13px;font-weight:600;color:var(--t2);text-align:center;padding:14px 20px 8px}
.cal-picker-group{margin:0 16px 16px;background:var(--s2);border-radius:12px;overflow:hidden}
.cal-picker-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;
  cursor:pointer;border-bottom:1px solid var(--s3);transition:background .15s}
.cal-picker-row:last-child{border-bottom:none}
.cal-picker-row:hover{background:rgba(255,255,255,.05)}
.cal-picker-row-lbl{font-size:16px;color:var(--t)}
.cal-picker-check{color:var(--blue);font-size:18px;font-weight:700}
.cal-picker-cancel{width:calc(100% - 32px);margin:0 16px max(20px,env(safe-area-inset-bottom));
  padding:14px;background:var(--s2);border:none;border-radius:12px;
  color:var(--blue);font-family:var(--font);font-size:17px;font-weight:600;cursor:pointer}

/* Detail sheet */
.cal-detail{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:20px 20px 0 0;
  z-index:101;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:70vh;overflow-y:auto}
.cal-detail.open{transform:translateY(0)}
.cal-det-handle{width:36px;height:5px;background:rgba(255,255,255,.2);border-radius:3px;margin:10px auto 0}
.cal-det-color-bar{height:4px;border-radius:2px;margin:12px 20px 14px}
.cal-det-title{font-size:22px;font-weight:700;color:var(--t);padding:0 20px;margin-bottom:6px}
.cal-det-meta{font-size:14px;color:var(--t2);padding:0 20px;line-height:1.7}
.cal-det-del{width:calc(100% - 32px);margin:14px 16px max(20px,env(safe-area-inset-bottom));
  padding:13px;background:rgba(255,59,48,.12);border:1px solid rgba(255,59,48,.25);border-radius:12px;
  color:var(--red);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer}

/* Section label */
.ac-slbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;
  letter-spacing:.06em;margin:14px 16px 6px;padding:0}

@media(max-width:380px){
  .cal-cell{min-height:52px}
  .cal-num{width:24px;height:24px;font-size:13px}
}
</style>
</head>
<body>
<div class="cal-app" id="calApp">
  <!-- Navigation -->
  <div class="cal-nav">
    <div class="cal-nav-arrows">
      <button class="cal-nav-arrow" id="calPrev">‹</button>
      <button class="cal-nav-arrow" id="calNext">›</button>
    </div>
    <div class="cal-nav-title" id="calNavTitle">June <span>2026</span></div>
    <button class="cal-today-btn" id="calTodayBtn">Today</button>
  </div>

  <!-- View switcher -->
  <div class="cal-view-sw">
    <div class="cal-vsw-inner">
      <button class="cal-vbtn on" data-v="month">Month</button>
      <button class="cal-vbtn" data-v="week">Week</button>
      <button class="cal-vbtn" data-v="day">Day</button>
    </div>
  </div>

  <!-- Weekday headers (Mon-first) -->
  <div class="cal-wdays" id="calWdays">
    <div class="cal-wd">Mo</div><div class="cal-wd">Tu</div>
    <div class="cal-wd">We</div><div class="cal-wd">Th</div>
    <div class="cal-wd">Fr</div>
    <div class="cal-wd" style="color:rgba(255,90,90,.5)">Sa</div>
    <div class="cal-wd" style="color:rgba(255,90,90,.5)">Su</div>
  </div>

  <!-- Month view -->
  <div class="cal-month" id="viewMonth"><div class="cal-month-grid" id="monthGrid"></div></div>

  <!-- Week view -->
  <div class="cal-week" id="viewWeek" style="display:none">
    <div class="cal-week-hdr" id="weekHdr"></div>
    <div class="cal-week-scroll" id="weekScroll"><div class="cal-week-body" id="weekBody"></div></div>
  </div>

  <!-- Day view -->
  <div class="cal-day" id="viewDay" style="display:none">
    <div class="cal-day-hdr" id="dayHdr"></div>
    <div class="cal-day-scroll" id="dayScroll"><div class="cal-day-body" id="dayBody"></div></div>
  </div>
</div>

<button class="cal-fab" id="calFab">+</button>

<!-- Overlay -->
<div class="cal-overlay" id="calOverlay"></div>

<!-- ── Add/Edit event sheet ── -->
<div class="cal-sheet" id="evSheet">
  <div class="cal-sheet-handle"></div>
  <div class="cal-sheet-bar">
    <button class="cal-sheet-xbtn" id="evClose">✕</button>
    <span class="cal-sheet-label" id="evSheetLabel">New Event</span>
    <button class="cal-sheet-okbtn" id="evSave">✓</button>
  </div>
  <div class="cal-sheet-scroll">
    <!-- Title + Location -->
    <div class="ac-g">
      <div class="ac-row"><input class="ac-title-inp" id="evTitle" type="text" placeholder="Title" autocomplete="off"></div>
      <div class="ac-sep"></div>
      <div class="ac-row"><input class="ac-loc-inp" id="evLocation" type="text" placeholder="Location or Video Call" autocomplete="off"></div>
    </div>

    <!-- Time -->
    <div class="ac-g">
      <div class="ac-row">
        <span class="ac-lbl">All-day</span>
        <div class="ac-toggle" id="evAllDay"></div>
      </div>
      <div class="ac-sep"></div>
      <!-- Start row -->
      <div class="ac-row">
        <span class="ac-lbl">Start</span>
        <div class="ac-dt-pills">
          <button class="ac-dpill" id="evStartDate">01.01.2026</button>
          <button class="ac-tpill" id="evStartTime">09:00</button>
        </div>
      </div>
      <!-- Inline calendar -->
      <div class="ac-panel" id="panelCal">
        <div class="ac-sep"></div>
        <div class="ac-mini-nav">
          <div class="ac-mini-title" id="miniCalTitle">June 2026</div>
          <div class="ac-mini-arrows">
            <button class="ac-mini-arr" id="miniCalPrev">‹</button>
            <button class="ac-mini-arr" id="miniCalNext">›</button>
          </div>
        </div>
        <div class="ac-mini-wdays">
          <div class="ac-mini-wd">Mo</div><div class="ac-mini-wd">Tu</div><div class="ac-mini-wd">We</div>
          <div class="ac-mini-wd">Th</div><div class="ac-mini-wd">Fr</div><div class="ac-mini-wd">Sa</div><div class="ac-mini-wd">Su</div>
        </div>
        <div class="ac-mini-grid" id="miniCalGrid"></div>
      </div>
      <!-- Inline time drum -->
      <div class="ac-panel" id="panelTime">
        <div class="ac-sep"></div>
        <div class="ac-drum">
          <div class="ac-drum-outer">
            <div class="ac-drum-sel"></div>
            <div class="ac-drum-col" id="drumHour"></div>
            <div class="ac-drum-colon">:</div>
            <div class="ac-drum-col" id="drumMin"></div>
          </div>
        </div>
      </div>
      <div class="ac-sep"></div>
      <!-- End row -->
      <div class="ac-row">
        <span class="ac-lbl">End</span>
        <div class="ac-dt-pills">
          <button class="ac-dpill" id="evEndDate">01.01.2026</button>
          <button class="ac-tpill" id="evEndTime">10:00</button>
        </div>
      </div>
    </div>

    <!-- Repeat -->
    <div class="ac-g">
      <div class="ac-row ac-tap" id="evRepeatRow">
        <span class="ac-lbl">Repeat</span>
        <span class="ac-val" id="evRepeatVal">Never</span>
        <span class="ac-chev">›</span>
      </div>
    </div>

    <!-- Alert -->
    <div class="ac-g">
      <div class="ac-row ac-tap" id="evAlertRow">
        <span class="ac-lbl">Alert</span>
        <span class="ac-val" id="evAlertVal">None</span>
        <span class="ac-chev">›</span>
      </div>
    </div>

    <!-- Color -->
    <div class="ac-g">
      <div class="ac-row" style="flex-wrap:wrap;padding-bottom:6px">
        <span class="ac-lbl" style="width:100%;margin-bottom:4px">Color</span>
        <div class="ac-colors" id="evColors" style="padding:0;margin:0;width:100%"></div>
      </div>
    </div>

    <!-- Notes -->
    <div class="ac-g">
      <div class="ac-row"><textarea class="ac-notes" id="evNotes" placeholder="Notes" rows="3"></textarea></div>
    </div>
  </div>
</div>

<!-- ── Event detail sheet ── -->
<div class="cal-detail" id="evDetail">
  <div class="cal-det-handle"></div>
  <div id="evDetailContent"></div>
</div>

<!-- ── Picker sheet (Repeat / Alert) ── -->
<div class="cal-picker" id="calPicker">
  <div class="cal-picker-title" id="pickerTitle">Repeat</div>
  <div class="cal-picker-group" id="pickerOptions"></div>
  <button class="cal-picker-cancel" id="pickerCancel">Cancel</button>
</div>

<script>
(function(){
'use strict';

/* ── Config ── */
const SUPA_URL='PASTE-YOUR-SUPABASE-PROJECT-URL-HERE';
const SUPA_KEY='PASTE-YOUR-SUPABASE-PUBLISHABLE-KEY-HERE';
const SK='life_calendar_v1';
const TRAIN_SK='training_calendar_v1';

/* ── iOS event colors ── */
const COLORS=[
  {id:'red',    hex:'#FF453A'},
  {id:'orange', hex:'#FF9F0A'},
  {id:'yellow', hex:'#FFD60A'},
  {id:'green',  hex:'#30D158'},
  {id:'teal',   hex:'#40CBE0'},
  {id:'blue',   hex:'#0A84FF'},
  {id:'indigo', hex:'#5E5CE6'},
  {id:'purple', hex:'#BF5AF2'},
  {id:'pink',   hex:'#FF375F'},
  {id:'brown',  hex:'#AC8E68'},
];
const DEFAULT_COLOR='blue';

/* ── Training sport mapping ── */
const DISC={
  run:{emoji:'🏃',label:'🏃 Run',color:'#6ee7b7'},
  swim:{emoji:'🏊',label:'🏊 Swim',color:'#38bdf8'},
  bike:{emoji:'🚴',label:'🚴 Bike',color:'#f59e0b'},
  strength:{emoji:'💪',label:'💪 Strength',color:'#a78bfa'},
  hyrox:{emoji:'🔥',label:'🔥 Hyrox',color:'#fb923c'},
  race:{emoji:'🏁',label:'🏁 Race',color:'#f43f5e'},
  rest:{emoji:'😴',label:'😴 Rest',color:'#6b7280'},
};

/* ── Repeat / Alert options ── */
const REPEAT_OPTS=[
  {val:'',label:'Never'},{val:'daily',label:'Every Day'},
  {val:'weekly',label:'Every Week'},{val:'biweekly',label:'Every 2 Weeks'},
  {val:'monthly',label:'Every Month'},{val:'yearly',label:'Every Year'},
];
const ALERT_OPTS=[
  {val:'',label:'None'},{val:'0',label:'At time of event'},
  {val:'5',label:'5 minutes before'},{val:'15',label:'15 minutes before'},
  {val:'30',label:'30 minutes before'},{val:'60',label:'1 hour before'},
  {val:'120',label:'2 hours before'},{val:'1440',label:'1 day before'},
  {val:'10080',label:'1 week before'},
];

const MONTHS=['January','February','March','April','May','June',
              'July','August','September','October','November','December'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ── State ── */
let st={view:'month',year:new Date().getFullYear(),month:new Date().getMonth(),selDate:null,events:[]};
let miniY,miniM,openPanel=null,openPicker=null;
let editingId=null,pickerTarget=null;
let allDay=false,evColor=DEFAULT_COLOR;
let startDate='',endDate='',startTime='09:00',endTime='10:00';
let repeatVal='',alertVal='';

/* ── Storage ── */
function load(){try{st.events=JSON.parse(localStorage.getItem(SK))||[];}catch(e){st.events=[];}}
function save(){try{localStorage.setItem(SK,JSON.stringify(st.events));}catch(e){}syncSupa();}
async function syncSupa(){
  if(!SUPA_URL.includes('PASTE')&&window.supabase){
    try{const db=window.supabase.createClient(SUPA_URL,SUPA_KEY);
      await db.from('app_state').upsert({key:SK,data:st.events,updated_at:new Date().toISOString()},{onConflict:'key'});}
    catch(e){}
  }
}

/* ── Helpers ── */
function p2(n){return String(n).padStart(2,'0')}
function today(){const d=new Date();return dk(d.getFullYear(),d.getMonth(),d.getDate())}
function dk(y,m,d){return y+'-'+p2(m+1)+'-'+p2(d)}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function fmtDE(s){const[y,m,d]=s.split('-');return d+'.'+m+'.'+y}
function fmt12(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return(h%12||12)+':'+p2(m)+(h>=12?' PM':' AM')}
function colorHex(id){return(COLORS.find(c=>c.id===id)||COLORS[5]).hex}
function dow(ds){return pd(ds).getDay()} // 0=Sun

/* ── Get training sessions (read-only) ── */
function getTrainSessions(){
  try{
    const raw=JSON.parse(localStorage.getItem(TRAIN_SK))||[];
    return raw.map(s=>({
      id:'tr_'+s.id,type:'training',date:s.date,
      title:(DISC[s.discipline]||{label:s.name||s.discipline}).label,
      color:(DISC[s.discipline]||{color:'#6b7280'}).color,
      startTime:s.time||null,readonly:true
    }));
  }catch(e){return[];}
}

/* ── All events for a date ── */
function eventsOn(ds){
  const d=pd(ds);
  const life=st.events.filter(ev=>{
    if(ev.repeat==='yearly'){const e=pd(ev.date);return e.getMonth()===d.getMonth()&&e.getDate()===d.getDate();}
    if(ev.repeat==='monthly'){const e=pd(ev.date);return e.getDate()===d.getDate()&&ds>=ev.date;}
    if(ev.repeat==='weekly'){const e=pd(ev.date);return e.getDay()===d.getDay()&&ds>=ev.date;}
    if(ev.repeat==='biweekly'){const e=pd(ev.date);const diff=(d-e)/86400000;return e.getDay()===d.getDay()&&ds>=ev.date&&Math.round(diff/7)%2===0;}
    if(ev.repeat==='daily')return ds>=ev.date;
    const end=ev.endDate&&ev.endDate>ev.date?ev.endDate:ev.date;
    return ds>=ev.date&&ds<=end;
  });
  const train=getTrainSessions().filter(s=>s.date===ds);
  return[...life,...train];
}

/* ── Week days (Mon-first) ── */
function weekDays(ds){
  const d=pd(ds),dow=d.getDay(),mon=(dow===0?-6:1)-dow;
  const s=new Date(d);s.setDate(d.getDate()+mon);
  return Array.from({length:7},(_,i)=>{const x=new Date(s);x.setDate(s.getDate()+i);return dk(x.getFullYear(),x.getMonth(),x.getDate());});
}

/* ── Render nav title ── */
function renderNav(){
  const el=document.getElementById('calNavTitle');
  if(st.view==='month'){el.innerHTML=MONTHS[st.month]+' <span>'+st.year+'</span>';return;}
  if(st.view==='week'){
    const days=weekDays(st.selDate||today()),s=pd(days[0]),e=pd(days[6]);
    const sm=MONTHS[s.getMonth()].slice(0,3),em=MONTHS[e.getMonth()].slice(0,3);
    el.innerHTML=(sm===em?sm+' '+s.getDate()+'–'+e.getDate():sm+' '+s.getDate()+' – '+em+' '+e.getDate())+' <span>'+s.getFullYear()+'</span>';return;
  }
  const d=pd(st.selDate||today());
  el.innerHTML=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()].slice(0,3)+' '+d.getDate()+' <span>'+d.getFullYear()+'</span>';
}

/* ── Month render ── */
function renderMonth(animDir){
  const todayStr=today();
  // Monday-first grid
  const first=new Date(st.year,st.month,1);
  const last=new Date(st.year,st.month+1,0);
  const fdow=((first.getDay()+6)%7); // 0=Mon
  const cells=[];
  for(let i=0;i<fdow;i++){const d=new Date(st.year,st.month,-(fdow-i-1));cells.push({ds:dk(d.getFullYear(),d.getMonth(),d.getDate()),other:true});}
  for(let d=1;d<=last.getDate();d++)cells.push({ds:dk(st.year,st.month,d),other:false});
  while(cells.length%7!==0){const idx=cells.length-fdow-last.getDate()+1;const d=new Date(st.year,st.month+1,idx);cells.push({ds:dk(d.getFullYear(),d.getMonth(),d.getDate()),other:true});}

  const html=cells.map(c=>{
    const d=pd(c.ds);
    const isT=c.ds===todayStr,isSel=c.ds===st.selDate&&!isT;
    const dow2=d.getDay();
    const evs=eventsOn(c.ds);
    let cls='cal-cell'+(c.other?' other':'')+(isT?' today':'')+(isSel?' sel':'');
    const dots=evs.slice(0,4).map(ev=>`<div class="cal-dot${ev.type==='training'?' training':''}" style="background:${ev.type==='training'?ev.color:colorHex(ev.color||DEFAULT_COLOR)}"></div>`).join('');
    return`<div class="${cls}" data-date="${c.ds}">
      <div class="cal-num">${d.getDate()}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }).join('');

  const old=document.getElementById('monthGrid');
  const ng=document.createElement('div');ng.id='monthGrid';
  ng.className='cal-month-grid'+(animDir?' anim-'+animDir:'');
  ng.innerHTML=html;
  ng.addEventListener('click',e=>{
    const cell=e.target.closest('[data-date]');if(!cell)return;
    st.selDate=cell.dataset.date;
    openAddSheet(cell.dataset.date);
    renderMonth(null);
  });
  old.parentNode.replaceChild(ng,old);
}

/* ── Week render ── */
function renderWeek(){
  const todayStr=today();
  const days=weekDays(st.selDate||todayStr);

  // Header
  const hdr=document.getElementById('weekHdr');
  hdr.innerHTML='<div></div>'+days.map(ds=>{
    const d=pd(ds),isT=ds===todayStr,isSel=ds===st.selDate&&!isT;
    return`<div class="cal-wkday${isT?' today':''}${isSel?' sel':''}" data-date="${ds}">
      <div class="cal-wkday-name">${DAYS[d.getDay()].slice(0,1)}</div>
      <div class="cal-wkday-num">${d.getDate()}</div>
    </div>`;
  }).join('');
  hdr.querySelectorAll('[data-date]').forEach(el=>el.addEventListener('click',()=>{st.selDate=el.dataset.date;st.view='day';render(null);}));

  // Body
  const body=document.getElementById('weekBody');
  let html='<div>';
  for(let h=0;h<24;h++){const l=h===0?'':(h<12?h+' AM':h===12?'12 PM':(h-12)+' PM');html+=`<div class="cal-tlbl">${l}</div>`;}
  html+='</div>';
  days.forEach(ds=>{
    const evs=eventsOn(ds).filter(ev=>ev.startTime);
    html+=`<div class="cal-wcol" data-date="${ds}">`;
    for(let h=0;h<24;h++)html+='<div class="cal-hslot"></div>';
    evs.forEach(ev=>{
      const[sh,sm]=ev.startTime.split(':').map(Number);
      const[eh,em]=(ev.endTime||ev.startTime).split(':').map(Number);
      const top=sh*60+sm,ht=Math.max(28,(eh*60+em)-top);
      const bg=ev.type==='training'?ev.color:colorHex(ev.color||DEFAULT_COLOR);
      html+=`<div class="cal-wev${ev.type==='training'?' training-ev':''}" data-id="${ev.id}"
        style="top:${top}px;height:${ht}px;background:${bg}">
        <div class="cal-wev-title" style="color:rgba(0,0,0,.85)">${ev.title}</div>
      </div>`;
    });
    html+='</div>';
  });
  body.innerHTML=html;

  // Now line
  const now=new Date(),nowMin=now.getHours()*60+now.getMinutes();
  body.querySelectorAll(`[data-date="${todayStr}"]`).forEach(col=>{
    const ln=document.createElement('div');ln.className='cal-now-line';ln.style.top=nowMin+'px';col.appendChild(ln);
  });
  document.getElementById('weekScroll').scrollTop=Math.max(0,nowMin-120);

  body.addEventListener('click',e=>{
    const el=e.target.closest('[data-id]');
    if(el&&!el.classList.contains('training-ev'))openDetail(el.dataset.id);
    else if(!el){const col=e.target.closest('[data-date]');if(col)openAddSheet(col.dataset.date);}
  });
}

/* ── Day render ── */
function renderDay(){
  const todayStr=today(),ds=st.selDate||todayStr,d=pd(ds),isT=ds===todayStr;
  const hdr=document.getElementById('dayHdr');
  hdr.className='cal-day-hdr'+(isT?' today-view':'');
  document.getElementById('viewDay').className='cal-day'+(isT?' today-view':'');
  hdr.innerHTML=`<div class="cal-day-hdr-name">${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]}</div>
    <div class="cal-day-hdr-num">${d.getDate()}</div>`;

  const body=document.getElementById('dayBody');
  const timed=eventsOn(ds).filter(ev=>ev.startTime);
  let html='<div>';
  for(let h=0;h<24;h++){const l=h===0?'':(h<12?h+' AM':h===12?'12 PM':(h-12)+' PM');html+=`<div class="cal-tlbl">${l}</div>`;}
  html+='</div><div class="cal-dcol">';
  for(let h=0;h<24;h++)html+='<div class="cal-hslot"></div>';
  timed.forEach(ev=>{
    const[sh,sm]=ev.startTime.split(':').map(Number);
    const[eh,em]=(ev.endTime||ev.startTime).split(':').map(Number);
    const top=sh*60+sm,ht=Math.max(40,(eh*60+em)-top);
    const bg=ev.type==='training'?ev.color:colorHex(ev.color||DEFAULT_COLOR);
    html+=`<div class="cal-dev${ev.type==='training'?' training-ev':''}" data-id="${ev.id}"
      style="top:${top}px;height:${ht}px;background:${bg}">
      <div class="cal-dev-title">${ev.title}</div>
      <div class="cal-dev-time" style="color:rgba(0,0,0,.65)">${fmt12(ev.startTime)}${ev.endTime?' – '+fmt12(ev.endTime):''}</div>
    </div>`;
  });
  html+='</div>';
  body.innerHTML=html;

  if(isT){
    const now=new Date(),nowMin=now.getHours()*60+now.getMinutes();
    const col=body.querySelector('.cal-dcol');
    if(col){const ln=document.createElement('div');ln.className='cal-now-line';ln.style.top=nowMin+'px';col.appendChild(ln);}
    document.getElementById('dayScroll').scrollTop=Math.max(0,nowMin-120);
  }
  body.addEventListener('click',e=>{
    const el=e.target.closest('[data-id]');
    if(el&&!el.classList.contains('training-ev'))openDetail(el.dataset.id);
  });
}

/* ── Main render ── */
function render(animDir){
  renderNav();
  const mv=document.getElementById('viewMonth'),wv=document.getElementById('viewWeek'),dv=document.getElementById('viewDay');
  const wdays=document.getElementById('calWdays');
  mv.style.display=st.view==='month'?'':'none';
  wv.style.display=st.view==='week'?'flex':'none';
  dv.style.display=st.view==='day'?'flex':'none';
  wdays.style.display=st.view==='month'?'grid':'none';
  if(st.view==='month')renderMonth(animDir);
  else if(st.view==='week')renderWeek();
  else renderDay();
}

/* ── Navigation ── */
document.getElementById('calPrev').addEventListener('click',()=>{
  if(st.view==='month'){st.month--;if(st.month<0){st.month=11;st.year--;}render('right');}
  else if(st.view==='week'){const d=pd(st.selDate||today());d.setDate(d.getDate()-7);st.selDate=dk(d.getFullYear(),d.getMonth(),d.getDate());render('right');}
  else{const d=pd(st.selDate||today());d.setDate(d.getDate()-1);st.selDate=dk(d.getFullYear(),d.getMonth(),d.getDate());render(null);}
});
document.getElementById('calNext').addEventListener('click',()=>{
  if(st.view==='month'){st.month++;if(st.month>11){st.month=0;st.year++;}render('left');}
  else if(st.view==='week'){const d=pd(st.selDate||today());d.setDate(d.getDate()+7);st.selDate=dk(d.getFullYear(),d.getMonth(),d.getDate());render('left');}
  else{const d=pd(st.selDate||today());d.setDate(d.getDate()+1);st.selDate=dk(d.getFullYear(),d.getMonth(),d.getDate());render(null);}
});
document.getElementById('calTodayBtn').addEventListener('click',()=>{
  const d=new Date();st.year=d.getFullYear();st.month=d.getMonth();st.selDate=today();render(null);
});
document.querySelectorAll('.cal-vbtn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.cal-vbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');st.view=btn.dataset.v;
  if(!st.selDate)st.selDate=today();render(null);
}));

/* ── Swipe ── */
let tx=0,ty=0;
document.getElementById('calApp').addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;ty=e.changedTouches[0].clientY;},{passive:true});
document.getElementById('calApp').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>44)
    (dx<0?document.getElementById('calNext'):document.getElementById('calPrev')).click();
},{passive:true});

/* ── Color picker ── */
function buildColorPicker(){
  const wrap=document.getElementById('evColors');
  wrap.innerHTML=COLORS.map(c=>`<div class="ac-color-dot${evColor===c.id?' sel':''}"
    data-c="${c.id}" style="background:${c.hex}"></div>`).join('');
  wrap.querySelectorAll('[data-c]').forEach(el=>el.addEventListener('click',()=>{
    evColor=el.dataset.c;buildColorPicker();
  }));
}

/* ── Add/Edit sheet ── */
function openAddSheet(date){
  editingId=null;
  document.getElementById('evSheetLabel').textContent='New Event';
  document.getElementById('evTitle').value='';
  document.getElementById('evLocation').value='';
  document.getElementById('evNotes').value='';
  allDay=false;evColor=DEFAULT_COLOR;openPanel=null;
  startDate=date||today();endDate=startDate;startTime='09:00';endTime='10:00';repeatVal='';alertVal='';
  const pd2=pd(startDate);miniY=pd2.getFullYear();miniM=pd2.getMonth();
  document.getElementById('evAllDay').classList.remove('on');
  updateDateTimePills();updateRepeatAlert();buildColorPicker();updatePanels();
  openSheetEl('evSheet');
  setTimeout(()=>document.getElementById('evTitle').focus(),350);
}
function closeSheet(){closeSheetEl('evSheet');closeDetail();}
function openSheetEl(id){document.getElementById(id).classList.add('open');document.getElementById('calOverlay').classList.add('open');}
function closeSheetEl(id){document.getElementById(id).classList.remove('open');if(!document.getElementById('evDetail').classList.contains('open'))document.getElementById('calOverlay').classList.remove('open');}
function closeDetail(){document.getElementById('evDetail').classList.remove('open');document.getElementById('calOverlay').classList.remove('open');}

document.getElementById('calFab').addEventListener('click',()=>openAddSheet(st.selDate||today()));
document.getElementById('evClose').addEventListener('click',closeSheet);
document.getElementById('calOverlay').addEventListener('click',()=>{closeSheet();closePicker();});

/* All-day toggle */
document.getElementById('evAllDay').addEventListener('click',()=>{
  allDay=!allDay;document.getElementById('evAllDay').classList.toggle('on',allDay);
  document.getElementById('evStartTime').style.display=allDay?'none':'';
  document.getElementById('evEndTime').style.display=allDay?'none':'';
  if(allDay&&(openPanel==='startTime'||openPanel==='endTime')){openPanel=null;updatePanels();}
});

/* Date/time pills */
document.getElementById('evStartDate').addEventListener('click',()=>{openPanel=openPanel==='startCal'?null:'startCal';miniY=pd(startDate).getFullYear();miniM=pd(startDate).getMonth();updatePanels();renderMiniCal();});
document.getElementById('evEndDate').addEventListener('click',()=>{openPanel=openPanel==='endCal'?null:'endCal';miniY=pd(endDate).getFullYear();miniM=pd(endDate).getMonth();updatePanels();renderMiniCal();});
document.getElementById('evStartTime').addEventListener('click',()=>{openPanel=openPanel==='startTime'?null:'startTime';buildDrum(startTime,(t)=>{startTime=t;updateDateTimePills();});updatePanels();});
document.getElementById('evEndTime').addEventListener('click',()=>{openPanel=openPanel==='endTime'?null:'endTime';buildDrum(endTime,(t)=>{endTime=t;updateDateTimePills();});updatePanels();});

function updatePanels(){
  const calOpen=openPanel==='startCal'||openPanel==='endCal';
  const timeOpen=openPanel==='startTime'||openPanel==='endTime';
  document.getElementById('panelCal').classList.toggle('open',calOpen);
  document.getElementById('panelTime').classList.toggle('open',timeOpen);
  document.getElementById('evStartDate').classList.toggle('on',openPanel==='startCal');
  document.getElementById('evEndDate').classList.toggle('on',openPanel==='endCal');
  document.getElementById('evStartTime').classList.toggle('on',openPanel==='startTime');
  document.getElementById('evEndTime').classList.toggle('on',openPanel==='endTime');
  if(calOpen)renderMiniCal();
}
function updateDateTimePills(){
  document.getElementById('evStartDate').textContent=fmtDE(startDate);
  document.getElementById('evEndDate').textContent=fmtDE(endDate);
  document.getElementById('evStartTime').textContent=startTime;
  document.getElementById('evEndTime').textContent=endTime;
}
function updateRepeatAlert(){
  document.getElementById('evRepeatVal').textContent=(REPEAT_OPTS.find(r=>r.val===repeatVal)||REPEAT_OPTS[0]).label;
  document.getElementById('evAlertVal').textContent=(ALERT_OPTS.find(a=>a.val===alertVal)||ALERT_OPTS[0]).label;
}

/* Mini calendar */
function renderMiniCal(){
  const todayStr=today();
  const activeDate=openPanel==='endCal'?endDate:startDate;
  document.getElementById('miniCalTitle').textContent=MONTHS[miniM]+' '+miniY;
  const first=new Date(miniY,miniM,1),last=new Date(miniY,miniM+1,0);
  const fdow=(first.getDay()+6)%7;
  const cells=[];
  for(let i=0;i<fdow;i++){const d=new Date(miniY,miniM,-(fdow-i-1));cells.push({ds:dk(d.getFullYear(),d.getMonth(),d.getDate()),other:true});}
  for(let d=1;d<=last.getDate();d++)cells.push({ds:dk(miniY,miniM,d),other:false});
  while(cells.length%7!==0){const idx=cells.length-fdow-last.getDate()+1;const d=new Date(miniY,miniM+1,idx);cells.push({ds:dk(d.getFullYear(),d.getMonth(),d.getDate()),other:true});}
  const grid=document.getElementById('miniCalGrid');
  grid.innerHTML=cells.map(c=>{const d=pd(c.ds);const isT=c.ds===todayStr,isSel=c.ds===activeDate;
    return`<div class="ac-mini-day${c.other?' other-m':''}${isT?' today-d':''}${isSel?' sel-d':''}" data-date="${c.ds}">${d.getDate()}</div>`;
  }).join('');
  grid.onclick=null;
  grid.addEventListener('click',e=>{
    const el=e.target.closest('[data-date]');if(!el)return;
    if(openPanel==='endCal'){endDate=el.dataset.date;if(endDate<startDate)startDate=endDate;}
    else{startDate=el.dataset.date;if(endDate<startDate)endDate=startDate;}
    const p2d=pd(el.dataset.date);miniY=p2d.getFullYear();miniM=p2d.getMonth();
    updateDateTimePills();renderMiniCal();
  });
}
document.getElementById('miniCalPrev').addEventListener('click',()=>{miniM--;if(miniM<0){miniM=11;miniY--;}renderMiniCal();});
document.getElementById('miniCalNext').addEventListener('click',()=>{miniM++;if(miniM>11){miniM=0;miniY++;}renderMiniCal();});

/* Drum time picker */
const HOURS=Array.from({length:24},(_,i)=>p2(i));
const MINS=Array.from({length:12},(_,i)=>p2(i*5));
let drumCb=null;
function buildDrum(timeStr,cb){
  drumCb=cb;
  const[h,m]=timeStr.split(':');
  const selMin=p2(Math.round(parseInt(m)/5)*5);
  buildDrumCol(document.getElementById('drumHour'),HOURS,h,val=>{const[,m2]=getCurDrumTime();drumCb(val+':'+m2);});
  buildDrumCol(document.getElementById('drumMin'),MINS,selMin==='60'?'00':selMin,val=>{const[h2]=getCurDrumTime();drumCb(h2+':'+val);});
}
function getCurDrumTime(){
  const hCol=document.getElementById('drumHour'),mCol=document.getElementById('drumMin');
  const hSel=hCol.querySelector('.sel'),mSel=mCol.querySelector('.sel');
  return[hSel?hSel.textContent:'09',mSel?mSel.textContent:'00'];
}
function buildDrumCol(el,items,selItem,onChange){
  el.innerHTML='';
  const tp=document.createElement('div');tp.className='ac-drum-pad';el.appendChild(tp);
  items.forEach(item=>{const div=document.createElement('div');div.className='ac-drum-item'+(item===selItem?' sel':'');div.textContent=item;el.appendChild(div);});
  const bp=document.createElement('div');bp.className='ac-drum-pad';el.appendChild(bp);
  const idx=items.indexOf(selItem);if(idx>=0)requestAnimationFrame(()=>{el.scrollTop=idx*44;});
  let t;el.onscroll=()=>{clearTimeout(t);t=setTimeout(()=>{
    const i=Math.max(0,Math.min(Math.round(el.scrollTop/44),items.length-1));
    el.querySelectorAll('.ac-drum-item').forEach((x,j)=>x.classList.toggle('sel',j===i));
    el.scrollTo({top:i*44,behavior:'smooth'});onChange(items[i]);
  },120);};
}

/* Repeat / Alert pickers */
document.getElementById('evRepeatRow').addEventListener('click',()=>openPickerSheet('Repeat',REPEAT_OPTS,repeatVal,v=>{repeatVal=v;updateRepeatAlert();}));
document.getElementById('evAlertRow').addEventListener('click',()=>openPickerSheet('Alert',ALERT_OPTS,alertVal,v=>{alertVal=v;updateRepeatAlert();}));
function openPickerSheet(title,opts,cur,onSel){
  document.getElementById('pickerTitle').textContent=title;
  document.getElementById('pickerOptions').innerHTML=opts.map(o=>`<div class="cal-picker-row" data-val="${o.val}">
    <span class="cal-picker-row-lbl">${o.label}</span>
    ${cur===o.val?'<span class="cal-picker-check">✓</span>':''}
  </div>`).join('');
  document.getElementById('pickerOptions').onclick=null;
  document.getElementById('pickerOptions').addEventListener('click',e=>{
    const row=e.target.closest('[data-val]');if(!row)return;
    onSel(row.dataset.val);closePicker();
  });
  document.getElementById('calPicker').classList.add('open');
  pickerTarget=title;
}
function closePicker(){document.getElementById('calPicker').classList.remove('open');}
document.getElementById('pickerCancel').addEventListener('click',closePicker);

/* Save event */
document.getElementById('evSave').addEventListener('click',()=>{
  const title=document.getElementById('evTitle').value.trim();
  if(!title){document.getElementById('evTitle').style.outline='2px solid var(--red)';setTimeout(()=>document.getElementById('evTitle').style.outline='',1500);return;}
  const ev={
    id:editingId||'ev_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    title,
    location:document.getElementById('evLocation').value.trim()||null,
    date:startDate,
    endDate:endDate!==startDate?endDate:null,
    startTime:allDay?null:startTime,
    endTime:allDay?null:endTime,
    allDay,color:evColor,
    repeat:repeatVal||null,
    alert:alertVal||null,
    notes:document.getElementById('evNotes').value.trim()||null,
  };
  if(editingId){const i=st.events.findIndex(e=>e.id===editingId);if(i>=0)st.events[i]=ev;}
  else st.events.push(ev);
  save();closeSheet();render(null);
  scheduleNotif(ev);
});

/* Detail sheet */
function openDetail(id){
  const ev=st.events.find(e=>e.id===id);if(!ev)return;
  const col=colorHex(ev.color||DEFAULT_COLOR);
  const ds=ev.date+(ev.endDate&&ev.endDate!==ev.date?' → '+ev.endDate:'');
  const ts=ev.allDay?'All day':(ev.startTime?fmt12(ev.startTime)+(ev.endTime?' – '+fmt12(ev.endTime):''):'');
  const rep=ev.repeat?(REPEAT_OPTS.find(r=>r.val===ev.repeat)||{}).label||'':'';
  document.getElementById('evDetailContent').innerHTML=`
    <div class="cal-det-handle"></div>
    <div class="cal-det-color-bar" style="background:${col}"></div>
    <div class="cal-det-title">${ev.title}</div>
    <div class="cal-det-meta">
      ${ds}${ts?' · '+ts:''}${rep?' · '+rep:''}<br>
      ${ev.location?ev.location+'<br>':''}
      ${ev.notes||''}
    </div>
    <button class="cal-det-del" data-id="${ev.id}">Delete Event</button>`;
  document.getElementById('evDetailContent').querySelector('.cal-det-del').addEventListener('click',()=>{
    st.events=st.events.filter(e=>e.id!==id);save();closeDetail();render(null);
  });
  document.getElementById('evDetail').classList.add('open');
  document.getElementById('calOverlay').classList.add('open');
}

/* ── Push notifications ── */
async function reqNotif(){if('Notification'in window&&Notification.permission==='default')await Notification.requestPermission();}
function scheduleNotif(ev){
  if(!('Notification'in window)||Notification.permission!=='granted'||!ev.alert)return;
  try{
    const alertMin=parseInt(ev.alert)||0;
    const base=pd(ev.date).getTime();
    const[h,m]=(ev.startTime||'09:00').split(':').map(Number);
    const fireAt=base+h*3600000+m*60000-alertMin*60000;
    const delay=fireAt-Date.now();
    if(delay>0&&delay<86400000*8)
      setTimeout(()=>{if(Notification.permission==='granted')new Notification(ev.title,{tag:ev.id});},delay);
  }catch(e){}
}

/* ── Keyboard ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeSheet();closeDetail();closePicker();}
  const open=document.getElementById('evSheet').classList.contains('open');
  if(!open){if(e.key==='ArrowLeft')document.getElementById('calPrev').click();if(e.key==='ArrowRight')document.getElementById('calNext').click();}
});

/* ── Boot ── */
load();
st.selDate=today();
render(null);
reqNotif();
setInterval(()=>{if(st.view==='week'||st.view==='day')render(null);},60000);
window.addEventListener('storage',e=>{if(e.key===SK||e.key===TRAIN_SK)render(null);});

})();
</script>
