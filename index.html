<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0b">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="shared/shared.css">
<script src="shared/supabase.js"></script>
<script src="shared/groq.js"></script>
<script src="shared/profile.js"></script>
<script src="modules/sync/sync.js" defer></script>
</head>
<body>

<header class="sh-top">
  <div class="sh-water-wrap">
    <div class="sh-water-pill" id="shWaterPill"><span class="sh-water-dot"></span><span class="sh-water-count" id="shWaterCount">0/0</span></div>
    <button class="sh-water-add" id="shWaterAdd" type="button">+</button>
  </div>
  <button class="sh-finance" onclick="quickAddFood()" aria-label="Add food"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3.5"/></svg></button>
  <button class="sh-finance" onclick="openFinance(event)" aria-label="Finance"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></button>
  <button class="sh-settings-btn" onclick="openSettings()" aria-label="Settings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
</header>

<div class="sh-modules">
  <div class="sh-mod active" id="mod-main"></div>
  <div class="sh-mod" id="mod-health"></div>
  <div class="sh-mod" id="mod-training"></div>
  <div class="sh-mod" id="mod-others"></div>
  <div class="sh-mod sh-mod-finance" id="mod-finance"></div>
</div>

<div class="sh-modal-scrim" id="settingsScrim" onclick="closeSettings()"></div>
<div class="sh-modal" id="settingsModal">
  <div class="sh-modal-handle"></div>
  <h2>Settings</h2>
  <div class="sh-modal-sub">Keys are stored locally on this device only.</div>
  <div class="sh-key-row">
    <div class="sh-key-body"><div class="sh-key-label">Groq API Key</div><input class="sh-key-input" id="groqKeyInput" type="password" placeholder="gsk_… — free key at console.groq.com" autocomplete="off" spellcheck="false"></div>
  </div>
  <div class="sh-key-status" id="keyStatus"></div>
  <button class="sh-modal-btn pri" onclick="saveKey()">Save Key</button>
  <button class="sh-modal-btn sec" onclick="testKey()">Test Connection</button>
  <button class="sh-modal-btn sec" onclick="clearKey()" style="margin-top:8px;color:#f87171">Remove Key</button>
</div>

<div class="sh-bot-wrap">
  <nav class="sh-bot">
    <button class="sh-tab active" id="tab-main" onclick="switchTab('main')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 13 15 13 15 22"/></svg>
      <span>Main</span>
    </button>
    <button class="sh-tab" id="tab-health" onclick="switchTab('health')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Health</span>
    </button>
    <button class="sh-tab" id="tab-training" onclick="switchTab('training')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="2"/><path d="m9.5 21 1.6-5.8L8.5 13.5l2-6"/><path d="m14.5 8.5 2 2.5-2 1.5"/><path d="m11.1 15.5 1.5 4 2.5-1.5"/></svg>
      <span>Training</span>
    </button>
    <button class="sh-tab" id="tab-others" onclick="switchTab('others')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Others</span>
    </button>
  </nav>
  <button class="sh-plus-btn" id="plusBtn" onclick="openQuickAdd()" aria-label="Quick add">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- QUICK-ADD SHEET -->
<div class="sh-qa-scrim" id="qaScrim" onclick="closeQuickAdd()"></div>
<div class="sh-qa-modal" id="qaModal">
  <div class="sh-modal-handle"></div>
  <h2 style="color:#fff;font-size:20px;font-weight:700;margin-bottom:6px">Quick Add</h2>
  <p style="font-size:14px;color:#8e8e93;margin-bottom:20px">Jump straight to any action.</p>
  <div class="sh-qa-grid">
    <button class="sh-qa-item" onclick="closeQuickAdd();switchTab('health');setTimeout(()=>{try{localStorage.setItem('fl_open_add',JSON.stringify({tab:'log',ts:Date.now()}))}catch(e){}},300)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3.5"/></svg>
      Log Food
    </button>
    <button class="sh-qa-item" onclick="closeQuickAdd();addWaterQuick()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 0-7 8-7 13a7 7 0 0 0 14 0c0-5-7-13-7-13z"/></svg>
      Add Water
    </button>
    <button class="sh-qa-item" onclick="closeQuickAdd();switchTab('training')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="2"/><path d="m9.5 21 1.6-5.8L8.5 13.5l2-6"/><path d="m14.5 8.5 2 2.5-2 1.5"/><path d="m11.1 15.5 1.5 4 2.5-1.5"/></svg>
      Workout
    </button>
    <button class="sh-qa-item" onclick="closeQuickAdd();switchTab('others')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
      New Note
    </button>
    <button class="sh-qa-item" onclick="closeQuickAdd();openFinance(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Finance
    </button>
    <button class="sh-qa-item" onclick="closeQuickAdd();openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </div>
  <button class="sh-modal-btn sec" onclick="closeQuickAdd()">Close</button>
</div>

<script src="shared/shell.js"></script>
</body>
</html>
