<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0b">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:#0a0a0b;overscroll-behavior:none;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ── TOPBAR ── */
.sh-top{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:flex-end;gap:8px;
  padding:max(10px,env(safe-area-inset-top)) 14px 8px;
  background:#0a0a0b;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.sh-water-wrap{display:flex;align-items:stretch}
.sh-water-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 14px;
  background:rgba(125,211,252,0.08);
  border:1px solid rgba(125,211,252,0.16);
  border-right:none;border-radius:12px 0 0 12px;
  text-decoration:none;color:#FAFAFA;cursor:pointer;
}
.sh-water-dot{width:8px;height:8px;border-radius:50%;background:#7DD3FC;flex-shrink:0}
.sh-water-pill.warn .sh-water-dot{background:#fbbf24}
.sh-water-pill.miss .sh-water-dot{background:#ff8a8a;animation:miss-pulse 1.6s ease-in-out infinite}
@keyframes miss-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 5px rgba(239,68,68,0)}}
.sh-water-count{font-family:ui-monospace,'SF Mono',monospace;font-size:13px;font-weight:700;color:#FAFAFA;font-variant-numeric:tabular-nums;white-space:nowrap}
.sh-water-add{
  width:44px;border:1px solid rgba(125,211,252,0.16);
  background:linear-gradient(180deg,rgba(125,211,252,0.28),rgba(110,231,183,0.28));
  color:#fff;font-size:20px;font-weight:700;line-height:1;cursor:pointer;
  border-radius:0 12px 12px 0;transition:background .15s,transform .10s;
}
.sh-water-add:active{transform:scale(0.94)}
.sh-water-add.flash{background:linear-gradient(180deg,rgba(125,211,252,0.7),rgba(110,231,183,0.7))}
.sh-finance{
  display:inline-flex;align-items:center;justify-content:center;
  width:44px;height:42px;
  border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.04);
  border-radius:12px;text-decoration:none;color:#fff;
  transition:background .15s;
}
.sh-finance:active{background:rgba(255,255,255,0.10)}

/* ── FRAMES ── */
.sh-frames{
  position:fixed;
  top:calc(44px + max(10px,env(safe-area-inset-top)));
  bottom:calc(56px + env(safe-area-inset-bottom));
  left:0;right:0;
}
.sh-frame{
  position:absolute;inset:0;border:none;
  width:100%;height:100%;
  display:none;
  background:#0a0a0b;
}
.sh-frame.active{display:block}

/* ── BOTTOMBAR ── */
.sh-bot{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  display:flex;justify-content:space-around;align-items:stretch;
  padding:6px 0 calc(6px + env(safe-area-inset-bottom));
  background:#0a0a0b;
  border-top:1px solid rgba(255,255,255,0.08);
}
.sh-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;padding:4px 0;
  background:none;border:none;color:rgba(255,255,255,0.4);
  font-size:10px;font-weight:600;letter-spacing:0.04em;cursor:pointer;
  transition:color .15s;
}
.sh-tab svg{opacity:.4;transition:opacity .15s,transform .10s;display:block}
.sh-tab.active{color:#FAFAFA}
.sh-tab.active svg{opacity:1}
.sh-tab:active svg{transform:scale(0.88)}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="sh-top">
  <div class="sh-water-wrap">
    <div class="sh-water-pill" id="shWaterPill">
      <span class="sh-water-dot"></span>
      <span class="sh-water-count" id="shWaterCount">0/0</span>
    </div>
    <button class="sh-water-add" id="shWaterAdd" type="button">+</button>
  </div>
  <a href="finance.html" class="sh-finance" target="frame-main" onclick="openFinance(event)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
  </a>
</header>

<!-- FRAMES -->
<div class="sh-frames">
  <iframe src="main.html"   id="frame-main"    class="sh-frame active" allow="camera;microphone"></iframe>
  <iframe src="health.html" id="frame-health"  class="sh-frame" allow="camera"></iframe>
  <iframe src="gym.html"    id="frame-fitness" class="sh-frame"></iframe>
</div>

<!-- BOTTOMBAR -->
<nav class="sh-bot">
  <button class="sh-tab active" id="tab-main" onclick="switchTab('main')">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 13 15 13 15 21"/>
    </svg>
    Main
  </button>
  <button class="sh-tab" id="tab-health" onclick="switchTab('health')">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    Health
  </button>
  <button class="sh-tab" id="tab-fitness" onclick="switchTab('fitness')">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6.5 6.5h11M6.5 17.5h11M5 12h14"/><circle cx="3.5" cy="6.5" r="1.5"/><circle cx="3.5" cy="17.5" r="1.5"/><circle cx="20.5" cy="6.5" r="1.5"/><circle cx="20.5" cy="17.5" r="1.5"/>
    </svg>
    Fitness
  </button>
</nav>

<script>
'use strict';

// ── TAB SWITCHING ──
const TABS = ['main','health','fitness'];
let curTab = 'main';

function switchTab(tab) {
  if (tab === curTab) return;
  TABS.forEach(t => {
    document.getElementById('frame-'+t).classList.toggle('active', t===tab);
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  curTab = tab;
  const urls = {main:'main.html', health:'health.html', fitness:'gym.html'};
  history.replaceState({tab}, '', urls[tab]);
}

// Listen for tab-switch requests from iframes
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'switchTab') switchTab(e.data.tab);
});

// Finance link — open inside main frame
function openFinance(e) {
  e.preventDefault();
  document.getElementById('frame-main').src = 'finance.html';
  switchTab('main');
}

// ── WATER ──
const SUPA_URL = 'https://dseyqvcbcutgopqswvuy.supabase.co';
const SUPA_KEY = 'sb_publishable_kLImd3r002m5OzAAQwuN1g_56qqaGfQ';

function dateKey() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getWater() {
  let s; try { s = JSON.parse(localStorage.getItem('po_water_v1')); } catch(e){}
  if (!s) return {done:0,total:0};
  const done = (s.logs||{})[dateKey()]||0;
  const p = s.profile||{weightKg:75};
  const wKg = s.weightUnit==='lb' ? (p.weightKg||0)/2.20462 : (p.weightKg||0);
  const base = wKg*35;
  const exercise = (p.activityHrsPerWeek||0)/7*500;
  const caffeine = Math.max(0,(s.caffeineMgPerDay||200)-200)*1.5;
  const subs = (s.substances||[]).reduce((a,x)=>a+Math.max(0,(x.dose||x.defaultDose||0)*((x.mlPerUnit)||0)),0);
  let adj = 0; if(p.sex==='m') adj+=200; if((p.age||0)>=50) adj+=100;
  const totalMl = base+exercise+caffeine+subs+adj;
  let uv = s.unit==='glass'?s.glassMl||250:s.unit==='oz'?30:s.unit==='ml'?1:s.bottleMl||500;
  return {done, total:Math.max(1,Math.ceil(totalMl/uv))};
}
function renderWater() {
  const {done,total} = getWater();
  document.getElementById('shWaterCount').textContent = total ? done+'/'+total : '0/0';
  const pill = document.getElementById('shWaterPill');
  pill.classList.remove('warn','miss');
  if (total>0) {
    if (done>=total) {} // good
    else if (done>=total*0.5) pill.classList.add('warn');
    else { pill.classList.add(new Date().getHours()>=18?'miss':'warn'); }
  }
}
function addWater() {
  let s; try { s = JSON.parse(localStorage.getItem('po_water_v1')); } catch(e){}
  if (!s||typeof s!=='object') s={unit:'bottle',bottleMl:500,glassMl:250,weightUnit:'kg',profile:{weightKg:75,age:25,sex:'m',activityHrsPerWeek:5},caffeineMgPerDay:200,substances:[],logs:{}};
  s.logs = s.logs||{};
  const k = dateKey();
  s.logs[k] = (s.logs[k]||0)+1;
  localStorage.setItem('po_water_v1', JSON.stringify(s));
  renderWater();
  const btn = document.getElementById('shWaterAdd');
  btn.classList.add('flash'); setTimeout(()=>btn.classList.remove('flash'),220);
  // sync to supabase
  if (window.supabase) {
    try {
      const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
      supa.from('app_state').select('data').eq('key','health').maybeSingle().then(({data})=>{
        const cur = (data&&data.data)||{};
        const merged = Object.assign({}, cur, {po_water_v1: s});
        supa.from('app_state').upsert({key:'health',data:merged,updated_at:new Date().toISOString()},{onConflict:'key'}).then(()=>{});
      });
    } catch(e){}
  }
}

document.getElementById('shWaterAdd').addEventListener('click', addWater);
document.getElementById('shWaterPill').addEventListener('click', () => switchTab('health'));

renderWater();
window.addEventListener('storage', renderWater);
window.addEventListener('focus', renderWater);
setInterval(renderWater, 30000);

// Restore tab from URL on load
(function(){
  const p = location.pathname.toLowerCase();
  if (p.endsWith('health.html')) switchTab('health');
  else if (p.endsWith('gym.html')) switchTab('fitness');
})();
</script>
</body>
</html>
