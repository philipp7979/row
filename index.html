<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0b">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:#0a0a0b;overscroll-behavior:none;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ── TOPBAR ── */
/* The top bar contains the water tracker, finance shortcut, and settings button, and is fixed at the top of the screen. */
.sh-top{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:flex-end;gap:8px;
  padding:max(10px,env(safe-area-inset-top)) 14px 8px;
  background:#0a0a0b;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.sh-water-wrap{display:flex;align-items:stretch}
.sh-water-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 14px;
  background:rgba(125,211,252,0.08);
  border:1px solid rgba(125,211,252,0.16);
  border-right:none;border-radius:12px 0 0 12px;
  text-decoration:none;color:#FAFAFA;cursor:pointer;
}
.sh-water-dot{width:8px;height:8px;border-radius:50%;background:#7DD3FC;flex-shrink:0}
.sh-water-pill.warn .sh-water-dot{background:#fbbf24}
.sh-water-pill.miss .sh-water-dot{background:#ff8a8a;animation:miss-pulse 1.6s ease-in-out infinite}
@keyframes miss-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 5px rgba(239,68,68,0)}}
.sh-water-count{font-family:ui-monospace,'SF Mono',monospace;font-size:13px;font-weight:700;color:#FAFAFA;font-variant-numeric:tabular-nums;white-space:nowrap}
.sh-water-add{
  width:44px;border:1px solid rgba(125,211,252,0.16);
  background:linear-gradient(180deg,rgba(125,211,252,0.28),rgba(110,231,183,0.28));
  color:#fff;font-size:20px;font-weight:700;line-height:1;cursor:pointer;
  border-radius:0 12px 12px 0;transition:background .15s,transform .10s;
}
.sh-water-add:active{transform:scale(0.94)}
.sh-water-add.flash{background:linear-gradient(180deg,rgba(125,211,252,0.7),rgba(110,231,183,0.7))}

/* ── FRAMES ── */
.sh-frames{
  position:fixed;
  top:calc(44px + max(10px,env(safe-area-inset-top)));
  bottom:0;
  left:0;right:0;
}
.sh-frame{
  position:absolute;inset:0;border:none;
  width:100%;height:100%;
  display:none;
  background:#0a0a0b;
}
.sh-frame.active{display:block}

/* ── BOTTOMBAR (clean floating frosted pill) ── */
.sh-bot{
  position:fixed;z-index:200;
  left:14px;right:14px;
  bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;align-items:stretch;
  padding:9px 6px;
  border-radius:26px;
  background:rgba(28,28,32,0.62);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  backdrop-filter:blur(28px) saturate(180%);
  border:0.5px solid rgba(255,255,255,0.10);
  box-shadow:0 8px 30px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
}
/* opaque fallback where backdrop-filter isn't supported */
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
  .sh-bot{background:#1c1c20}
}
.sh-tab{
  flex:1;min-width:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  padding:2px 0;
  background:none;border:none;
  color:#8E8E93;
  font-size:10px;font-weight:500;letter-spacing:-0.01em;cursor:pointer;
  transition:color .2s;
  -webkit-tap-highlight-color:transparent;
}
.sh-tab svg{width:24px;height:24px;flex-shrink:0;display:block;transition:transform .15s}
.sh-tab span{line-height:1;white-space:nowrap}
.sh-tab.active{color:#0A84FF}
/* spring pop on the icon each time a tab becomes active */
.sh-tab.active svg{animation:tabSpring .5s cubic-bezier(.34,1.56,.64,1)}
.sh-tab:active svg{transform:scale(0.82)}
@keyframes tabSpring{0%{transform:scale(.8)}55%{transform:scale(1.22)}100%{transform:scale(1)}}

/* ── FINANCE OVERLAY ── */
/* When finance is open, its frame fills the screen (covering the shell
   bottombar so finance's own tabs aren't doubled). A floating Back
   button is the way out. */
body.finance-open .sh-frames{ top:0; bottom:0; }
body.finance-open .sh-bot{ display:none; }
body.finance-open .sh-top{ display:none; }

/* ── FINANCE SHORTCUT (top bar) ── */
.sh-finance{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.6);cursor:pointer;
  transition:background .15s;
}
.sh-finance:active{background:rgba(255,255,255,0.10)}

/* ── SETTINGS MODAL ── */
.sh-settings-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.6);font-size:17px;cursor:pointer;
  transition:background .15s;
}
.sh-settings-btn:active{background:rgba(255,255,255,0.10)}
.sh-modal-scrim{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s}
.sh-modal-scrim.show{opacity:1;pointer-events:all}
.sh-modal{
  position:fixed;bottom:0;left:0;right:0;z-index:301;
  background:#1c1c1e;border-radius:20px 20px 0 0;
  padding:0 20px 20px;
  padding-bottom:max(20px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0);
}
.sh-modal.show{transform:translateY(0);transition:transform .35s cubic-bezier(.33,1,.68,1)}
.sh-modal-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:12px auto 20px}
.sh-modal h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.sh-modal-sub{font-size:14px;color:#8e8e93;margin-bottom:24px}
.sh-key-row{display:flex;align-items:center;gap:10px;background:#2c2c2e;border-radius:14px;padding:14px 16px;margin-bottom:12px}
.sh-key-icon{font-size:20px;flex-shrink:0}
.sh-key-body{flex:1;min-width:0}
.sh-key-label{font-size:12px;color:#8e8e93;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sh-key-input{width:100%;background:none;border:none;font-size:15px;color:#fff;outline:none;font-family:ui-monospace,'SF Mono',monospace;letter-spacing:.02em}
.sh-key-input::placeholder{color:#48484a;font-family:-apple-system,sans-serif;letter-spacing:0}
.sh-key-status{font-size:13px;margin-bottom:16px;padding:10px 14px;border-radius:10px;display:none}
.sh-key-status.ok{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.2);display:block}
.sh-key-status.err{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2);display:block}
.sh-modal-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.sh-modal-btn.pri{background:#fff;color:#000}
.sh-modal-btn.sec{background:#2c2c2e;color:rgba(255,255,255,.7);margin-top:10px}
@keyframes scanSpin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="sh-top">
  <div class="sh-water-wrap">
    <div class="sh-water-pill" id="shWaterPill">
      <span class="sh-water-dot"></span>
      <span class="sh-water-count" id="shWaterCount">0/0</span>
    </div>
    <button class="sh-water-add" id="shWaterAdd" type="button">+</button>
  </div>
  <button class="sh-finance" onclick="openScan()" aria-label="Scan food" title="Quick food scan">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3.5"/>
    </svg>
  </button>
  <input type="file" id="shScanInput" accept="image/*" capture="environment" style="display:none">
  <button class="sh-finance" onclick="openFinance(event)" aria-label="Finance">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
  </button>
  <button class="sh-settings-btn" onclick="openSettings()" aria-label="Settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</header>

<!-- SETTINGS MODAL -->
<div class="sh-modal-scrim" id="settingsScrim" onclick="closeSettings()"></div>
<div class="sh-modal" id="settingsModal">
  <div class="sh-modal-handle"></div>
  <h2>Settings</h2>
  <div class="sh-modal-sub">Keys are stored locally on this device only.</div>

  <div class="sh-key-row">
    <span class="sh-key-icon"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M13 2 3 14h9l-1 8 10-12h-9z"/></svg></span>
    <div class="sh-key-body">
      <div class="sh-key-label">Groq API Key</div>
      <input class="sh-key-input" id="groqKeyInput" type="password" placeholder="gsk_… — get free key at console.groq.com" autocomplete="off" spellcheck="false">
    </div>
    <button onclick="toggleKeyVisibility()" id="keyToggleBtn" style="background:none;border:none;color:#8e8e93;font-size:16px;padding:4px;cursor:pointer;flex-shrink:0"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
  </div>
  <div class="sh-key-status" id="keyStatus"></div>

  <button class="sh-modal-btn pri" onclick="saveKey()">Save Key</button>
  <button class="sh-modal-btn sec" onclick="testKey()">Test Connection</button>
  <button class="sh-modal-btn sec" onclick="clearKey()" style="margin-top:8px;color:#f87171">Remove Key</button>
</div>

<!-- QUICK FOOD SCAN MODAL -->
<div class="sh-modal-scrim" id="scanScrim" onclick="closeScan()"></div>
<div class="sh-modal" id="scanModal">
  <div class="sh-modal-handle"></div>
  <h2>Quick Food Scan</h2>
  <div class="sh-modal-sub">Snap a meal — AI estimates the macros and logs it instantly.</div>
  <div id="scanBody"></div>
</div>

<!-- FRAMES -->
<div class="sh-frames">
  <iframe src="main.html"   id="frame-main"    class="sh-frame active" allow="camera;microphone"></iframe>
  <iframe src="health.html" id="frame-health"  class="sh-frame" allow="camera"></iframe>
  <iframe src="gym.html"    id="frame-fitness" class="sh-frame"></iframe>
  <iframe src="bible.html"  id="frame-other"   class="sh-frame"></iframe>
  <iframe                   id="frame-finance" class="sh-frame"></iframe>
</div>

<!-- BOTTOMBAR -->
<nav class="sh-bot">
  <button class="sh-tab active" id="tab-main" onclick="switchTab('main')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
    </svg>
    <span>Main</span>
  </button>
  <button class="sh-tab" id="tab-health" onclick="switchTab('health')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    <span>Health</span>
  </button>
  <button class="sh-tab" id="tab-fitness" onclick="switchTab('fitness')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6.5 6.5h11M6.5 17.5h11M5 12h14"/><circle cx="3.5" cy="6.5" r="1.5"/><circle cx="3.5" cy="17.5" r="1.5"/><circle cx="20.5" cy="6.5" r="1.5"/><circle cx="20.5" cy="17.5" r="1.5"/>
    </svg>
    <span>Training</span>
  </button>
  <button class="sh-tab" id="tab-other" onclick="switchTab('other')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="5" r="1.4" fill="currentColor"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/><circle cx="12" cy="19" r="1.4" fill="currentColor"/>
    </svg>
    <span>Others</span>
  </button>
</nav>

<script>
'use strict';

// ── TAB SWITCHING ──
const TABS = ['main','health','fitness','other'];
let curTab = 'main';

let financeOpen = false;
let financePrevTab = 'main';

function switchTab(tab) {
  // Always exit finance when a real tab is chosen
  if (financeOpen) {
    financeOpen = false;
    document.getElementById('frame-finance').classList.remove('active');
    document.body.classList.remove('finance-open');
  } else if (tab === curTab) {
    return;
  }
  TABS.forEach(t => {
    document.getElementById('frame-'+t).classList.toggle('active', t===tab);
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  curTab = tab;
  const urls = {main:'main.html', health:'health.html', fitness:'gym.html', other:'bible.html'};
  history.replaceState({tab}, '', urls[tab] || 'index.html');
}

// Listen for messages from iframes
window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'switchTab') switchTab(e.data.tab);
  else if (e.data.type === 'closeFinance') closeFinance();
});

// Finance — opens in its own dedicated full-screen frame (never touches Main)
function openFinance(e) {
  if (e) e.preventDefault();
  const fin = document.getElementById('frame-finance');
  if (!fin.getAttribute('src')) fin.setAttribute('src', 'finance.html');
  financePrevTab = curTab;
  TABS.forEach(t => document.getElementById('frame-'+t).classList.remove('active'));
  fin.classList.add('active');
  financeOpen = true;
  document.body.classList.add('finance-open');
}
function closeFinance() {
  switchTab(financePrevTab || 'main');
}

// ── WATER ──
const SUPA_URL = 'https://dseyqvcbcutgopqswvuy.supabase.co';
const SUPA_KEY = 'sb_publishable_kLImd3r002m5OzAAQwuN1g_56qqaGfQ';

function dateKey() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getWater() {
  let s; try { s = JSON.parse(localStorage.getItem('po_water_v1')); } catch(e){}
  if (!s) return {done:0,total:0};
  const done = (s.logs||{})[dateKey()]||0;
  const p = s.profile||{weightKg:75};
  const wKg = s.weightUnit==='lb' ? (p.weightKg||0)/2.20462 : (p.weightKg||0);
  const base = wKg*35;
  const exercise = (p.activityHrsPerWeek||0)/7*500;
  const caffeine = Math.max(0,(s.caffeineMgPerDay||200)-200)*1.5;
  const subs = (s.substances||[]).reduce((a,x)=>a+Math.max(0,(x.dose||x.defaultDose||0)*((x.mlPerUnit)||0)),0);
  let adj = 0; if(p.sex==='m') adj+=200; if((p.age||0)>=50) adj+=100;
  const totalMl = base+exercise+caffeine+subs+adj;
  let uv = s.unit==='glass'?s.glassMl||250:s.unit==='oz'?30:s.unit==='ml'?1:s.bottleMl||500;
  return {done, total:Math.max(1,Math.ceil(totalMl/uv))};
}
function renderWater() {
  const {done,total} = getWater();
  document.getElementById('shWaterCount').textContent = total ? done+'/'+total : '0/0';
  const pill = document.getElementById('shWaterPill');
  pill.classList.remove('warn','miss');
  if (total>0) {
    if (done>=total) {} // good
    else if (done>=total*0.5) pill.classList.add('warn');
    else { pill.classList.add(new Date().getHours()>=18?'miss':'warn'); }
  }
}
function addWater() {
  let s; try { s = JSON.parse(localStorage.getItem('po_water_v1')); } catch(e){}
  if (!s||typeof s!=='object') s={unit:'bottle',bottleMl:500,glassMl:250,weightUnit:'kg',profile:{weightKg:75,age:25,sex:'m',activityHrsPerWeek:5},caffeineMgPerDay:200,substances:[],logs:{}};
  s.logs = s.logs||{};
  const k = dateKey();
  s.logs[k] = (s.logs[k]||0)+1;
  localStorage.setItem('po_water_v1', JSON.stringify(s));
  renderWater();
  const btn = document.getElementById('shWaterAdd');
  btn.classList.add('flash'); setTimeout(()=>btn.classList.remove('flash'),220);
  // sync to supabase
  if (window.supabase) {
    try {
      const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
      supa.from('app_state').select('data').eq('key','health').maybeSingle().then(({data})=>{
        const cur = (data&&data.data)||{};
        const merged = Object.assign({}, cur, {po_water_v1: s});
        supa.from('app_state').upsert({key:'health',data:merged,updated_at:new Date().toISOString()},{onConflict:'key'}).then(()=>{});
      });
    } catch(e){}
  }
}

document.getElementById('shWaterAdd').addEventListener('click', addWater);
document.getElementById('shWaterPill').addEventListener('click', () => switchTab('health'));

renderWater();
window.addEventListener('storage', renderWater);
window.addEventListener('focus', renderWater);
setInterval(renderWater, 30000);

// Restore tab from URL on load
(function(){
  const p = location.pathname.toLowerCase();
  if (p.endsWith('health.html')) switchTab('health');
  else if (p.endsWith('gym.html')) switchTab('fitness');
})();

// ── KEEP BOTTOM BAR PINNED WHEN KEYBOARD OPENS ──
// iOS pins position:fixed elements to the shrinking *visual* viewport,
// so the tab bar floats up above the keyboard. Counteract by pushing
// it back down by the keyboard's height so it stays at the screen bottom.
(function(){
  const vv = window.visualViewport;
  if (!vv) return;
  const bot = document.querySelector('.sh-bot');
  if (!bot) return;
  function adjust(){
    const keyboardH = window.innerHeight - vv.height - vv.offsetTop;
    bot.style.transform = keyboardH > 60 ? 'translateY(' + keyboardH + 'px)' : '';
  }
  vv.addEventListener('resize', adjust);
  vv.addEventListener('scroll', adjust);
  adjust();
})();

// ── SETTINGS ──
function openSettings() {
  const inp = document.getElementById('groqKeyInput');
  inp.value = localStorage.getItem('groq_api_key') || '';
  inp.type = 'password';
  document.getElementById('keyToggleBtn').innerHTML = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  setKeyStatus('', '');
  document.getElementById('settingsScrim').classList.add('show');
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() {
  document.getElementById('settingsScrim').classList.remove('show');
  document.getElementById('settingsModal').classList.remove('show');
}
function toggleKeyVisibility() {
  const inp = document.getElementById('groqKeyInput');
  const btn = document.getElementById('keyToggleBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M2 12s3.5-7 10-7c2 0 3.7.6 5.2 1.5M22 12s-3.5 7-10 7c-2 0-3.7-.6-5.2-1.5M3 3l18 18M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>'; }
  else { inp.type = 'password'; btn.innerHTML = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>'; }
}
function setKeyStatus(type, msg) {
  const el = document.getElementById('keyStatus');
  el.className = 'sh-key-status' + (type ? ' ' + type : '');
  el.textContent = msg;
  el.style.display = type ? 'block' : 'none';
}
function saveKey() {
  const key = document.getElementById('groqKeyInput').value.trim();
  if (!key) { setKeyStatus('err', 'Please paste a key first.'); return; }
  if (!key.startsWith('gsk_')) {
    setKeyStatus('err', 'Invalid key format. Groq keys start with "gsk_". Get yours free at console.groq.com');
    return;
  }
  localStorage.setItem('groq_api_key', key);
  setKeyStatus('ok', '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg> Key saved — AI features enabled across all tabs.');
}
async function testKey() {
  const key = document.getElementById('groqKeyInput').value.trim() || localStorage.getItem('groq_api_key') || '';
  if (!key) { setKeyStatus('err', 'No key to test. Paste your key first.'); return; }
  setKeyStatus('', '');
  const el = document.getElementById('keyStatus');
  el.style.display = 'block'; el.className = 'sh-key-status'; el.textContent = 'Testing connection…';
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        messages: [{ role: 'user', content: 'Reply with just the word OK.' }],
        max_tokens: 5
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || 'Error ' + res.status);
    const reply = data?.choices?.[0]?.message?.content || '';
    setKeyStatus('ok', '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg> Working! Groq replied: "' + reply.trim() + '"');
    localStorage.setItem('groq_api_key', key);
  } catch(e) {
    setKeyStatus('err', '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em;display:inline-block" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg> ' + e.message);
  }
}
function clearKey() {
  localStorage.removeItem('groq_api_key');
  document.getElementById('groqKeyInput').value = '';
  setKeyStatus('ok', 'Key removed.');
}

// ── QUICK FOOD SCAN (Groq vision → food log) ──
function scanDateKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function scanBody(html){document.getElementById('scanBody').innerHTML=html;}
function openScan(){
  document.getElementById('scanScrim').classList.add('show');
  document.getElementById('scanModal').classList.add('show');
  const key=localStorage.getItem('groq_api_key')||'';
  if(!key){
    scanBody('<div class="sh-key-status err" style="display:block">Add your Groq API key in Settings (⚙) first — the scanner needs it.</div>'
      +'<button class="sh-modal-btn sec" onclick="closeScan()">Close</button>');
    return;
  }
  scanBody('<button class="sh-modal-btn pri" onclick="document.getElementById(\'shScanInput\').click()">📷 Take / choose photo</button>'
    +'<button class="sh-modal-btn sec" onclick="closeScan()">Cancel</button>');
}
function closeScan(){
  document.getElementById('scanScrim').classList.remove('show');
  document.getElementById('scanModal').classList.remove('show');
}
document.getElementById('shScanInput').addEventListener('change', function(e){
  const file=e.target.files&&e.target.files[0];
  e.target.value='';
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(){ analyzeScan(String(reader.result).split(',')[1]); };
  reader.readAsDataURL(file);
});
async function analyzeScan(b64){
  document.getElementById('scanScrim').classList.add('show');
  document.getElementById('scanModal').classList.add('show');
  scanBody('<div style="display:flex;align-items:center;gap:10px;color:#8e8e93;padding:14px 0"><span style="width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;display:inline-block;animation:scanSpin .7s linear infinite"></span>Analyzing your meal…</div>');
  try{
    const key=localStorage.getItem('groq_api_key')||'';
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'llama-3.2-90b-vision-preview',messages:[{role:'user',content:[
        {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b64}},
        {type:'text',text:'Analyze this food photo and estimate macros for the visible portion. Return ONLY valid JSON, no markdown: {"name":"Food Name","kcal":0,"protein":0,"fat":0,"carbs":0}'}
      ]}],max_tokens:300,temperature:0.3})
    });
    const data=await r.json();
    if(!r.ok)throw new Error((data&&data.error&&data.error.message)||('Error '+r.status));
    let txt=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content||'').trim();
    const food=JSON.parse(txt.replace(/```json|```/g,'').trim());
    showScanResult(food);
  }catch(err){
    scanBody('<div class="sh-key-status err" style="display:block">Scan failed: '+(err.message||err)+'</div>'
      +'<button class="sh-modal-btn pri" onclick="document.getElementById(\'shScanInput\').click()">Try another photo</button>'
      +'<button class="sh-modal-btn sec" onclick="closeScan()">Close</button>');
  }
}
let scanFood=null;
function showScanResult(f){
  scanFood=f;
  const macro=(label,val,unit,color)=>'<div style="flex:1;text-align:center;background:#2c2c2e;border-radius:10px;padding:10px 4px"><div style="font-size:18px;font-weight:800;color:'+color+'">'+Math.round(val||0)+'</div><div style="font-size:10px;color:#8e8e93;margin-top:2px">'+label+'</div></div>';
  scanBody(
    '<div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:12px;text-align:center">'+(f.name||'Food')+'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:16px">'
      +macro('kcal',f.kcal,'','#3b82f6')
      +macro('P',f.protein,'g','#f87171')
      +macro('F',f.fat,'g','#fbbf24')
      +macro('C',f.carbs,'g','#34d399')
    +'</div>'
    +'<button class="sh-modal-btn pri" onclick="logScan()">Log it</button>'
    +'<button class="sh-modal-btn sec" onclick="document.getElementById(\'shScanInput\').click()">Retake</button>'
    +'<button class="sh-modal-btn sec" onclick="closeScan()" style="margin-top:8px">Cancel</button>'
  );
}
function logScan(){
  if(!scanFood)return;
  const dk=scanDateKey(), lsKey='fl_log_'+dk;
  let log=[]; try{log=JSON.parse(localStorage.getItem(lsKey))||[];}catch(e){}
  log.push({
    id:Date.now().toString(36)+Math.random().toString(36).slice(2),
    name:scanFood.name||'Scanned meal',
    kcal:Math.round(scanFood.kcal||0),
    protein:Math.round(scanFood.protein||0),
    fat:Math.round(scanFood.fat||0),
    carbs:Math.round(scanFood.carbs||0),
    qty:1, unit:'serving',
    time:new Date().toTimeString().slice(0,5), date:dk
  });
  localStorage.setItem(lsKey, JSON.stringify(log));
  scanBody('<div class="sh-key-status ok" style="display:block">✓ Logged '+Math.round(scanFood.kcal||0)+' kcal to today\'s food log.</div>'
    +'<button class="sh-modal-btn pri" onclick="document.getElementById(\'shScanInput\').click()">Scan another</button>'
    +'<button class="sh-modal-btn sec" onclick="closeScan()">Done</button>');
  scanFood=null;
}
</script>
