<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0b">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../shared/supabase.js"></script>
<script src="../../shared/groq.js"></script>
<script src="../../shared/profile.js"></script>
<script src="../../shared/sync.js" defer></script>
<link rel="stylesheet" href="../../shared/shared.css">
<link rel="stylesheet" href="training.css">
<link rel="stylesheet" href="../../modules/gym/gym.css">
<link rel="stylesheet" href="../../modules/endurance/endurance.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0b;overflow-x:hidden;overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;}
body{overflow-y:auto;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
</style>
</head>
<body>
<script>
// Load training shell, then gym HTML+JS, then endurance HTML+JS
Promise.all([
  fetch('training.html').then(function(r){return r.text();}),
  fetch('../../modules/gym/gym.html').then(function(r){return r.text();}),
  fetch('../../modules/endurance/endurance.html').then(function(r){return r.text();})
]).then(function(parts){
  document.body.insertAdjacentHTML('beforeend', parts[0]);
  // training.html has #trPaneGym and #trPaneEnd
  document.getElementById('trPaneGym').insertAdjacentHTML('beforeend', parts[1]);
  document.getElementById('trPaneEnd').insertAdjacentHTML('beforeend', parts[2]);
  // Wire up tab buttons
  document.querySelectorAll('.tr-tab').forEach(function(btn){
    btn.addEventListener('click', function(){ trSwitch(btn.dataset.pane); });
  });
  // Load gym JS then endurance JS
  return new Promise(function(ok){
    var s=document.createElement('script');
    s.src='../../modules/gym/gym.js'; s.onload=ok; document.head.appendChild(s);
  });
}).then(function(){
  return new Promise(function(ok){
    var s=document.createElement('script');
    s.src='../../modules/endurance/endurance.js'; s.onload=ok; document.head.appendChild(s);
  });
}).then(function(){
  var saved = localStorage.getItem('tr_subtab') || 'gym';
  trSwitch(saved);
}).catch(function(e){console.error('training load failed:',e);});

function trSwitch(pane) {
  document.querySelectorAll('.tr-tab').forEach(function(b){
    b.classList.toggle('on', b.dataset.pane === pane);
  });
  var gymPane = document.getElementById('trPaneGym');
  var endPane = document.getElementById('trPaneEnd');
  if (gymPane) gymPane.classList.toggle('on', pane === 'gym');
  if (endPane) endPane.classList.toggle('on', pane === 'end');
  try { localStorage.setItem('tr_subtab', pane); } catch(e){}
}
window.trSwitch = trSwitch;
</script>
</body>
</html>
