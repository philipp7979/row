<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0b">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../shared/supabase.js"></script>
<script src="../../shared/groq.js"></script>
<script src="../../shared/profile.js"></script>
<script src="../../shared/sync.js" defer></script>
<link rel="stylesheet" href="../../shared/shared.css">
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="../../modules/life-calendar/life-calendar.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0b;overflow-x:hidden;overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;}
body{overflow-y:auto;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
</style>
</head>
<body>
<script>
fetch('main.html').then(function(r){return r.text();}).then(function(h){
  document.body.insertAdjacentHTML('beforeend',h);
  var s1=document.createElement('script');
  s1.src='main.js';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='../../modules/life-calendar/life-calendar.js';
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}).catch(function(e){document.body.textContent='Error loading main: '+e.message;});
</script>
</body>
</html>
