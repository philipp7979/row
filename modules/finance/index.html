<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#050506">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../shared/supabase.js"></script>
<script src="../../shared/groq.js"></script>
<script src="../../shared/profile.js"></script>
<script src="../../shared/sync.js" defer></script>
<link rel="stylesheet" href="../../shared/shared.css">
<link rel="stylesheet" href="finance.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#050506;overflow-x:hidden;overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;}
body{overflow-y:auto;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
/* Expose closeFinance to back button in finance.html */
</style>
</head>
<body>
<script>
window.closeFinance = function(){
  if(window.self !== window.top) window.top.postMessage({type:'closeFinance'},'*');
};
fetch('finance.html').then(function(r){return r.text();}).then(function(h){
  document.body.insertAdjacentHTML('beforeend',h);
  var s=document.createElement('script');s.src='finance.js';document.head.appendChild(s);
}).catch(function(e){document.body.textContent='Error loading finance: '+e.message;});
</script>
</body>
</html>
