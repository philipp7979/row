<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Connecting WHOOP…</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #0a0a0b; color: #FAFAFA;
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.card { max-width: 380px; width: 100%; padding: 40px 32px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; text-align: center; margin: 20px; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.10); border-top-color: #6ee7b7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em; }
p  { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.6; }
.error { color: #ff8a8a; }
</style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Connecting WHOOP…</h1>
  <p id="msg">Forwarding to authorisation handler.</p>
</div>
<script>
// This page is a fallback redirect shim — the real OAuth exchange happens
// server-side in /api/whoop-callback (which keeps the client secret out of
// the browser). If WHOOP lands here, forward the code to the API route.
(function () {
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const state = params.get('state');
  const err   = params.get('error');

  const spinner = document.getElementById('spinner');
  const title   = document.getElementById('title');
  const msg     = document.getElementById('msg');

  if (err) {
    spinner.style.display = 'none';
    title.textContent = 'Connection failed';
    title.className = 'error';
    msg.textContent = 'WHOOP returned: ' + err;
    return;
  }
  if (!code) {
    spinner.style.display = 'none';
    title.textContent = 'No code found';
    title.className = 'error';
    msg.textContent = 'Missing authorisation code. Please try connecting again from the Health tab.';
    return;
  }

  // Forward to the server-side handler that holds the client secret safely.
  const fwd = new URLSearchParams({ code });
  if (state) fwd.set('state', state);
  window.location.replace('/api/whoop-callback?' + fwd.toString());
})();
</script>
</body>
</html>
